<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>几何空战 · Roguelite</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; width:100%; }
  html { height:100%; }
  body {
    height:100vh; height:100dvh;
    background:#05050c; color:#e8e8f0;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; user-select:none; -webkit-user-select:none;
    overscroll-behavior:none; touch-action:none;
  }
  /* 容器按 540:780 比例锁定, 等比缩放至窗口最大可放下尺寸 */
  #wrap {
    position:relative;
    width: min(100vw, calc(100dvh * 540 / 780));
    height: min(100dvh, calc(100vw * 780 / 540));
    max-width: 100vw;
    max-height: 100dvh;
  }
  canvas {
    display:block; width:100%; height:100%;
    background:linear-gradient(180deg,#04040c,#0a0a1c);
    border:1px solid #2a2a3e;
    touch-action:none;
  }

  /* 右上暂停按钮 (与 HUD 风格协调: 半透明深底, 细蓝边) */
  #pauseBtn {
    position: absolute;
    top: clamp(4px, 1vmin, 8px);
    right: clamp(4px, 1vmin, 8px);
    width: clamp(22px, 4.5vmin, 28px);
    height: clamp(22px, 4.5vmin, 28px);
    background: rgba(15, 22, 36, 0.6);
    border: 1px solid rgba(100, 140, 190, 0.35);
    color: rgba(180, 215, 240, 0.85);
    font-size: clamp(11px, 2.4vmin, 14px);
    cursor: pointer;
    border-radius: 3px;
    pointer-events: auto;
    z-index: 11;
    display: none;
    align-items: center;
    justify-content: center;
    user-select: none;
    padding: 0;
    line-height: 1;
    font-family: inherit;
    margin: 0;
    transition: background .15s, border-color .15s;
  }
  #pauseBtn:hover {
    background: rgba(30, 50, 80, 0.85);
    border-color: rgba(140, 200, 255, 0.6);
    color: #dbeeff;
  }
  #pauseBtn.show { display: flex; }

  /* HUD: 使用 vmin 让字号随窗口缩放. z-index 高于 overlay, 在商店时仍可见 */
  #hud {
    position:absolute; top:1.2vmin; left:1.6vmin; right:1.6vmin;
    pointer-events:none;
    font-size: clamp(10px, 2.4vmin, 13px);
    display:flex; justify-content:space-between; line-height:1.45;
    z-index: 10;
  }
  .bar {
    width: clamp(70px, 22vmin, 140px);
    height: clamp(4px, 1.2vmin, 7px);
    background:#1a1a2a; border:1px solid #333; margin:2px 0 3px; overflow:hidden;
  }
  .bar > div { height:100%; transition:width .15s ease-out; }
  .exp > div { background:linear-gradient(90deg,#fc4,#ffe080); }
  .right { text-align:right; padding-top: clamp(28px, 5.5vmin, 36px); }
  .stats-line {
    font-size: clamp(9px, 2vmin, 11px);
    opacity:.78; margin-top:4px; line-height:1.5;
    display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
  }
  .stats-line > div {
    white-space: nowrap;
  }
  .stats-line .extra { color:#9fc4ee; }

  /* 已持有神器 chip 行: 经验条下方, 长按显示 tooltip */
  .owned-uniques {
    display: flex; gap: 3px; flex-wrap: wrap;
    margin-top: 3px;
    pointer-events: auto;
    max-width: clamp(120px, 32vmin, 200px);
  }
  .owned-uniques .chip {
    font-size: clamp(11px, 2.4vmin, 14px);
    width: clamp(16px, 3.6vmin, 22px);
    height: clamp(16px, 3.6vmin, 22px);
    display: flex; align-items: center; justify-content: center;
    background: rgba(15, 22, 36, 0.7);
    border: 1px solid rgba(255, 200, 80, 0.5);
    border-radius: 3px;
    color: #ffd06a;
    cursor: pointer;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  .owned-uniques .chip:active { background: rgba(40, 60, 90, 0.9); }
  .unique-tooltip {
    position: fixed;
    background: #10101e;
    border: 2px solid #ffd06a;
    border-radius: 6px;
    padding: 8px 12px;
    z-index: 100;
    max-width: 220px;
    font-size: clamp(10px, 2.2vmin, 12px);
    pointer-events: none;
    box-shadow: 0 0 14px rgba(0,0,0,0.7);
    display: none;
    line-height: 1.45;
  }
  .unique-tooltip.show { display: block; }
  .unique-tooltip .nm {
    color: #ffd06a; font-weight: bold;
    margin-bottom: 4px;
    font-size: clamp(11px, 2.5vmin, 13px);
  }
  .unique-tooltip .g { color: #a4dfff; }
  .unique-tooltip .b { color: #ff8a8a; }

  /* 弹窗 */
  .overlay {
    position:absolute; inset:0;
    background:rgba(5,5,15,.92);
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    pointer-events:auto;
    padding: clamp(10px, 3vmin, 22px);
    backdrop-filter:blur(2px);
    overflow-y:auto;
  }
  .overlay.show { display:flex; }
  .title {
    font-size: clamp(17px, 4.6vmin, 24px);
    margin-bottom: 4px; color:#6cf; letter-spacing:2px; text-align:center;
  }
  .subtitle {
    font-size: clamp(10px, 2.4vmin, 13px);
    opacity:.6; margin-bottom: clamp(8px, 2.5vmin, 16px); text-align:center;
  }

  /* 卡片用 grid, 在窄屏自动 2 列, 宽屏 3-4 列 */
  .cards {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(120px, 28vmin, 160px), 1fr));
    gap: clamp(6px, 1.6vmin, 12px);
    width:100%; max-width: 540px;
  }
  .cards.one-row {
    grid-template-columns: repeat(var(--cols, 3), minmax(0, 1fr));
    gap: clamp(4px, 1.2vmin, 8px);
  }
  .cards.one-row .card {
    min-width: 0;
    padding: clamp(6px, 1.5vmin, 10px) clamp(4px, 1vmin, 8px);
  }
  .cards.one-row .card .ico { font-size: clamp(16px, 4vmin, 24px); }
  .cards.one-row .card .nm { font-size: clamp(10px, 2.3vmin, 13px); overflow-wrap: anywhere; }
  .cards.one-row .card .ds {
    font-size: clamp(8.5px, 1.9vmin, 11px);
    min-height: clamp(34px, 8vmin, 44px);
  }
  .cards.one-row .card .pr { font-size: clamp(9px, 2vmin, 12px); }
  .card {
    background:#10101e; border:2px solid #2a2a44; border-radius:6px;
    padding: clamp(8px, 2vmin, 14px) clamp(6px, 1.5vmin, 12px);
    cursor:pointer; transition:all .15s; text-align:center; pointer-events:auto;
  }
  .card:active { transform: scale(0.97); }
  .card:hover { border-color:#6cf; transform:translateY(-3px); box-shadow:0 4px 16px rgba(102,200,255,.25); }
  .card.disabled { opacity:.4; cursor:not-allowed; }
  .card.disabled:hover { transform:none; border-color:#2a2a44; box-shadow:none; }
  .card .ico { font-size: clamp(20px, 5vmin, 28px); margin-bottom:3px; line-height:1; }
  .card .nm { color:#6cf; font-weight:bold; font-size: clamp(12px, 2.7vmin, 14px); margin:3px 0; }
  .card .ds {
    font-size: clamp(10px, 2.2vmin, 12px);
    opacity:.95; line-height:1.45; min-height: clamp(28px, 7vmin, 36px);
    display:flex; flex-direction:column; gap:1px;
  }
  .card .ds .g { color:#a4dfff; }
  .card .ds .b { color:#ff8a8a; }
  /* 独特道具: 金色边框 + 微光 */
  .card.unique { border-color:#fc4; box-shadow:0 0 0 1px rgba(255,200,80,0.35) inset, 0 0 14px rgba(255,200,80,0.18); }
  .card.unique:hover { border-color:#ffd06a; box-shadow:0 0 0 1px rgba(255,200,80,0.5) inset, 0 4px 20px rgba(255,200,80,0.45); }
  .card.unique .nm { color:#ffd06a; }
  .card.unique.disabled { box-shadow:none; }
  /* 已售出占位卡 */
  .card.sold { opacity:0.18; cursor:default; pointer-events:none; }
  .card.sold:hover { transform:none; border-color:#2a2a44; box-shadow:none; }
  .section-label {
    font-size: clamp(10px, 2.4vmin, 12px);
    color:#fc4; opacity:0.85;
    margin: clamp(4px, 1vmin, 8px) 0 clamp(4px, 1vmin, 6px);
    letter-spacing:1.5px; text-align:center;
  }
  .unique-row { max-width: clamp(150px, 32vmin, 220px); margin-bottom: clamp(8px, 2vmin, 14px); }
  .shop-actions {
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    margin-top: clamp(8px, 2vmin, 14px);
  }
  .shop-actions button {
    margin-top: 0;
    padding: clamp(6px, 1.5vmin, 9px) clamp(12px, 3vmin, 18px);
    font-size: clamp(11px, 2.4vmin, 13px);
  }
  .shop-actions button:disabled { opacity:0.4; cursor:not-allowed; background:#1a3a5a; }
  .card.curse-card {
    border-color:#e34a4a; cursor:default;
    box-shadow:0 0 0 1px rgba(227,74,74,0.4) inset, 0 0 18px rgba(227,74,74,0.4);
    animation: curseGlow 1.6s ease-in-out infinite;
  }
  .card.curse-card:hover { transform:none; }
  @keyframes curseGlow {
    0%, 100% { box-shadow:0 0 0 1px rgba(227,74,74,0.4) inset, 0 0 18px rgba(227,74,74,0.4); }
    50%      { box-shadow:0 0 0 1px rgba(255,90,90,0.7) inset, 0 0 28px rgba(255,90,90,0.7); }
  }
  .curse-section {
    position: relative;
    width: 100%;
    margin: clamp(8px, 2vmin, 14px) 0 clamp(2px, 0.6vmin, 6px);
    padding: clamp(8px, 1.8vmin, 12px) 0 clamp(28px, 6vmin, 40px);
    border-top: 1px solid rgba(227,74,74,0.35);
    border-bottom: 1px solid rgba(227,74,74,0.35);
    overflow: hidden;
  }
  .curse-label {
    color:#ff5e5e;
    font-size: clamp(11px, 2.6vmin, 14px);
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: clamp(6px, 1.5vmin, 10px);
    text-shadow: 0 0 8px rgba(255,80,80,0.6);
    animation: curseLabelPulse 1.4s ease-in-out infinite;
  }
  @keyframes curseLabelPulse {
    0%, 100% { opacity: 0.85; text-shadow: 0 0 6px rgba(255,80,80,0.5); }
    50%      { opacity: 1;    text-shadow: 0 0 14px rgba(255,80,80,1); }
  }
  .curse-particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .curse-particle {
    position: absolute;
    bottom: 0;
    width: 4px; height: 4px;
    background: #ff5050;
    border-radius: 50%;
    box-shadow: 0 0 8px #ff7777, 0 0 14px rgba(255,80,80,0.4);
    animation: curseFloat linear infinite;
    --drift: 0px;
  }
  @keyframes curseFloat {
    0%   { transform: translate(0, 0) scale(0.6); opacity: 0; }
    10%  { opacity: 0.95; }
    100% { transform: translate(var(--drift), -120%) scale(0.2); opacity: 0; }
  }
  .enemy-card { cursor:default; }
  .enemy-card:hover { transform:none; border-color:#2a2a44; box-shadow:none; }
  .enemy-prev {
    display:block; margin: 0 auto 4px;
    width: clamp(56px, 14vmin, 72px);
    height: clamp(56px, 14vmin, 72px);
    background:#0a0a14; border-radius:6px;
  }
  .card .pr { margin-top:5px; color:#fc4; font-size: clamp(11px, 2.5vmin, 14px); }
  .card.disabled .pr { color:#e34a4a; }

  button {
    background:#1a3a5a; color:#cef; border:1px solid #4a6a8a;
    padding: clamp(7px, 1.8vmin, 10px) clamp(18px, 4.5vmin, 28px);
    cursor:pointer; font-size: clamp(12px, 2.7vmin, 14px);
    margin-top: clamp(10px, 2.8vmin, 18px);
    border-radius:4px; pointer-events:auto; font-family:inherit;
  }
  button:hover { background:#2a4a6a; border-color:#6cf; }
  #ovCoin { color:#fc4; margin: clamp(6px, 1.5vmin, 10px) 0 clamp(8px, 2vmin, 14px); font-size: clamp(12px, 2.6vmin, 14px); }
  #startScreen { text-align:center; max-width: 420px; width:100%; }
  #startScreen .stats-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap: 4px clamp(12px, 4vmin, 24px);
    font-size: clamp(11px, 2.6vmin, 13px);
    margin: clamp(6px, 2vmin, 12px) 0 clamp(10px, 2.5vmin, 16px);
  }
  #startScreen .stats-grid b { color:#6cf; font-weight:600; }
  .helptext { font-size: clamp(9.5px, 2.2vmin, 11px); opacity:.55; margin-top: clamp(10px, 2.5vmin, 14px); line-height:1.7; }

  /* 开始页美术 */
  #startScreen {
    position: relative;
    width: min(92%, 460px);
    min-height: min(64vh, 500px);
    padding: clamp(22px, 5vmin, 34px) clamp(14px, 3.5vmin, 24px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: none;
    background: transparent;
    box-shadow: none;
  }
  .start-geo {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .start-geo span {
    position: absolute;
    display: block;
    border: 1px solid rgba(120, 185, 245, 0.28);
    transform: rotate(45deg);
    animation: geoDrift 7s ease-in-out infinite;
  }
  .start-geo span:nth-child(1) {
    width: 150px; height: 150px; left: -60px; top: 12%;
    animation-delay: -1.2s;
  }
  .start-geo span:nth-child(2) {
    width: 110px; height: 110px; right: -38px; top: 26%;
    border-color: rgba(255, 210, 120, 0.24);
    animation-delay: -2.4s;
  }
  .start-geo span:nth-child(3) {
    width: 180px; height: 180px; right: 16%; bottom: -88px;
    border-color: rgba(160, 210, 255, 0.2);
    animation-delay: -0.6s;
  }
  @keyframes geoDrift {
    0%, 100% { transform: rotate(45deg) translateY(0); opacity: 0.26; }
    50%      { transform: rotate(50deg) translateY(-8px); opacity: 0.5; }
  }
  .start-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(115, 160, 205, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(115, 160, 205, 0.08) 1px, transparent 1px);
    background-size: 24px 24px;
    mask-image: radial-gradient(circle at 50% 42%, #000 30%, transparent 88%);
    pointer-events: none;
    opacity: 0.35;
  }
  .start-kicker {
    position: relative;
    z-index: 1;
    color: rgba(170, 210, 245, 0.85);
    font-size: clamp(10px, 2.2vmin, 12px);
    letter-spacing: 3px;
    margin-bottom: clamp(8px, 2vmin, 14px);
  }
  .start-title {
    position: relative;
    z-index: 1;
    color: #d8ecff;
    font-size: clamp(30px, 8.4vmin, 48px);
    font-weight: 700;
    letter-spacing: 6px;
    text-shadow: 0 0 18px rgba(140, 200, 255, 0.3);
    margin-bottom: clamp(8px, 1.8vmin, 14px);
    line-height: 1;
  }
  .start-sub {
    position: relative;
    z-index: 1;
    color: rgba(195, 225, 250, 0.8);
    font-size: clamp(11px, 2.5vmin, 14px);
    letter-spacing: 2px;
    margin-bottom: clamp(22px, 5vmin, 34px);
  }
  #startBtn {
    position: relative;
    z-index: 1;
    min-width: clamp(150px, 40vmin, 210px);
    border-color: rgba(145, 200, 255, 0.65);
    background: linear-gradient(180deg, rgba(42, 78, 118, 0.95), rgba(20, 45, 74, 0.95));
    box-shadow: 0 0 0 1px rgba(185, 220, 255, 0.12) inset, 0 10px 24px rgba(3, 10, 20, 0.45);
    letter-spacing: 4px;
  }
  #easyBtn {
    position: relative;
    z-index: 1;
    min-width: clamp(180px, 42vmin, 230px);
    border-color: rgba(145, 200, 255, 0.65);
    background: linear-gradient(180deg, rgba(34, 92, 64, 0.95), rgba(18, 56, 38, 0.95));
    box-shadow: 0 0 0 1px rgba(185, 220, 255, 0.12) inset, 0 10px 24px rgba(3, 10, 20, 0.45);
    letter-spacing: 4px;
  }
  #easyBtn:hover {
    background: linear-gradient(180deg, rgba(44, 116, 80, 0.96), rgba(24, 70, 48, 0.96));
    border-color: rgba(175, 220, 255, 0.9);
  }
  .start-mode-row {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .start-mode-note {
    margin-top: -2px;
    margin-bottom: 4px;
    font-size: clamp(10px, 2.1vmin, 12px);
    color: rgba(200, 236, 210, 0.9);
    opacity: 0.92;
    letter-spacing: 1px;
  }
  .start-mode-row button {
    min-width: clamp(180px, 42vmin, 230px);
  }
  #startBtn:hover {
    background: linear-gradient(180deg, rgba(55, 98, 145, 0.96), rgba(26, 54, 88, 0.96));
    border-color: rgba(175, 220, 255, 0.9);
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="540" height="780"></canvas>
  <div id="hud">
    <div>
      <div>第 <span id="round">1</span> 轮 · 第 <span id="wave">1</span> 波</div>
      <div>等级 <span id="level">1</span> · 经验 <span id="kill">0</span>/<span id="killNeed">5</span></div>
      <div class="bar exp"><div id="expBar"></div></div>
      <div class="owned-uniques" id="ownedUniques"></div>
    </div>
    <div class="right">
      <div>金币 <span id="coin">0</span></div>
      <div class="stats-line" id="stats"></div>
    </div>
  </div>
  <button id="pauseBtn" type="button">⏸</button>
  <div class="overlay show" id="overlay"></div>
  <div class="unique-tooltip" id="uniqueTooltip"></div>
</div>
<script>
"use strict";
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const W = cvs.width, H = cvs.height;
const overlay = document.getElementById('overlay');
const BGM_URL = './gaming-music-8-bit-console-play-background-intro-theme-278382.mp3';
const bgm = new Audio(BGM_URL);
bgm.preload = 'auto';
bgm.loop = true;
bgm.volume = 0.45;
bgm.playsInline = true;
bgm.setAttribute('playsinline', '');
bgm.setAttribute('webkit-playsinline', '');
let bgmStarted = false;
let bgmPlayLock = false;
const isMobileAudioHost = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1;
let bgmCtx = null;
let bgmGain = null;
let bgmBuffer = null;
let bgmBufferLoading = null;
let bgmSource = null;

function ensureBgmContext() {
  if (isMobileAudioHost) return false;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return false;
  if (!bgmCtx) {
    bgmCtx = new AC();
    bgmGain = bgmCtx.createGain();
    bgmGain.gain.value = 0.45;
    bgmGain.connect(bgmCtx.destination);
    bgmCtx.onstatechange = () => {
      if (bgmCtx && bgmCtx.state === 'running') startWebAudioBgm();
    };
  }
  if (bgmCtx.state === 'suspended') bgmCtx.resume().catch(() => {});
  return true;
}

async function loadBgmBuffer() {
  if (bgmBuffer) return bgmBuffer;
  if (!bgmBufferLoading) {
    bgmBufferLoading = fetch(BGM_URL)
      .then(r => r.arrayBuffer())
      .then(buf => bgmCtx.decodeAudioData(buf.slice(0)))
      .then(decoded => {
        bgmBuffer = decoded;
        return decoded;
      })
      .catch(err => {
        bgmBufferLoading = null;
        throw err;
      });
  }
  return bgmBufferLoading;
}

function startWebAudioBgm() {
  if (!bgmCtx || !bgmGain || !bgmBuffer) return false;
  if (bgmSource) return true;
  const src = bgmCtx.createBufferSource();
  src.buffer = bgmBuffer;
  src.loop = true;
  src.connect(bgmGain);
  src.onended = () => {
    if (bgmSource === src) bgmSource = null;
  };
  try {
    src.start(0);
    bgmSource = src;
    bgmStarted = true;
    return true;
  } catch (_) {
    return false;
  }
}

async function ensureBgm() {
  if (document.hidden) return;
  if (ensureBgmContext()) {
    try {
      await loadBgmBuffer();
      if (startWebAudioBgm()) return;
    } catch (_) {
      // WebAudio 失败时回落到 HTMLAudioElement
    }
  }
  if (!bgm.paused && !bgm.ended) {
    bgmStarted = true;
    return;
  }
  if (bgmPlayLock) return;
  bgmPlayLock = true;
  bgm.muted = false;
  const p = bgm.play();
  if (p && typeof p.then === 'function') {
    p.then(() => { bgmStarted = true; }).catch(() => {}).finally(() => { bgmPlayLock = false; });
  } else {
    bgmStarted = true;
    bgmPlayLock = false;
  }
}

function nudgeHtmlBgm() {
  if (document.hidden) return;
  if (bgm.readyState < 2) bgm.load();
  if (bgm.paused || bgm.ended) ensureBgm();
}

// H5 / 移动端常会拦截首帧播放, 这里用首个用户手势做一次兜底解锁
['pointerdown', 'touchstart', 'keydown', 'click'].forEach(ev => {

function pointToLineDist(px, py, x1, y1, x2, y2) {
  const A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
  const dot = A * C + B * D;
  const len_sq = C * C + D * D;
  let t = len_sq > 0 ? dot / len_sq : -1;
  let xx, yy;
  if (t < 0) { xx = x1; yy = y1; }
  else if (t > 1) { xx = x2; yy = y2; }
  else { xx = x1 + t * C; yy = y1 + t * D; }
  return Math.hypot(px - xx, py - yy);
}

function getBossVertices(e) {
  const r = e.r;
  return {
    leftTop:  { x: e.x - r, y: e.y - r * 0.7 },
    rightTop: { x: e.x + r, y: e.y - r * 0.7 },
    bottom:   { x: e.x,     y: e.y + r },
  };
}

function recompute() {
  player.maxHp = Math.max(0, base.maxHp + bonus.maxHp);
  // 护盾上限允许为负 — 表示"亏空", 后续 +护盾 要先填平才能真正获得格子
  player.maxShield = base.maxShield + bonus.maxShield;
  // final = (base + 升级累加) * (1 + 普通商店加性) * 独特乘区 * (独眼乘区)
  player.atk = (base.atk + bonus.atk) * Math.max(0, 1 + shopAdd.atkPct) * shopMul.atk * (player.cyclopsAtkMul || 1);
  player.fireRate = Math.min(20, (base.fireRate + bonus.fireRate) * Math.max(0.1, 1 + shopAdd.fireRatePct) * shopMul.fireRate);
  player.bulletSpeed = (base.bulletSpeed + bonus.bulletSpeed) * Math.max(0.2, 1 + shopAdd.bulletSpeedPct) * shopMul.bulletSpeed;
  player.moveSpeed = (base.moveSpeed + bonus.moveSpeed) * Math.max(0.2, 1 + shopAdd.moveSpeedPct) * shopMul.moveSpeed;
  player.bulletSize = Math.max(0.1, (base.bulletSize + bonus.bulletSize) * Math.max(0.1, 1 + shopAdd.bulletSizePct) * shopMul.bulletSize);
  player.spread = Math.max(0.02, base.spread * shopMul.spread);
  // 以攻为守: 永久禁用护盾
  if (player.bulletParry && !game.easyMode) { player.maxShield = 0; player.shield = 0; }
  // 当前激活诅咒的实时效果 (单/多张, 每波刷新)
  if (game.activeCurses.has('sloth')) {
    player.bulletSpeed *= 0.5;
    player.moveSpeed *= 0.5;
  }
  // 体型派生: 巨人形态 ×1.5, 暴食诅咒 ×1.5 (可叠加)
  let r = 13;
  if (player.bigForm) r *= 1.5;
  if (game.activeCurses.has('gluttony')) r *= 1.5;
  player.r = Math.round(r);
  player.magnetRange = (player.baseMagnetRange || 90) * (game.activeCurses.has('greed') ? 2 : 1);
  if (player.hp > player.maxHp) player.hp = player.maxHp;
  // shield 钳制到 [0, maxShield], 当 maxShield 为负时直接归 0
  player.shield = Math.max(0, Math.min(player.shield, player.maxShield));
  // 恶魔契约: 1 HP 且无盾时直接附加最终修正, 不受任何乘区影响. 受 fireRate 隐形上限约束
  if (player.devilContract && player.hp === 1 && player.shield === 0) {
    player.atk += 5;
    player.fireRate = Math.min(20, player.fireRate + 5);
  }
}

// 通用延迟特效调度: 用于殉爆等需要按时序触发的视觉
const delayedFx = [];
function scheduleFx(delay, fn) { delayedFx.push({ t: delay, fn }); }
function tickDelayedFx(dt) {
  for (let i = delayedFx.length - 1; i >= 0; i--) {
    delayedFx[i].t -= dt;
    if (delayedFx[i].t <= 0) {
      try { delayedFx[i].fn(); } catch (e) {}
      delayedFx.splice(i, 1);
    }
  }
}

// 玩家位置发射的冲击波: 范围内消除敌弹和小怪 (Boss 不消除, 不计经验/金币以防连锁升级)
// 同时打断所有敌人当前的攻击, 强制下一次射击/引爆延迟到至少 1 秒后 (含 Boss)
function spawnShockwave(x, y, maxR = 280) {
  shockwaves.push({ x, y, t: 0, life: 0.55, maxR, hit: new Set() });
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.fireT !== undefined) e.fireT = Math.max(e.fireT, 1.0);
    if (e.parallelFireT !== undefined) e.parallelFireT = Math.max(e.parallelFireT, 1.0);
    if (e.armed && e.fuseT !== undefined) e.fuseT = Math.max(e.fuseT, 1.0);
  }
}

function updateShockwaves(dt) {
  for (const sw of shockwaves) {
    sw.t += dt;
    const r = sw.maxR * Math.min(1, sw.t / sw.life);
    for (const b of bullets) {
      if (b.from !== 'enemy' || b.dead || sw.hit.has(b)) continue;
      if (dist(b, sw) < r) {
        sw.hit.add(b);
        b.dead = true;
        addHitParticles(b.x, b.y);
      }
    }
    for (const e of enemies) {
      if (e.dead || e.boss || e.invuln === true || e.invuln > 0 || sw.hit.has(e)) continue;
      if (dist(e, sw) < r) {
        sw.hit.add(e);
        // 推开 (不击杀): 给敌人远离冲击波中心的速度
        const dx = e.x - sw.x, dy = e.y - sw.y;
        const d2 = Math.hypot(dx, dy) || 1;
        const force = 700;
        e.knockVx = (dx / d2) * force;
        e.knockVy = (dy / d2) * force;
        e.knockT = 0.45;
        addHitParticles(e.x, e.y);
      }
    }
  }
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    if (shockwaves[i].t >= shockwaves[i].life) shockwaves.splice(i, 1);
  }
}

// 神圣守护: 一颗光球绕玩家转圈, 消接触的敌弹, 撞敌造成攻击力伤害 (有冷却避免每帧重复)
function updateGuardian(dt) {
  if (!player.guardian) return;
  const g = player.guardian;
  g.angle += 3.8 * dt;
  const radius = 75;
  const gr = 14;
  // 两颗光球对位旋转 (相差 π), 共享 hitMap 保证 0.25s 冷却仍按敌人计
  g.orbs = [
    { x: player.x + Math.cos(g.angle) * radius, y: player.y + Math.sin(g.angle) * radius },
    { x: player.x + Math.cos(g.angle + Math.PI) * radius, y: player.y + Math.sin(g.angle + Math.PI) * radius },
  ];
  for (const orb of g.orbs) {
    const gx = orb.x, gy = orb.y;
    // 消敌弹
    for (const b of bullets) {
      if (b.from !== 'enemy' || b.dead) continue;
      if (Math.hypot(b.x - gx, b.y - gy) < gr + b.r) {
        b.dead = true;
        addHitParticles(b.x, b.y);
      }
    }
    // 撞敌人
    for (const e of enemies) {
      if (e.dead || e.invuln === true || e.invuln > 0) continue;
      if (Math.hypot(e.x - gx, e.y - gy) < gr + e.r) {
        if (e.type === 'mirror') {
          if (e.shield > 0) {
            e.shield = 0;
            e.invuln = e.invulnT;
            e.shieldDelay = e.shieldRegenDelayBase;
            e.shieldRegenT = 0;
            addHitParticles(gx, gy);
          } else {
            e.dead = true; e.killed = true;
            addExplosion(e.x, e.y, e.color, 28);
            game.shake = Math.max(game.shake, 0.15);
          }
          continue;
        }
        const last = g.hitMap.get(e) || -999;
        if (game.time - last > 0.25) {
          g.hitMap.set(e, game.time);
          // 接触伤害不暴击 (吃攻速 + 弹道两个乘区, 与镭射哨兵的暴击/暴伤路线区分)
          const dmg = player.atk * player.fireRate * Math.max(1, player.projectiles);
          hitEnemy(e, {
            x: gx, y: gy - 6,
            dmg, crit: false, critCount: 0,
            from: 'player', source: 'guardian',
          });
          if (player.burnStacks > 0) applyBurn(e, player.burnStacks);
        }
      }
    }
  }
  if (Math.random() < 0.05) {
    for (const e of g.hitMap.keys()) if (e.dead) g.hitMap.delete(e);
  }
}

function drawGuardian() {
  if (!player.guardian || !player.guardian.orbs) return;
  for (const orb of player.guardian.orbs) {
    const gx = orb.x, gy = orb.y;
    ctx.save();
    // 光晕 (压缩到碰撞半径附近, 强化"实体边界"感)
    const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, 16);
    grad.addColorStop(0, 'rgba(255, 230, 160, 0.85)');
    grad.addColorStop(0.7, 'rgba(255, 200, 100, 0.4)');
    grad.addColorStop(1, 'rgba(255, 200, 100, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(gx, gy, 16, 0, TAU); ctx.fill();
    // 实心球体 (= 碰撞半径 14)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(gx, gy, 9, 0, TAU); ctx.fill();
    ctx.strokeStyle = 'rgba(255, 200, 80, 0.85)';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(gx, gy, 14, 0, TAU); ctx.stroke();
    ctx.restore();
  }
}

const SENTINEL_RANGE = 200;
const SENTINEL_FIRE_INTERVAL = 1.0;
const SENTINEL_FLASH_DUR = 0.18;
function initSentinels() {
  player.sentinelDrones = [
    { x: player.x - 30, y: player.y, fireT: 0.4, flashT: 0, flashX: 0, flashY: 0 },
    { x: player.x + 30, y: player.y, fireT: 0.9, flashT: 0, flashX: 0, flashY: 0 },
  ];
}
function updateSentinels(dt) {
  if (!player.sentinels) return;
  if (!player.sentinelDrones) initSentinels();
  const drones = player.sentinelDrones;
  const offsets = [-30, 30];
  for (let i = 0; i < drones.length; i++) {
    const d = drones[i];
    // 跟随玩家身侧 (lerp 平滑跟随, 略带惯性)
    const tx = player.x + offsets[i];
    const ty = player.y + 4;
    d.x += (tx - d.x) * 8 * dt;
    d.y += (ty - d.y) * 8 * dt;
    // 距玩家上限: 避免高速移动时哨兵被甩到屏幕外
    const dx = d.x - player.x, dy = d.y - player.y;
    const dd = Math.hypot(dx, dy);
    const maxLag = 70;
    if (dd > maxLag) {
      d.x = player.x + dx / dd * maxLag;
      d.y = player.y + dy / dd * maxLag;
    }
    d.fireT -= dt;
    if (d.flashT > 0) d.flashT = Math.max(0, d.flashT - dt);
    if (d.fireT <= 0 && game.state === 'playing') {
      // 200px 内独立选最近敌人 (跳过免疫 / 警示 / 镜像)
      let best = null, bd2 = SENTINEL_RANGE * SENTINEL_RANGE;
      for (const e of enemies) {
        if (e.dead || e.warningT > 0) continue;
        if (e.invuln === true || e.invuln > 0) continue;
        if (e.type === 'mirror') continue;
        const dx = e.x - d.x, dy = e.y - d.y;
        const dist2 = dx * dx + dy * dy;
        if (dist2 < bd2) { bd2 = dist2; best = e; }
      }
      if (best) {
        d.fireT = SENTINEL_FIRE_INTERVAL;
        d.flashT = SENTINEL_FLASH_DUR;
        d.flashX = best.x;
        d.flashY = best.y;
        // 哨兵射线允许暴击 / 深度暴击, 跟玩家暴击线挂钩
        let cc;
        if (player.deepCrit) {
          const full = Math.floor(player.critRate);
          const frac = player.critRate - full;
          cc = full + (Math.random() < frac ? 1 : 0);
        } else {
          cc = Math.random() < player.critRate ? 1 : 0;
        }
        const dmg = player.atk * Math.pow(player.critDmg, cc);
        hitEnemy(best, {
          x: best.x, y: best.y - 6,
          dmg, crit: cc > 0, critCount: cc,
          from: 'player', source: 'sentinel',
        });
        if (player.burnStacks > 0) applyBurn(best, player.burnStacks);
      } else {
        // 无目标时下一帧继续扫描 (不浪费冷却)
        d.fireT = 0.05;
      }
    }
  }
}
function drawSentinels() {
  if (!player.sentinels || !player.sentinelDrones) return;
  for (const d of player.sentinelDrones) {
    // 激光线段 (淡出)
    if (d.flashT > 0) {
      const a = clamp(d.flashT / SENTINEL_FLASH_DUR, 0, 1);
      ctx.save();
      ctx.strokeStyle = `rgba(180, 240, 255, ${0.55 * a})`;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.flashX, d.flashY); ctx.stroke();
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.95 * a})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.flashX, d.flashY); ctx.stroke();
      ctx.restore();
    }
    // 无人机本体: 瘦长蓝菱形 + 中心细红十字
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.fillStyle = '#cce8ff';
    ctx.beginPath();
    ctx.moveTo(0, -10); ctx.lineTo(5, 0); ctx.lineTo(0, 10); ctx.lineTo(-5, 0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#3a6c98';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // 中心红色十字 (横窄, 竖长 — 与菱形长宽比一致)
    ctx.fillStyle = '#ff4858';
    ctx.fillRect(-2.5, -0.4, 5, 0.8);
    ctx.fillRect(-0.4, -5, 0.8, 10);
    ctx.restore();
  }
}

function drawShockwaves() {
  for (const sw of shockwaves) {
    const k = sw.t / sw.life;
    const r = sw.maxR * Math.min(1, k);
    const a = 1 - k;
    ctx.save();
    // 外环
    ctx.strokeStyle = `rgba(180, 220, 255, ${a})`;
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, r, 0, TAU); ctx.stroke();
    // 内环
    ctx.strokeStyle = `rgba(255, 255, 255, ${a * 0.7})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, r * 0.85, 0, TAU); ctx.stroke();
    // 内填充淡蓝
    ctx.fillStyle = `rgba(102, 200, 255, ${a * 0.10})`;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, r, 0, TAU); ctx.fill();
    ctx.restore();
  }
}

const pointer = { x: 0, y: 0, down: false, dx: 0, dy: 0 };

function getXY(e) {
  const r = cvs.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX-r.left)*W/r.width, y: (t.clientY-r.top)*H/r.height };
}
cvs.addEventListener('pointerdown', e => {
  ensureBgm();
  if (game.state !== 'playing') return;
  pointer.down = true;
  const p = getXY(e);
  pointer.dx = player.x - p.x;
  pointer.dy = player.y - p.y;
  pointer.x = p.x + pointer.dx;
  pointer.y = p.y + pointer.dy;
  try { cvs.setPointerCapture(e.pointerId); } catch(_) {}
});
cvs.addEventListener('pointermove', e => {
  if (!pointer.down) return;
  const p = getXY(e);
  pointer.x = p.x + pointer.dx;
  pointer.y = p.y + pointer.dy;
});
const release = () => { pointer.down = false; };
cvs.addEventListener('pointerup', release);
cvs.addEventListener('pointercancel', release);
cvs.addEventListener('pointerleave', release);

function startWave() {
  game.killCount = 0;
  // 上波诅咒失效, 重置派生属性 (r / magnetRange 等)
  game.activeCurses.clear();
  game.mirrorsSpawned = false;
  recompute();
  game.spawnQueue = generateWave(game.round, game.wave);
  game.spawnTimer = game.spawnQueue.length ? game.spawnQueue[0].gap : 0.5;
  if (player.guardian) player.guardian.hitMap = new Map();
  game.snapshotted = false;
  // 每波开始前重置玩家技能冷却 / 蓄力
  player.voidActiveT = 0;
  player.voidCooldownT = 0;
  player.missileT = 0;
  player.fieldTickT = 0;
  player.laserPhase = 'charge';
  player.laserPhaseT = 0;
  player.laserTickT = 0;
  player.laserFlashT = 0;
  player.shotCD = 0;
  if (player.sentinelDrones) {
    for (const d of player.sentinelDrones) { d.fireT = 0; d.flashT = 0; }
  }
  // 这波包含的所有种类
  const types = [...new Set(game.spawnQueue.map(s => s.type))];
  const newTypes = types.filter(t => !game.introduced.has(t));
  // boss 波: 1=首次, 2-4=新技能, 5=二阶段, 6+=完全体+诅咒
  if (game.wave === game.wavesPerRound) {
    game.bossEncounter = (game.bossEncounter || 0) + 1;
    if (!game.introduced.has('boss')) {
      game.introduced.add('boss');
      openBossEncounterIntro('first');
    } else if (game.bossEncounter <= 4) {
      openBossEncounterIntro('skill');
    } else if (game.bossEncounter === 5) {
      openBossEncounterIntro('phase2');
    } else {
      openBossEncounterIntro('cursed');
    }
    return;
  }
  // 非 boss 波
  if (newTypes.length > 0) {
    openEnemyIntro(newTypes);
  } else if (types.length > 1 || game.round >= 6) {
    // 组合波 或 round 6+ 单种 → 都走组合介绍 (内部会附带诅咒卡)
    openWaveComboIntro(types);
  }
  // 否则: round < 6 + 单种已介绍敌人 → state 保持 playing 直接战斗
}

// 抽一张诅咒: 牌堆空则重新洗 7 张. 可传 exclude 避免与当波已抽的同 id 重复
function drawCurse(exclude) {
  // 移除被除厄禁掉的诅咒
  const banned = player.bannedCurses;
  if (banned && banned.size) game.curseDeck = game.curseDeck.filter(id => !banned.has(id));
  if (game.curseDeck.length === 0) {
    const allowed = CURSES.filter(c => !(banned && banned.has(c.id))).map(c => c.id);
    if (allowed.length === 0) return null;
    game.curseDeck = allowed;
    for (let i = game.curseDeck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [game.curseDeck[i], game.curseDeck[j]] = [game.curseDeck[j], game.curseDeck[i]];
    }
  }
  if (exclude) {
    const idx = game.curseDeck.findIndex(id => id !== exclude);
    if (idx >= 0) return game.curseDeck.splice(idx, 1)[0];
  }
  return game.curseDeck.shift() || null;
}

// round >= 6 或玩家拥有恶魔之力时抽诅咒, 恶魔之力时抽 2 张不同 id (池子不足则只抽 1)
function getMaybeCurseCard() {
  if (game.easyMode) return null;
  if (game.round < 6 && !player.devilPower) return null;
  const first = drawCurse();
  if (!first) return null;  // 全部被除厄禁掉
  const ids = [first];
  if (player.devilPower) {
    const second = drawCurse(first);
    if (second) ids.push(second);
  }
  const curseHtmls = ids.map(id => {
    const curse = CURSES.find(c => c.id === id);
    return `
      <div class="card curse-card">
        <div class="ico" style="color:#ff7777; font-size:clamp(20px,5vmin,28px); margin-bottom:6px">☠</div>
        <div class="nm" style="color:#ff7777">${curse.n}</div>
        <div class="ds"><div class="b">${curse.desc}</div></div>
      </div>`;
  }).join('');
  let particles = '';
  for (let i = 0; i < 14; i++) {
    const left = (5 + Math.random() * 90).toFixed(1);
    const delay = (Math.random() * 2).toFixed(2);
    const drift = (Math.random() * 40 - 20).toFixed(1);
    const dur = (1.6 + Math.random() * 1.2).toFixed(2);
    particles += `<span class="curse-particle" style="left:${left}%; animation-delay:${delay}s; animation-duration:${dur}s; --drift:${drift}px"></span>`;
  }
  const cardsMax = ids.length > 1 ? 480 : 240;
  return {
    ids,
    html: `
      <div class="curse-section">
        <div class="curse-label">☠ 诅 咒 降 临${ids.length > 1 ? ' (恶魔之力 ×2)' : ''} ☠</div>
        <div class="cards one-row" style="--cols:${ids.length};max-width:${cardsMax}px;margin:0 auto">${curseHtmls}</div>
        <div class="curse-particles">${particles}</div>
      </div>`,
  };
}

}
