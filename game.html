function pickNormalShopItems(excludeItems) {
  const excludeSet = new Set(excludeItems || []);
  const avail = SHOP_ITEMS.filter(it => !excludeSet.has(it) && (!it.can || it.can(player)));
  const pool = avail.slice();
  const picks = [];
  while (picks.length < 3 && pool.length) {
    picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  // 池子不够时, 用未排除的备选填补 (理论上 SHOP_ITEMS 数量足够时不会触发)
  if (picks.length < 3) {
    const fallback = SHOP_ITEMS.filter(it => (!it.can || it.can(player)));
    while (picks.length < 3 && fallback.length) {
      picks.push(fallback.splice(Math.floor(Math.random() * fallback.length), 1)[0]);
    }
  }
  return picks;
}

function openShop(isBossClear) {
  game.state = 'shop';
  game.shopIsBoss = isBossClear;
  game.shopRefreshCost = 10;
  game.shopNormalPicks = pickNormalShopItems();
  // 进入商店时充满护盾, 让玩家以满状态开始下一波
  player.shield = player.maxShield;
  player.shieldDelay = 0;
  player.shieldRegenT = 0;
  renderShop();
}

function renderShop() {
  const isBossClear = game.shopIsBoss;
  overlay.className = 'overlay show';
  // 独特槽位: 玩家 uniqueSlots 长度 0-3, 不足补空槽
  const slots = player.uniqueSlots.slice();
  while (slots.length < 3) slots.push(null);

  overlay.innerHTML = `
    <div class="title">${isBossClear ? '★ Boss 已被击败' : '🛒 装备商店'}</div>
    <div class="subtitle">${isBossClear ? '准备进入第 ' + game.round + ' 轮' : '选购或直接开始下一波'}</div>
    <div id="ovCoin">金币: ${player.coin}</div>
    <div class="section-label">独 特 道 具</div>
    <div class="cards" id="uniqueSlotsRow"></div>
    <div class="section-label" style="color:#a4dfff">商 品</div>
    <div class="cards" id="normalCards"></div>
    <div class="shop-actions">
      <button id="repairBtn">战斗维修 (20金 +1HP)</button>
      <button id="refreshBtn">刷新 (${game.shopRefreshCost}金)</button>
    </div>
    <button id="ovClose">${isBossClear ? '开始下一轮' : '开始下一波'}</button>`;

  const uw = document.getElementById('uniqueSlotsRow');
  slots.forEach((it, i) => uw.appendChild(makeUniqueSlotCard(it, i)));

  const nw = document.getElementById('normalCards');
  game.shopNormalPicks.forEach((p, i) => nw.appendChild(makeNormalCard(p, i)));

  // 战斗维修
  const repairBtn = document.getElementById('repairBtn');
  const canRepair = player.coin >= 20 && player.hp < player.maxHp;
  if (!canRepair) repairBtn.disabled = true;
  repairBtn.onclick = () => {
    if (player.coin < 20 || player.hp >= player.maxHp) return;
    player.coin -= 20;
    player.hp = Math.min(player.maxHp, player.hp + 1);
    renderShop();
  };

  // 刷新
  const refreshBtn = document.getElementById('refreshBtn');
  if (player.coin < game.shopRefreshCost) refreshBtn.disabled = true;
  refreshBtn.onclick = () => {
    if (player.coin < game.shopRefreshCost) return;
    player.coin -= game.shopRefreshCost;
    game.shopRefreshCost += 10;
    // 排除当前还在槽位的商品, 避免刷新出相同道具
    const currentItems = game.shopNormalPicks.filter(p => p);
    game.shopNormalPicks = pickNormalShopItems(currentItems);
    renderShop();
  };

  document.getElementById('ovClose').onclick = () => {
    overlay.className = 'overlay';
    overlay.innerHTML = '';
    game.state = 'playing';
    startWave();
  };
}

function makeNormalCard(p, idx) {
  const el = document.createElement('div');
  if (!p) {
    el.className = 'card sold';
    el.innerHTML = `<div class="ico">·</div><div class="nm">已售出</div><div class="ds"></div><div class="pr"></div>`;
    return el;
  }
  const canBuy = player.coin >= p.cost
    && (!p.can || p.can(player))
    && (!p.buyCheck || p.buyCheck(player));
  el.className = 'card' + (canBuy ? '' : ' disabled');
  const goodHtml = (p.good || []).map(g => `<div class="g">${g}</div>`).join('');
  const badHtml = (p.bad || []).map(b => `<div class="b">${b}</div>`).join('');
  el.innerHTML = `<div class="ico">${p.ico}</div><div class="nm">${p.n}</div><div class="ds">${goodHtml}${badHtml}</div><div class="pr">${p.cost} 金</div>`;
  el.onclick = () => {
    if (!canBuy) return;
    player.coin -= p.cost;
    p.apply(player);
    game.shopNormalPicks[idx] = null;
    renderShop();
  };
  return el;
}

function makeUniqueSlotCard(it, slotIdx) {
  const el = document.createElement('div');
  if (!it) {
    el.className = 'card unique sold';
    el.innerHTML = `<div class="ico">·</div><div class="nm">[ 空 槽 ]</div><div class="ds"></div><div class="pr"></div>`;
    return el;
  }
  const canBuy = player.coin >= it.cost
    && (!it.can || it.can(player))
    && (!it.buyCheck || it.buyCheck(player));
  el.className = 'card unique' + (canBuy ? '' : ' disabled');
  const goodHtml = (it.good || []).map(g => `<div class="g">${g}</div>`).join('');
  const badHtml = (it.bad || []).map(b => `<div class="b">${b}</div>`).join('');
  el.innerHTML = `<div class="ico">${it.ico}</div><div class="nm">${it.n}</div><div class="ds">${goodHtml}${badHtml}</div><div class="pr">${it.cost} 金</div>`;
  el.onclick = () => {
    if (!canBuy) return;
    player.coin -= it.cost;
    it.apply(player);
    if (it.id) player.uniqueOwned[it.id] = true;
    // 从 uniqueSlots 移除
    const i = player.uniqueSlots.indexOf(it);
    if (i >= 0) player.uniqueSlots.splice(i, 1);
    renderShop();
  };
  return el;
}

// 拍快照: 保存本波正式开始时的玩家状态 + 关键 game 字段, 用于失败时重试
function snapshotWave() {
  game.waveSnapshot = {
    round: game.round, wave: game.wave,
    hp: player.hp, shield: player.shield, coin: player.coin,
    critRate: player.critRate, critDmg: player.critDmg,
    killHealCounter: player.killHealCounter,
    bonus: { ...bonus },
    killCount: game.killCount,
    killForLevel: game.killForLevel,
    level: game.level,
    activeCurses: [...game.activeCurses],
    mirrorsSpawned: false,
    bossEncounter: game.bossEncounter,
    spawnQueue: game.spawnQueue.map(s => ({ ...s })),
    spawnTimer: game.spawnTimer,
    curseDeck: game.curseDeck.slice(),
  };
}

function retryWave() {
  if (!game.waveSnapshot) return;
  const s = game.waveSnapshot;
  // 恢复玩家状态
  player.hp = s.hp;
  player.shield = s.shield;
  player.coin = s.coin;
  player.critRate = s.critRate;
  player.critDmg = s.critDmg;
  player.killHealCounter = s.killHealCounter;
  Object.assign(bonus, s.bonus);
  // 恢复 game 字段
  game.round = s.round;
  game.wave = s.wave;
  game.killCount = s.killCount;
  game.killForLevel = s.killForLevel;
  game.level = s.level;
  game.activeCurses = new Set(s.activeCurses || []);
  game.mirrorsSpawned = s.mirrorsSpawned;
  game.bossEncounter = s.bossEncounter;
  game.spawnQueue = s.spawnQueue.map(x => ({ ...x }));
  game.spawnTimer = s.spawnTimer;
  game.curseDeck = s.curseDeck.slice();
  // 清场
  enemies.length = 0;
  bullets.length = 0;
  coins.length = 0;
  particles.length = 0;
  floats.length = 0;
  shockwaves.length = 0;
  // 玩家位置 / 临时状态重置
  player.x = W / 2; player.y = H - 100;
  player.invuln = 1.0;
  player.shieldDelay = 0;
  player.shieldRegenT = 0;
  player.knockVx = 0; player.knockVy = 0; player.knockT = 0;
  player.voidT = 0;
  player.shotCD = 0;
  if (player.guardian) player.guardian.hitMap = new Map();
  recompute();
  if (player.hp > player.maxHp) player.hp = player.maxHp;
  if (player.shield > player.maxShield) player.shield = player.maxShield;
  // 关闭 overlay, 进入战斗
  overlay.className = 'overlay';
  overlay.innerHTML = '';
  game.state = 'playing';
  game.snapshotted = true; // 重试不重新拍快照, 用同一个
}

// Boss 战胜利后: 三选一独特道具, 选中后加入商店槽位 (满则顶替最早)
function openUniqueChoice() {
  const inSlots = new Set(player.uniqueSlots.map(it => it.id));
  const avail = SHOP_UNIQUE.filter(u =>
    !player.uniqueOwned[u.id]
    && !inSlots.has(u.id)
    && (!u.minRound || game.round >= u.minRound)
    && (!u.can || u.can(player))
  );
  if (avail.length === 0) {
    openShop(true);
    return;
  }
  game.state = 'uniqueChoice';
  const picks = [];
  const pool = avail.slice();
  for (let i = 0; i < 3 && pool.length; i++) {
    picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  overlay.className = 'overlay show';
  overlay.innerHTML = `
    <div class="title">★ Boss 已被击败</div>
    <div class="subtitle">三选一独特道具, 加入商店槽位 (购买后才生效)</div>
    <div class="cards" id="uniqueChoices"></div>`;
  const wrap = document.getElementById('uniqueChoices');
  picks.forEach(p => {
    const el = document.createElement('div');
    el.className = 'card unique';
    const goodHtml = (p.good || []).map(g => `<div class="g">${g}</div>`).join('');
    const badHtml = (p.bad || []).map(b => `<div class="b">${b}</div>`).join('');
    el.innerHTML = `<div class="ico">${p.ico}</div><div class="nm">${p.n}</div><div class="ds">${goodHtml}${badHtml}</div><div class="pr">${p.cost} 金</div>`;
    el.onclick = () => {
      player.uniqueSlots.push(p);
      while (player.uniqueSlots.length > 3) player.uniqueSlots.shift();
      openShop(true);
    };
    wrap.appendChild(el);
  });
}

function onWaveClear() {
  // 清场: 残留敌弹直接消除
  for (const b of bullets) if (b.from === 'enemy') b.dead = true;
  // 切换到金币收集阶段, 让屏幕上的金币高速回笼
  if (coins.length > 0) {
    game.state = 'collecting';
  } else {
    proceedToNextStage();
  }
}

function proceedToNextStage() {
  for (const b of bullets) if (b.from === 'player') b.dead = true;
  if (game.wave === game.wavesPerRound) {
    // 通关: 击败第 10 轮 boss
    if (game.round >= 10) {
      onGameVictory();
      return;
    }
    game.round++; game.wave = 1;
    openUniqueChoice(); // 先三选一独特, 再进商店
  } else {
    game.wave++;
    openShop(false);
  }
}

function onGameVictory() {
  game.state = 'victory';
  overlay.className = 'overlay show';
  overlay.innerHTML = `
    <div class="title" style="color:#ffd06a; letter-spacing:8px">★ 通 关 ★</div>
    <div class="subtitle" style="color:#ffd06a; opacity:0.85">击败第 10 轮 BOSS, 完成游戏</div>
    <div style="text-align:center; padding: clamp(16px,4vmin,28px) clamp(20px,5vmin,40px); margin: clamp(10px,2.5vmin,16px) 0; background:#10101e; border:2px solid #ffd06a; border-radius:8px; box-shadow:0 0 26px rgba(255,200,80,0.5);">
      <div style="font-size:clamp(28px,7vmin,42px); margin-bottom:8px">🏆</div>
      <div style="color:#ffd06a; font-size:clamp(13px,2.8vmin,15px); margin-bottom:6px">恭 喜 通 关</div>
      <div style="font-size: clamp(10px,2.2vmin,12px); opacity:0.75">坚持到第 ${game.round} 轮 · 等级 ${game.level} · 金币 ${player.coin}</div>
    </div>
    <button id="restart">重新开始</button>`;
  document.getElementById('restart').onclick = showStartScreen;
}

function onGameOver() {
  if (game.state === 'gameover') return;
  game.state = 'gameover';
  // 立即清空当前 overlay (商店等), 防止旧按钮被点击进入下一波
  overlay.className = 'overlay';
  overlay.innerHTML = '';
  addExplosion(player.x, player.y, '#6cf', 30);
  game.shake = Math.max(game.shake, 0.7);
  setTimeout(() => {
    overlay.className = 'overlay show';
    const canRetry = !!game.waveSnapshot;
    overlay.innerHTML = `
      <div class="title">飞机坠毁</div>
      <div class="subtitle">坚持到第 ${game.round} 轮 · 第 ${game.wave} 波</div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:6px">
        ${canRetry ? `<button id="retryBtn">重试本波</button>` : ''}
        <button id="restart">重新开始</button>
      </div>`;
    if (canRetry) document.getElementById('retryBtn').onclick = retryWave;
    document.getElementById('restart').onclick = showStartScreen;
  }, 800);
}

// ============== 视觉特效 ==============
function addExplosion(x, y, color, count = 14) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * TAU, sp = rand(60, 240);
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, t: rand(0.4, 0.9), life: 0.9, r: rand(2, 4), color });
  }
}
function addHitParticles(x, y) {
  for (let i = 0; i < 4; i++) {
    const a = Math.random() * TAU, sp = rand(40, 120);
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, t: 0.25, life: 0.25, r: rand(1.5, 2.5), color: '#fff' });
  }
}
function spawnCoins(x, y, n) {
  for (let i = 0; i < n; i++) {
    // 初始爆散方向偏上半圈 + 随机水平, 配合重力下坠手感更自然
    const a = -Math.PI / 2 + rand(-1.0, 1.0);
    const sp = rand(120, 220);
    coins.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, t: 0, v: 1, dead: false });
  }
}

// ============== 主更新 ==============
function update(dt) {
  game.time += dt;
  if (game.shake > 0) game.shake = Math.max(0, game.shake - dt);
  // 玩家正式进入战斗时拍快照, 用于重试本波
  if (game.state === 'playing' && !game.snapshotted) {
    snapshotWave();
    game.snapshotted = true;
  }

  // 玩家移动: 朝 pointer 目标点以 moveSpeed 匀速逼近, 距离不足则吸附
  if (pointer.down) {
    const tx = clamp(pointer.x, player.r, W - player.r);
    const ty = clamp(pointer.y, player.r, H - player.r);
    const dx = tx - player.x, dy = ty - player.y;
    const d = Math.hypot(dx, dy);
    if (d > 0.5) {
      const step = player.moveSpeed * dt;
      if (step >= d) { player.x = tx; player.y = ty; }
      else { player.x += dx / d * step; player.y += dy / d * step; }
    }
  }
  // 击退位移 (Boss 撞击触发)
  if (player.knockT > 0) {
    player.x += player.knockVx * dt;
    player.y += player.knockVy * dt;
    player.knockVx *= 0.88; player.knockVy *= 0.88;
    player.knockT -= dt;
    player.x = clamp(player.x, player.r, W - player.r);
    player.y = clamp(player.y, player.r, H - player.r);
  }

  // 自动射击 (仅 playing 状态; 收集阶段不再开火)
  if (game.state === 'playing') {
    player.shotCD -= dt;
    if (player.shotCD <= 0) {
      fire();
      player.shotCD = 1 / player.fireRate;
    }
  }

  // 护盾恢复: 受击后停顿 shieldRegenDelayBase 秒, 然后每 shieldRegenInterval 秒补 1 格
  if (player.shieldDelay > 0) {
    player.shieldDelay -= dt;
    player.shieldRegenT = 0;
  } else if (player.shield < player.maxShield) {
    player.shieldRegenT += dt;
    if (player.shieldRegenT >= player.shieldRegenInterval) {
      player.shieldRegenT -= player.shieldRegenInterval;
      player.shield = Math.min(player.maxShield, player.shield + 1);
    }
  }
  if (player.invuln > 0) player.invuln -= dt;
  // 虚无形态: 每 25 秒进入 5 秒无敌 (在第 20-25 秒激活)
  if (player.voidForm) {
    player.voidT = (player.voidT + dt) % 25;
    if (player.voidT >= 20) {
      player.invuln = Math.max(player.invuln, 0.5);
    }
  }

  // 生成: 场上无敌人时强制立即刷下一个; gap=0 的批内成员同帧连续刷
  if (game.spawnQueue.length) {
    if (enemies.length === 0) game.spawnTimer = 0;
    game.spawnTimer -= dt;
    while (game.spawnTimer <= 0 && game.spawnQueue.length) {
      spawnEnemy(game.spawnQueue.shift());
      if (!game.spawnQueue.length) break;
      game.spawnTimer += game.spawnQueue[0].gap;
    }
  }

  for (const e of enemies) updateEnemy(e, dt);
  for (const b of bullets) updateBullet(b, dt);
  updateShockwaves(dt);
  updateGuardian(dt);

  // 命中
  for (const b of bullets) {
    if (b.dead) continue;
    if (b.from === 'player') {
      for (const e of enemies) {
        if (e.dead) continue;
        if (b.hit && b.hit.has(e)) continue;
        if (dist(b, e) < e.r + b.r) {
          hitEnemy(e, b);
          if (b.pierce > 0) {
            b.pierce--;
            if (!b.hit) b.hit = new Set();
            b.hit.add(e);
          } else { b.dead = true; break; }
        }
      }
    } else {
      if (player.invuln <= 0 && dist(b, player) < player.r + b.r) {
        damagePlayer();
        b.dead = true;
      }
    }
  }

  // 以攻为守: 玩家子弹与敌弹接触双方消除 (激光是矩形不在此处)
  if (player.bulletParry) {
    for (let i = 0; i < bullets.length; i++) {
      const pb = bullets[i];
      if (pb.from !== 'player' || pb.dead) continue;
      for (let j = 0; j < bullets.length; j++) {
        const eb = bullets[j];
        if (eb.from !== 'enemy' || eb.dead) continue;
        if (Math.hypot(pb.x - eb.x, pb.y - eb.y) < pb.r + eb.r + 2) {
          pb.dead = true; eb.dead = true;
          addHitParticles(eb.x, eb.y);
          break;
        }
      }
    }
  }

  // 撞击: 普通敌机 → 摧毁敌机, 玩家所有盾被击破; 无盾则坠毁。Boss 不会被撞死, 走 1 点节流伤害。
  for (const e of enemies) {
    if (e.dead) continue;
    if (player.invuln > 0) continue;
    if (e.warningT > 0) continue; // 警示期间不会撞击
    const d = dist(e, player);
    if (e.boss) {
      if (d < e.r + player.r) collideKillBoss(e);
    } else if (e.type === 'mirror') {
      if (d < e.r + player.r) {
        // 双向破盾/即死: 镜像有盾则全清, 无盾则死; 玩家也走 collideKill
        if (e.invuln <= 0) {
          if (e.shield > 0) {
            e.shield = 0;
            e.invuln = e.invulnT;
            e.shieldDelay = e.shieldRegenDelayBase;
            e.shieldRegenT = 0;
            addHitParticles(e.x, e.y);
          } else {
            e.dead = true; e.killed = true;
            addExplosion(e.x, e.y, e.color, 28);
          }
        }
        collideKill();
      }
    } else if (d < e.r + player.r) {
      collideKill();
      e.dead = true;
      addExplosion(e.x, e.y, e.color, 14);
    }
  }

  // Boss 激光检测 (一阶段竖直 / 二阶段角激光 / 二阶段扫屏)
  for (const e of enemies) {
    if (!e.boss) continue;
    // 一阶段: 竖直激光柱
    if (e.laserState === 'fire' && e.laserWidth > 0 && player.invuln <= 0) {
      const halfW = e.laserWidth / 2;
      if (Math.abs(player.x - e.x) < halfW + player.r * 0.5 && player.y > e.y) {
        damagePlayer();
      }
    }
    // 二阶段角激光: 倒计时 + 碰撞
    if (e.cornerActive && e.cornerActive.length) {
      for (const cl of e.cornerActive) {
        cl.t -= dt;
        if (cl.t > 0.05 && player.invuln <= 0) {
          if (pointToLineDist(player.x, player.y, cl.x1, cl.y1, cl.x2, cl.y2) < 8 + player.r * 0.4) {
            damagePlayer();
          }
        }
      }
      e.cornerActive = e.cornerActive.filter(cl => cl.t > 0);
    }
    // 二阶段扫屏激光: 命中检测
    if (e.sweepState === 'fire' && e.sweepWidth > 0 && player.invuln <= 0) {
      const verts = getBossVertices(e);
      const sx = verts.bottom.x, sy = verts.bottom.y;
      const ex = sx + Math.cos(e.sweepCurrentA) * 1500;
      const ey = sy + Math.sin(e.sweepCurrentA) * 1500;
      if (pointToLineDist(player.x, player.y, sx, sy, ex, ey) < (e.sweepWidth / 2) + player.r * 0.4) {
        damagePlayer();
      }
    }
  }

  // 金币: 普通状态走重力下坠 + 磁吸; 收集阶段强制全图磁吸
  const GRAVITY = 320;
  for (const c of coins) {
    c.t += dt;
    if (game.state === 'collecting') {
      const a = Math.atan2(player.y - c.y, player.x - c.x);
      const sp = 720;
      c.x += Math.cos(a) * sp * dt;
      c.y += Math.sin(a) * sp * dt;
    } else {
      c.vx *= 0.96;
      c.vy += GRAVITY * dt;
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      const d = dist(c, player);
      if (d < player.magnetRange) {
        const a = Math.atan2(player.y - c.y, player.x - c.x);
        const speed = 280 + (1 - d / player.magnetRange) * 220;
        c.x += Math.cos(a) * speed * dt;
        c.y += Math.sin(a) * speed * dt;
      }
    }
    if (dist(c, player) < player.r + 8) {
      c.dead = true;
      // 贪婪: 主动拾取扣钱 (收集阶段不受影响, 仍然加钱)
      if (game.state !== 'collecting' && game.activeCurses.has('greed')) {
        player.coin = Math.max(0, player.coin - c.v);
      } else {
        player.coin += c.v;
      }
    }
    if (c.y > H + 20) {
      c.dead = true;
      // 贪婪: 飞出屏幕的金币反而进账 (收集阶段不触发)
      if (game.state !== 'collecting' && game.activeCurses.has('greed')) {
        player.coin += c.v;
      }
    }
  }

  // 粒子 / 浮字 / 星空
  for (const p of particles) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.95; p.vy *= 0.95;
    p.t -= dt;
  }
  for (const f of floats) { f.y -= 30 * dt; f.t -= dt; }
  for (const s of stars) { s.y += s.v * dt; if (s.y > H) { s.y = -2; s.x = Math.random()*W; } }

  // 清理
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.dead) {
      if (e.killed) {
        if (!e.boss && !e.summoned) game.killCount++;
        // 罪恶快感: 累计击杀, 每 30 个回 1 格生命
        if (player.killHealEnabled) {
          player.killHealCounter++;
          if (player.killHealCounter >= 30) {
            player.killHealCounter -= 30;
            if (player.hp < player.maxHp) {
              player.hp += 1;
              floats.push({ x: player.x, y: player.y - 14, t: 0.7, life: 0.7, txt: '+1 HP', color:'#7f7', size: 13 });
            }
          }
        }
        // Boss: 死亡时只掉剩余的一半 (随血掉一半已在 hitEnemy 触发)
        // 镜像: 按玩家当前金币动态算 (上限 50)
        let dropAmount;
        if (e.boss) dropAmount = Math.max(0, e.coin - (e.coinDropped || 0));
        else if (e.type === 'mirror') dropAmount = Math.min(50, Math.max(0, player.coin));
        else dropAmount = e.coin;
        spawnCoins(e.x, e.y, dropAmount);
        // 分裂体死亡时碎成两个加速度追踪玩家的小型体 (有惯性)
        if (e.split) {
          for (let k = 0; k < 2; k++) {
            const sc = e.scale || 1;
            enemies.push({
              x: e.x + (k === 0 ? -14 : 14),
              y: e.y,
              t: 0, type: 'shard', scale: sc,
              r: 12, maxHp: 12 * sc, hp: 12 * sc,
              vx: (k === 0 ? -120 : 120),
              vy: -60,
              accel: 240, maxSpeed: 260,
              coin: e.summoned ? 0 : 1,
              summoned: !!e.summoned,
              color: '#9fdcff',
              dead: false, killed: false,
            });
          }
        }
        if (!e.boss && game.killCount >= game.killForLevel && game.state === 'playing') {
          openLevelup();
        }
      }
      enemies.splice(i, 1);
    }
  }
  for (let i = bullets.length - 1; i >= 0; i--) if (bullets[i].dead) bullets.splice(i, 1);
  for (let i = particles.length - 1; i >= 0; i--) if (particles[i].t <= 0) particles.splice(i, 1);
  for (let i = coins.length - 1; i >= 0; i--) if (coins[i].dead) coins.splice(i, 1);
  for (let i = floats.length - 1; i >= 0; i--) if (floats[i].t <= 0) floats.splice(i, 1);

  if (!enemies.length && !game.spawnQueue.length && game.state === 'playing') {
    // 嫉妒诅咒: 清空敌人后召唤一个镜像分身, 镜像被消灭后再进入下一波流程
    if (game.activeCurses.has('envy') && !game.mirrorsSpawned) {
      spawnMirrorEnemy();
      game.mirrorsSpawned = true;
    } else {
      onWaveClear();
    }
  }
  // 收集阶段: 金币全部到位后进入商店
  if (game.state === 'collecting' && coins.length === 0) {
    proceedToNextStage();
  }
}

// ============== 渲染 ==============
function draw() {
  ctx.save();
  if (game.shake > 0) {
    const sx = (Math.random() - 0.5) * game.shake * 18;
    const sy = (Math.random() - 0.5) * game.shake * 18;
    ctx.translate(sx, sy);
  }
  ctx.fillStyle = '#04040c';
  ctx.fillRect(-30, -30, W+60, H+60);

  // 星空
  for (const s of stars) {
    ctx.globalAlpha = s.s / 1.8;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }
  ctx.globalAlpha = 1;

  for (const c of coins) drawCoin(c);
  // 玩家子弹最先 (最底层弹幕), 然后敌人/守护球, 最后敌弹与玩家
  for (const b of bullets) if (b.from === 'player') drawBullet(b);
  for (const e of enemies) drawEnemy(e);
  drawShockwaves();
  drawGuardian();
  for (const b of bullets) if (b.from === 'enemy') drawBullet(b);
  // 己方飞机最后绘制, 始终在所有弹幕之上
  if (game.state !== 'gameover') drawPlayer();

  for (const p of particles) {
    ctx.globalAlpha = clamp(p.t / p.life, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.r/2, p.y - p.r/2, p.r, p.r);
  }
  ctx.globalAlpha = 1;

  for (const f of floats) {
    ctx.globalAlpha = clamp(f.t / f.life, 0, 1);
    ctx.fillStyle = f.color;
    ctx.font = `bold ${f.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  const boss = enemies.find(e => e.boss);
  if (boss) drawBossHpBar(boss);

  ctx.restore();

  // 暂停 / 恢复倒计时遮罩 (在屏幕震动 restore 之外, 不抖动)
  if (game.state === 'paused') {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#cef';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('已 暂 停', W / 2, H / 2);
    ctx.font = '13px sans-serif';
    ctx.fillStyle = 'rgba(200,220,240,0.7)';
    ctx.fillText('点击右上角按钮恢复', W / 2, H / 2 + 40);
    ctx.textBaseline = 'alphabetic';
  } else if (game.state === 'resuming') {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
    ctx.fillRect(0, 0, W, H);
    const num = Math.max(1, Math.ceil(game.resumeT));
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 90px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // 数字逐秒变化时弹跳
    const phase = 1 - (game.resumeT - Math.floor(game.resumeT));
    const sc = 0.85 + 0.25 * Math.exp(-phase * 4);
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(sc, sc);
    ctx.fillText(num, 0, 0);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  // 磁吸范围 (略浅虚线圆 + 极淡填充, 不抢眼但能看出来)
  if (player.magnetRange > 0) {
    ctx.save();
    ctx.fillStyle = 'rgba(255, 220, 100, 0.04)';
    ctx.beginPath(); ctx.arc(0, 0, player.magnetRange, 0, TAU); ctx.fill();
    ctx.strokeStyle = 'rgba(255, 220, 100, 0.22)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.beginPath(); ctx.arc(0, 0, player.magnetRange, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  if (player.invuln > 0 && Math.floor(player.invuln * 20) % 2 === 0) ctx.globalAlpha = 0.45;
  // 飞机本体按 player.r 缩放 (基础 r=13). 巨人 / 暴食时 r 翻倍, 视觉同步放大
  ctx.save();
  const sc = player.r / 13;
  ctx.scale(sc, sc);
  // 引擎尾焰
  const flame = Math.random() * 5 + 7;
  const grad = ctx.createLinearGradient(0, 10, 0, 10 + flame);
  grad.addColorStop(0, '#fa3'); grad.addColorStop(1, 'rgba(255,150,50,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-5, 10); ctx.lineTo(0, 10 + flame); ctx.lineTo(5, 10);
  ctx.closePath(); ctx.fill();
  // 机身
  ctx.fillStyle = '#6cf';
  ctx.beginPath();
  ctx.moveTo(0, -16); ctx.lineTo(13, 12); ctx.lineTo(0, 7); ctx.lineTo(-13, 12);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#cef';
  ctx.fillRect(-2, -7, 4, 9);
  ctx.restore();
  // 护盾光环 (有盾时叠一圈)
  if (player.shield > 0) {
    ctx.strokeStyle = `rgba(102, 200, 255, ${0.25 + 0.4 * (player.shield / player.maxShield)})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, player.r + 7, 0, TAU);
    ctx.stroke();
  }
  // 虚无形态激活期: 紫色脉动光环
  if (player.voidForm && player.voidT >= 20) {
    const pulse = 0.4 + 0.4 * Math.sin(player.voidT * 8);
    ctx.strokeStyle = `rgba(180, 140, 255, ${pulse})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, player.r + 12, 0, TAU);
    ctx.stroke();
    ctx.strokeStyle = `rgba(220, 180, 255, ${pulse * 0.7})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, player.r + 4, 0, TAU);
    ctx.stroke();
  }
  ctx.restore();
  drawPlayerHpBar();
  drawPlayerShieldBar();
}

// 横排格子血条, 飞机正下方
function drawPlayerHpBar() {
  const cap = player.maxHp;
  if (cap <= 0) return;
  // 格数多时缩小宽度
  const cellW = cap > 10 ? 5 : 7, cellH = 4, gap = 2;
  const totalW = cap * (cellW + gap) - gap;
  const startX = Math.round(player.x - totalW / 2);
  const y = Math.round(player.y + player.r + 8);
  for (let i = 0; i < cap; i++) {
    const x = startX + i * (cellW + gap);
    if (i < player.hp) {
      ctx.fillStyle = '#f55';
      ctx.fillRect(x, y, cellW, cellH);
      ctx.fillStyle = '#fcc';
      ctx.fillRect(x, y, cellW, 1);
    } else {
      ctx.fillStyle = '#3a0808';
      ctx.fillRect(x, y, cellW, cellH);
    }
  }
}

// 纵排格子护盾, 飞机左侧, 从底向上为已存在的格
function drawPlayerShieldBar() {
  const cap = player.maxShield;
  if (cap <= 0) return;
  const cellH = cap > 8 ? 5 : 7, cellW = 4, gap = 2;
  const totalH = cap * (cellH + gap) - gap;
  const x = Math.round(player.x - player.r - 10 - cellW);
  const startY = Math.round(player.y - totalH / 2);
  for (let i = 0; i < cap; i++) {
    const yy = startY + i * (cellH + gap);
    // 底部是先有的盾, 顶部最后才填满
    const filled = (cap - i) <= player.shield;
    if (filled) {
      ctx.fillStyle = '#5cf';
      ctx.fillRect(x, yy, cellW, cellH);
      ctx.fillStyle = '#cef';
      ctx.fillRect(x, yy, 1, cellH);
    } else {
      ctx.fillStyle = '#0a1828';
      ctx.fillRect(x, yy, cellW, cellH);
    }
  }
}

// 仅画形状, 无位移 (供敌人介绍卡片复用). e 可省略, 用于 bomber 闪烁状态
function drawEnemyShape(g, type, r, color, e) {
  g.fillStyle = color;
  if (type === 'boss') {
    if (e && e.phase2) {
      // 二阶段: 倒三角形态 (尖端朝下)
      g.beginPath();
      g.moveTo(0, r);
      g.lineTo(r, -r * 0.7);
      g.lineTo(-r, -r * 0.7);
      g.closePath(); g.fill();
      g.fillStyle = '#fff';
      g.beginPath(); g.arc(0, -r * 0.2, Math.max(3, r * 0.14), 0, TAU); g.fill();
      g.fillStyle = '#ff8';
      g.beginPath(); g.arc(0, -r * 0.2, Math.max(2, r * 0.07), 0, TAU); g.fill();
    } else {
      // 一阶段: 五边形/七边形装甲
      g.beginPath();
      g.moveTo(0, r);
      g.lineTo(r, r * 0.2);
      g.lineTo(r * 0.8, -r * 0.5);
      g.lineTo(r * 0.3, -r);
      g.lineTo(-r * 0.3, -r);
      g.lineTo(-r * 0.8, -r * 0.5);
      g.lineTo(-r, r * 0.2);
      g.closePath(); g.fill();
      g.fillStyle = '#fff';
      g.beginPath(); g.arc(0, 0, Math.max(3, r * 0.12), 0, TAU); g.fill();
      g.fillStyle = '#ff8';
      g.beginPath(); g.arc(0, 0, Math.max(2, r * 0.06), 0, TAU); g.fill();
    }
  } else if (type === 'rusher') {
    g.beginPath();
    g.moveTo(0, r); g.lineTo(r, -r * 0.5); g.lineTo(-r, -r * 0.5);
    g.closePath(); g.fill();
  } else if (type === 'zigzag') {
    g.beginPath(); g.arc(0, 0, r, 0, TAU); g.fill();
    g.fillStyle = '#000'; g.fillRect(-3, -3, 6, 6);
  } else if (type === 'shooter') {
    g.fillRect(-r, -r * 0.6, r * 2, r * 1.2);
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(0, 0, 3, 0, TAU); g.fill();
  } else if (type === 'elite') {
    g.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = i * TAU / 6 - Math.PI/2;
      const rr = i % 2 === 0 ? r : r * 0.6;
      const x = Math.cos(a)*rr, y = Math.sin(a)*rr;
      i === 0 ? g.moveTo(x, y) : g.lineTo(x, y);
    }
    g.closePath(); g.fill();
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(0, 0, Math.max(3, r * 0.25), 0, TAU); g.fill();
  } else if (type === 'bomber') {
    let alpha = 1;
    if (e && e.armed) {
      const blink = Math.sin(e.t * 30 + (1.2 - e.fuseT) * 8) > 0;
      alpha = blink ? 1 : 0.5;
    }
    g.globalAlpha = alpha;
    g.beginPath(); g.arc(0, 0, r, 0, TAU); g.fill();
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(0, 0, Math.max(3, r * 0.35), 0, TAU); g.fill();
    g.fillStyle = '#ff8';
    g.beginPath(); g.arc(0, 0, Math.max(2, r * 0.18), 0, TAU); g.fill();
    g.globalAlpha = 1;
  } else if (type === 'splitter') {
    g.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = i * TAU / 6;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      i === 0 ? g.moveTo(x, y) : g.lineTo(x, y);
    }
    g.closePath(); g.fill();
    g.fillStyle = '#fff';
    g.fillRect(-1, -r * 0.7, 2, r * 1.4);
    g.fillRect(-r * 0.7, -1, r * 1.4, 2);
  } else if (type === 'gunship') {
    g.fillRect(-r, -r * 0.7, r * 2, r * 1.4);
    g.fillRect(-r * 0.4, r * 0.5, r * 0.8, r * 0.7);
    g.fillStyle = '#fff';
    g.fillRect(-r * 0.7, -r * 0.4, r * 0.4, 4);
    g.fillRect(r * 0.3, -r * 0.4, r * 0.4, 4);
    g.fillStyle = '#ffe';
    g.fillRect(-2, -3, 4, 6);
  } else if (type === 'mirror') {
    // 镜像: 玩家飞机倒置形状 + 紫红色
    g.fillStyle = color;
    g.beginPath();
    g.moveTo(0, r * 1.2);
    g.lineTo(r, -r * 0.9);
    g.lineTo(0, -r * 0.5);
    g.lineTo(-r, -r * 0.9);
    g.closePath(); g.fill();
    g.fillStyle = '#ffd6f5';
    g.fillRect(-2, -3, 4, 7);
  } else if (type === 'interceptor') {
    // 拦截机: 横向菱形 + 中心瞄准点
    g.beginPath();
    g.moveTo(r, 0);
    g.lineTo(0, -r * 0.75);
    g.lineTo(-r, 0);
    g.lineTo(0, r * 0.75);
    g.closePath(); g.fill();
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(0, 0, 3, 0, TAU); g.fill();
  } else if (type === 'spiker') {
    // 钉刺机: 三尖刺 (向上)
    g.beginPath();
    g.moveTo(0, -r);
    g.lineTo(r * 0.7, r * 0.6);
    g.lineTo(0, r * 0.3);
    g.lineTo(-r * 0.7, r * 0.6);
    g.closePath(); g.fill();
    g.fillStyle = '#fff';
    g.fillRect(-2, -r * 0.5, 4, 4);
  } else if (type === 'shard') {
    // 分裂碎片: 菱形, 中心对称 (无朝向)
    g.beginPath();
    g.moveTo(0, r);
    g.lineTo(r * 0.85, 0);
    g.lineTo(0, -r);
    g.lineTo(-r * 0.85, 0);
    g.closePath(); g.fill();
    g.fillStyle = '#fff';
    g.fillRect(-1.5, -1.5, 3, 3);
  }
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  // 警示期: 飞机半透明 + 红色虚线圈闪烁
  if (e.warningT > 0) {
    const blink = Math.sin(e.warningT * 30) > 0 ? 0.85 : 0.35;
    ctx.save();
    ctx.globalAlpha = blink;
    ctx.strokeStyle = '#ff4d4d';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.arc(0, 0, e.r + 8, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    ctx.globalAlpha = 0.45;
  }
  // 镜像在无敌时间内闪烁
  if (e.type === 'mirror' && e.invuln > 0 && Math.floor(e.invuln * 20) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }
  drawEnemyShape(ctx, e.type, e.r, e.color, e);
  // 镜像有盾时叠光环
  if (e.type === 'mirror' && e.shield > 0) {
    ctx.strokeStyle = `rgba(220, 120, 220, ${0.25 + 0.4 * (e.shield / Math.max(1, e.maxShield))})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, e.r + 6, 0, TAU); ctx.stroke();
  }
  ctx.restore();
  // 镜像出场无敌: 金色脉动光环
  if (e.type === 'mirror' && e.spawnInvulnT > 0) {
    ctx.save();
    const pulse = 0.5 + 0.4 * Math.sin(game.time * 6);
    ctx.strokeStyle = `rgba(255, 200, 80, ${pulse})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 8, 0, TAU); ctx.stroke();
    ctx.strokeStyle = '#ffd06a';
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const a0 = game.time * 2 + i * Math.PI / 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r + 14, a0, a0 + Math.PI / 7);
      ctx.stroke();
    }
    ctx.restore();
  }
  // Boss 入场无敌: 旋转金色光环
  if (e.boss && e.invuln) {
    ctx.save();
    const pulse = 0.5 + 0.4 * Math.sin(game.time * 6);
    ctx.strokeStyle = `rgba(255, 200, 80, ${pulse})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 10, 0, TAU); ctx.stroke();
    ctx.strokeStyle = '#ffd06a';
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const a0 = game.time * 2 + i * Math.PI / 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r + 16, a0, a0 + Math.PI / 7);
      ctx.stroke();
    }
    ctx.restore();
  }
  // 二阶段角激光: 锁定虚线 + 实激光
  if (e.boss && e.phase2 && e.cornerLaserInit) {
    const verts = getBossVertices(e);
    const t = e.phaseT;
    for (let i = 0; i < 3; i++) {
      const c = e.corners[i];
      // 锁定阶段虚线警告 (仅预瞄线, 不标玩家位置)
      if (t >= c.lockT && t < c.fireT && e.cornerTargets[i]) {
        const start = verts[c.key];
        const tgt = e.cornerTargets[i];
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 120, 200, 0.55)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 6]);
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(tgt.x, tgt.y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }
    // 已激活的激光线
    for (const cl of e.cornerActive || []) {
      const a = clamp(cl.t / cl.life, 0, 1);
      ctx.save();
      ctx.strokeStyle = `rgba(255, 100, 200, ${a})`;
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(cl.x1, cl.y1); ctx.lineTo(cl.x2, cl.y2); ctx.stroke();
      ctx.strokeStyle = `rgba(255, 255, 255, ${a})`;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(cl.x1, cl.y1); ctx.lineTo(cl.x2, cl.y2); ctx.stroke();
      ctx.restore();
    }
  }
  // 二阶段扫屏激光
  if (e.boss && e.phase2 && e.sweepWidth > 0) {
    const verts = getBossVertices(e);
    const sx = verts.bottom.x, sy = verts.bottom.y;
    const a = e.sweepCurrentA;
    const ex = sx + Math.cos(a) * 1500, ey = sy + Math.sin(a) * 1500;
    ctx.save();
    if (e.sweepState === 'charge') {
      ctx.strokeStyle = 'rgba(255, 140, 200, 0.45)';
      ctx.lineWidth = e.sweepWidth;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    } else if (e.sweepState === 'fire') {
      ctx.strokeStyle = 'rgba(255, 100, 200, 0.85)';
      ctx.lineWidth = e.sweepWidth;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    }
    ctx.restore();
  }
  // Boss 激光柱
  if (e.boss && e.laserWidth > 0) {
    const lw = e.laserWidth;
    const grad = ctx.createLinearGradient(e.x, e.y, e.x, H);
    if (e.laserState === 'charge') {
      grad.addColorStop(0, 'rgba(255, 140, 200, 0.55)');
      grad.addColorStop(1, 'rgba(255, 80, 180, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(e.x - lw / 2, e.y, lw, H - e.y);
      // 充能时的细线警告
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillRect(e.x - 0.5, e.y, 1, H - e.y);
    } else if (e.laserState === 'fire') {
      grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
      grad.addColorStop(0.08, 'rgba(255, 100, 200, 0.95)');
      grad.addColorStop(1, 'rgba(255, 60, 160, 0.5)');
      ctx.fillStyle = grad;
      ctx.fillRect(e.x - lw / 2, e.y, lw, H - e.y);
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x - 1.5, e.y, 3, H - e.y);
    }
  }
  if (e.type === 'mirror') {
    const w = e.r * 2;
    if (e.maxShield > 0) {
      ctx.fillStyle = '#0a1828';
      ctx.fillRect(e.x - w/2, e.y - e.r - 11, w, 3);
      ctx.fillStyle = '#5cf';
      ctx.fillRect(e.x - w/2, e.y - e.r - 11, w * (e.shield / e.maxShield), 3);
    }
    ctx.fillStyle = '#400';
    ctx.fillRect(e.x - w/2, e.y - e.r - 7, w, 3);
    ctx.fillStyle = '#f66';
    ctx.fillRect(e.x - w/2, e.y - e.r - 7, w * (e.hp / e.maxHp), 3);
  } else if (!e.boss && e.hp < e.maxHp) {
    const w = e.r * 2;
    ctx.fillStyle = '#400';
    ctx.fillRect(e.x - w/2, e.y - e.r - 7, w, 3);
    ctx.fillStyle = '#f66';
    ctx.fillRect(e.x - w/2, e.y - e.r - 7, w * (e.hp / e.maxHp), 3);
  }
}

function drawBullet(b) {
  if (b.from === 'player') {
    const cc = b.critCount || 0;
    if (cc >= 2) ctx.fillStyle = '#ff4d5e';        // 深度暴击 - 红
    else if (cc >= 1) ctx.fillStyle = '#ffe066';   // 暴击 - 黄
    else ctx.fillStyle = '#bfe4ff';                 // 普通 - 蓝
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
    // 中心白点 (装饰性, 大小固定不随 b.r 缩放)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, 1.5, 0, TAU); ctx.fill();
  } else {
    ctx.fillStyle = '#d63a3a';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#d63a3a'; ctx.lineWidth = 1; ctx.stroke();
  }
}

function drawCoin(c) {
  ctx.save();
  ctx.translate(c.x, c.y);
  const sc = 0.85 + Math.sin(c.t * 8) * 0.2;
  ctx.scale(sc, 1);
  ctx.fillStyle = '#fc4';
  ctx.beginPath(); ctx.arc(0, 0, 5, 0, TAU); ctx.fill();
  ctx.fillStyle = '#fa2';
  ctx.fillRect(-1, -3, 2, 6);
  ctx.restore();
}

function drawBossHpBar(b) {
  const w = W - 80, h = 12, x = 40, y = 14;
  ctx.fillStyle = '#400'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#f48'; ctx.fillRect(x, y, w * (b.hp / b.maxHp), h);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('BOSS', W/2, y + 9);
}

// ============== UI 文本 ==============
function updateUI() {
  document.getElementById('round').textContent = game.round;
  document.getElementById('wave').textContent = game.wave + (game.wave === game.wavesPerRound ? ' (BOSS)' : '');
  document.getElementById('level').textContent = game.level;
  document.getElementById('kill').textContent = game.killCount;
  document.getElementById('killNeed').textContent = game.killForLevel;
  document.getElementById('expBar').style.width = clamp(game.killCount / game.killForLevel, 0, 1) * 100 + '%';
  document.getElementById('coin').textContent = player.coin;
  // 玩家属性: 一项一行右对齐
  const lines = [];
  lines.push(`攻击 ${player.atk.toFixed(1)}`);
  lines.push(`射速 ${player.fireRate.toFixed(2)}/s`);
  lines.push(`弹速 ${Math.round(player.bulletSpeed)}`);
  lines.push(`移速 ${Math.round(player.moveSpeed)}`);
  lines.push(`暴击 ${(player.critRate*100).toFixed(0)}%`);
  lines.push(`暴伤 ×${player.critDmg.toFixed(2)}`);
  if (player.projectiles > 1) lines.push(`<span class="extra">弹道 ${player.projectiles}</span>`);
  if (player.pierce > 0) lines.push(`<span class="extra">穿透 ${player.pierce}</span>`);
  if (player.homing > 0) lines.push(`<span class="extra">追踪</span>`);
  if (player.evade > 0) lines.push(`<span class="extra">闪避 ${(player.evade*100).toFixed(0)}%</span>`);
  document.getElementById('stats').innerHTML = lines.map(s => `<div>${s}</div>`).join('');
  // 暂停按钮仅在战斗 / 已暂停 / 倒计时 时显示
  const showPause = game.state === 'playing' || game.state === 'collecting' || game.state === 'paused' || game.state === 'resuming';
  pauseBtn.classList.toggle('show', showPause);
}

// ============== 主循环 ==============
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  if (game.state === 'playing' || game.state === 'collecting') {
    update(dt);
  } else if (game.state === 'resuming') {
    // 倒计时 3 秒, 不更新游戏
    game.resumeT -= dt;
    if (game.resumeT <= 0) {
      game.state = 'playing';
      pauseBtn.textContent = '⏸';
    }
  } else {
    for (const s of stars) { s.y += s.v * dt * 0.3; if (s.y > H) { s.y = -2; s.x = Math.random()*W; } }
  }
  draw();
  updateUI();
  requestAnimationFrame(loop);
}

// 暂停按钮
const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (game.state === 'playing' || game.state === 'collecting') {
    game.prevState = game.state;
    game.state = 'paused';
    pauseBtn.textContent = '▶';
  } else if (game.state === 'paused') {
    game.state = 'resuming';
    game.resumeT = 3;
  }
});

requestAnimationFrame(loop);

showStartScreen();
</script>
