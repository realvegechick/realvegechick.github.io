<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>飞机大战 · 肉鸽</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; width:100%; }
  html { height:100%; }
  body {
    height:100vh; height:100dvh;
    background:#05050c; color:#e8e8f0;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; user-select:none; -webkit-user-select:none;
    overscroll-behavior:none; touch-action:none;
  }
  /* 容器按 540:780 比例锁定, 等比缩放至窗口最大可放下尺寸 */
  #wrap {
    position:relative;
    width: min(100vw, calc(100dvh * 540 / 780));
    height: min(100dvh, calc(100vw * 780 / 540));
    max-width: 100vw;
    max-height: 100dvh;
  }
  canvas {
    display:block; width:100%; height:100%;
    background:linear-gradient(180deg,#04040c,#0a0a1c);
    border:1px solid #2a2a3e;
    touch-action:none;
  }

  /* 右上暂停按钮 (与 HUD 风格协调: 半透明深底, 细蓝边) */
  #pauseBtn {
    position: absolute;
    top: clamp(4px, 1vmin, 8px);
    right: clamp(4px, 1vmin, 8px);
    width: clamp(22px, 4.5vmin, 28px);
    height: clamp(22px, 4.5vmin, 28px);
    background: rgba(15, 22, 36, 0.6);
    border: 1px solid rgba(100, 140, 190, 0.35);
    color: rgba(180, 215, 240, 0.85);
    font-size: clamp(11px, 2.4vmin, 14px);
    cursor: pointer;
    border-radius: 3px;
    pointer-events: auto;
    z-index: 11;
    display: none;
    align-items: center;
    justify-content: center;
    user-select: none;
    padding: 0;
    line-height: 1;
    font-family: inherit;
    margin: 0;
    transition: background .15s, border-color .15s;
  }
  #pauseBtn:hover {
    background: rgba(30, 50, 80, 0.85);
    border-color: rgba(140, 200, 255, 0.6);
    color: #dbeeff;
  }
  #pauseBtn.show { display: flex; }

  /* HUD: 使用 vmin 让字号随窗口缩放. z-index 高于 overlay, 在商店时仍可见 */
  #hud {
    position:absolute; top:1.2vmin; left:1.6vmin; right:1.6vmin;
    pointer-events:none;
    font-size: clamp(10px, 2.4vmin, 13px);
    display:flex; justify-content:space-between; line-height:1.45;
    z-index: 10;
  }
  .bar {
    width: clamp(70px, 22vmin, 140px);
    height: clamp(4px, 1.2vmin, 7px);
    background:#1a1a2a; border:1px solid #333; margin:2px 0 3px; overflow:hidden;
  }
  .bar > div { height:100%; transition:width .15s ease-out; }
  .exp > div { background:linear-gradient(90deg,#fc4,#ffe080); }
  .right { text-align:right; padding-top: clamp(28px, 5.5vmin, 36px); }
  .stats-line {
    font-size: clamp(9px, 2vmin, 11px);
    opacity:.78; margin-top:4px; line-height:1.5;
    display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
  }
  .stats-line > div {
    white-space: nowrap;
  }
  .stats-line .extra { color:#9fc4ee; }

  /* 弹窗 */
  .overlay {
    position:absolute; inset:0;
    background:rgba(5,5,15,.92);
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    pointer-events:auto;
    padding: clamp(10px, 3vmin, 22px);
    backdrop-filter:blur(2px);
    overflow-y:auto;
  }
  .overlay.show { display:flex; }
  .title {
    font-size: clamp(17px, 4.6vmin, 24px);
    margin-bottom: 4px; color:#6cf; letter-spacing:2px; text-align:center;
  }
  .subtitle {
    font-size: clamp(10px, 2.4vmin, 13px);
    opacity:.6; margin-bottom: clamp(8px, 2.5vmin, 16px); text-align:center;
  }

  /* 卡片用 grid, 在窄屏自动 2 列, 宽屏 3-4 列 */
  .cards {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(120px, 28vmin, 160px), 1fr));
    gap: clamp(6px, 1.6vmin, 12px);
    width:100%; max-width: 540px;
  }
  .card {
    background:#10101e; border:2px solid #2a2a44; border-radius:6px;
    padding: clamp(8px, 2vmin, 14px) clamp(6px, 1.5vmin, 12px);
    cursor:pointer; transition:all .15s; text-align:center; pointer-events:auto;
  }
  .card:active { transform: scale(0.97); }
  .card:hover { border-color:#6cf; transform:translateY(-3px); box-shadow:0 4px 16px rgba(102,200,255,.25); }
  .card.disabled { opacity:.4; cursor:not-allowed; }
  .card.disabled:hover { transform:none; border-color:#2a2a44; box-shadow:none; }
  .card .ico { font-size: clamp(20px, 5vmin, 28px); margin-bottom:3px; line-height:1; }
  .card .nm { color:#6cf; font-weight:bold; font-size: clamp(12px, 2.7vmin, 14px); margin:3px 0; }
  .card .ds {
    font-size: clamp(10px, 2.2vmin, 12px);
    opacity:.95; line-height:1.45; min-height: clamp(28px, 7vmin, 36px);
    display:flex; flex-direction:column; gap:1px;
  }
  .card .ds .g { color:#a4dfff; }
  .card .ds .b { color:#ff8a8a; }
  /* 独特道具: 金色边框 + 微光 */
  .card.unique { border-color:#fc4; box-shadow:0 0 0 1px rgba(255,200,80,0.35) inset, 0 0 14px rgba(255,200,80,0.18); }
  .card.unique:hover { border-color:#ffd06a; box-shadow:0 0 0 1px rgba(255,200,80,0.5) inset, 0 4px 20px rgba(255,200,80,0.45); }
  .card.unique .nm { color:#ffd06a; }
  .card.unique.disabled { box-shadow:none; }
  /* 已售出占位卡 */
  .card.sold { opacity:0.18; cursor:default; pointer-events:none; }
  .card.sold:hover { transform:none; border-color:#2a2a44; box-shadow:none; }
  .section-label {
    font-size: clamp(10px, 2.4vmin, 12px);
    color:#fc4; opacity:0.85;
    margin: clamp(4px, 1vmin, 8px) 0 clamp(4px, 1vmin, 6px);
    letter-spacing:1.5px; text-align:center;
  }
  .unique-row { max-width: clamp(150px, 32vmin, 220px); margin-bottom: clamp(8px, 2vmin, 14px); }
  .shop-actions {
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    margin-top: clamp(8px, 2vmin, 14px);
  }
  .shop-actions button {
    margin-top: 0;
    padding: clamp(6px, 1.5vmin, 9px) clamp(12px, 3vmin, 18px);
    font-size: clamp(11px, 2.4vmin, 13px);
  }
  .shop-actions button:disabled { opacity:0.4; cursor:not-allowed; background:#1a3a5a; }
  .card.curse-card {
    border-color:#e34a4a; cursor:default;
    box-shadow:0 0 0 1px rgba(227,74,74,0.4) inset, 0 0 18px rgba(227,74,74,0.4);
    animation: curseGlow 1.6s ease-in-out infinite;
  }
  .card.curse-card:hover { transform:none; }
  @keyframes curseGlow {
    0%, 100% { box-shadow:0 0 0 1px rgba(227,74,74,0.4) inset, 0 0 18px rgba(227,74,74,0.4); }
    50%      { box-shadow:0 0 0 1px rgba(255,90,90,0.7) inset, 0 0 28px rgba(255,90,90,0.7); }
  }
  .curse-section {
    position: relative;
    width: 100%;
    margin: clamp(8px, 2vmin, 14px) 0 clamp(2px, 0.6vmin, 6px);
    padding: clamp(8px, 1.8vmin, 12px) 0 clamp(28px, 6vmin, 40px);
    border-top: 1px solid rgba(227,74,74,0.35);
    border-bottom: 1px solid rgba(227,74,74,0.35);
    overflow: hidden;
  }
  .curse-label {
    color:#ff5e5e;
    font-size: clamp(11px, 2.6vmin, 14px);
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: clamp(6px, 1.5vmin, 10px);
    text-shadow: 0 0 8px rgba(255,80,80,0.6);
    animation: curseLabelPulse 1.4s ease-in-out infinite;
  }
  @keyframes curseLabelPulse {
    0%, 100% { opacity: 0.85; text-shadow: 0 0 6px rgba(255,80,80,0.5); }
    50%      { opacity: 1;    text-shadow: 0 0 14px rgba(255,80,80,1); }
  }
  .curse-particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .curse-particle {
    position: absolute;
    bottom: 0;
    width: 4px; height: 4px;
    background: #ff5050;
    border-radius: 50%;
    box-shadow: 0 0 8px #ff7777, 0 0 14px rgba(255,80,80,0.4);
    animation: curseFloat linear infinite;
    --drift: 0px;
  }
  @keyframes curseFloat {
    0%   { transform: translate(0, 0) scale(0.6); opacity: 0; }
    10%  { opacity: 0.95; }
    100% { transform: translate(var(--drift), -120%) scale(0.2); opacity: 0; }
  }
  .enemy-card { cursor:default; }
  .enemy-card:hover { transform:none; border-color:#2a2a44; box-shadow:none; }
  .enemy-prev {
    display:block; margin: 0 auto 4px;
    width: clamp(56px, 14vmin, 72px);
    height: clamp(56px, 14vmin, 72px);
    background:#0a0a14; border-radius:6px;
  }
  .card .pr { margin-top:5px; color:#fc4; font-size: clamp(11px, 2.5vmin, 14px); }
  .card.disabled .pr { color:#e34a4a; }

  button {
    background:#1a3a5a; color:#cef; border:1px solid #4a6a8a;
    padding: clamp(7px, 1.8vmin, 10px) clamp(18px, 4.5vmin, 28px);
    cursor:pointer; font-size: clamp(12px, 2.7vmin, 14px);
    margin-top: clamp(10px, 2.8vmin, 18px);
    border-radius:4px; pointer-events:auto; font-family:inherit;
  }
  button:hover { background:#2a4a6a; border-color:#6cf; }
  #ovCoin { color:#fc4; margin: clamp(6px, 1.5vmin, 10px) 0 clamp(8px, 2vmin, 14px); font-size: clamp(12px, 2.6vmin, 14px); }
  #startScreen { text-align:center; max-width: 420px; width:100%; }
  #startScreen .stats-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap: 4px clamp(12px, 4vmin, 24px);
    font-size: clamp(11px, 2.6vmin, 13px);
    margin: clamp(6px, 2vmin, 12px) 0 clamp(10px, 2.5vmin, 16px);
  }
  #startScreen .stats-grid b { color:#6cf; font-weight:600; }
  .helptext { font-size: clamp(9.5px, 2.2vmin, 11px); opacity:.55; margin-top: clamp(10px, 2.5vmin, 14px); line-height:1.7; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="540" height="780"></canvas>
  <div id="hud">
    <div>
      <div>第 <span id="round">1</span> 轮 · 第 <span id="wave">1</span> 波</div>
      <div>等级 <span id="level">1</span> · 经验 <span id="kill">0</span>/<span id="killNeed">5</span></div>
      <div class="bar exp"><div id="expBar"></div></div>
    </div>
    <div class="right">
      <div>金币 <span id="coin">0</span></div>
      <div class="stats-line" id="stats"></div>
    </div>
  </div>
  <button id="pauseBtn" type="button">⏸</button>
  <div class="overlay show" id="overlay"></div>
</div>
<script>
"use strict";
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const W = cvs.width, H = cvs.height;
const overlay = document.getElementById('overlay');

const rand = (a,b) => a + Math.random()*(b-a);
const randInt = (a,b) => Math.floor(rand(a,b+1));
const choice = a => a[Math.floor(Math.random()*a.length)];
const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const TAU = Math.PI * 2;

function pointToLineDist(px, py, x1, y1, x2, y2) {
  const A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
  const dot = A * C + B * D;
  const len_sq = C * C + D * D;
  let t = len_sq > 0 ? dot / len_sq : -1;
  let xx, yy;
  if (t < 0) { xx = x1; yy = y1; }
  else if (t > 1) { xx = x2; yy = y2; }
  else { xx = x1 + t * C; yy = y1 + t * D; }
  return Math.hypot(px - xx, py - yy);
}

// Boss 倒三角形态下的三个顶点世界坐标
function getBossVertices(e) {
  const r = e.r;
  return {
    leftTop:  { x: e.x - r, y: e.y - r * 0.7 },
    rightTop: { x: e.x + r, y: e.y - r * 0.7 },
    bottom:   { x: e.x,     y: e.y + r },
  };
}

const game = {
  state: 'start',
  round: 1, wave: 1,
  wavesPerRound: 4,
  level: 1,
  killCount: 0, killForLevel: 5,
  spawnQueue: [], spawnTimer: 0,
  shake: 0, time: 0,
  introduced: new Set(),
  // 诅咒抽牌堆 (空了重新洗满 7 张). activeCurses Set: 通常 1 张, 恶魔之力时同波 2 张不重复
  curseDeck: [],
  activeCurses: new Set(),
  mirrorsSpawned: false,
  bossEncounter: 0, // boss 出场次数, 用于解锁技能数 + 强化曲线
  shopRefreshCost: 10,
  shopNormalPicks: [],
  shopIsBoss: false,
  waveSnapshot: null,
  snapshotted: false,
};

// Boss 4 个技能, 按出场顺序逐个解锁
const BOSS_SKILLS = [
  { name:'环形脉冲', desc:'向四周喷射 16 发圆形弹幕, 节奏缓慢' },
  { name:'扇形追踪', desc:'5 发追玩家位置的密集弹幕' },
  { name:'援军召唤', desc:'召唤一波分裂/钉刺/拦截机, 容量为本波 1/6 (二阶段强化为 1/4)' },
  { name:'横扫激光', desc:'锁定向下的高伤害激光柱, BOSS 横向移动带其扫屏' },
];

// 敌人首次出场顺序: 每个非 boss 波只引入一种新敌人, 用完后替换为诅咒卡
const ENEMY_ORDER = ['rusher', 'shooter', 'zigzag', 'elite', 'bomber', 'splitter', 'interceptor', 'spiker', 'gunship'];

// 每种敌人的威胁值 = ceil(金币 / 2). 用来填充本波"威胁容量"
const ENEMY_THREAT = {
  rusher: 1, zigzag: 1, shooter: 2, bomber: 2, interceptor: 2,
  splitter: 2, spiker: 2, elite: 3, gunship: 5,
};

function gapForThreat(threat) {
  return 0.4 + threat * 0.18;
}

// 弹道增加的统一入口: 独眼形态下不实际加弹道, 每个弹道结算为攻击 ×1.5 (独立乘区)
function grantProjectile(p, n) {
  if (p.cyclops) {
    p.cyclopsAtkMul *= Math.pow(1.5, n);
    recompute();
  } else {
    p.projectiles += n;
  }
}

// 组合波抽取的敌人种类数随轮次递增
function comboTypeCount(round) {
  if (round <= 4) return 2;
  if (round <= 6) return 3;
  if (round <= 8) return 4;
  return 5;
}

// 七宗罪诅咒: 仅当局生效, 散落到各处的检查点应用
const CURSES = [
  { id:'sloth',    n:'懒惰', desc:'弹速减半 / 移速减半' },
  { id:'gluttony', n:'暴食', desc:'飞机体型 ×1.5' },
  { id:'pride',    n:'傲慢', desc:'取消受击无敌时间' },
  { id:'wrath',    n:'愤怒', desc:'受伤翻倍' },
  { id:'greed',    n:'贪婪', desc:'吸金范围 ×2; 主动拾取扣钱, 飞出屏幕的金币反而进账' },
  { id:'lust',     n:'色欲', desc:'敌弹略微被玩家吸引' },
  { id:'envy',     n:'嫉妒', desc:'消灭所有敌人后, 召唤一个继承玩家属性的镜像分身' },
];

// 经验需求随等级线性增加: 5, 7, 9, 11...
function expNeeded(level) { return 5 + (level - 1) * 2; }

const stars = [];
for (let i = 0; i < 90; i++) stars.push({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*1.6+0.3, v: Math.random()*40+15 });

// 三层属性来源:
//   base   - 本局开局滚出来的初始值,不再变化
//   bonus  - 升级累加的"加性百分比"或整格,基于 base 线性叠加
//   shopMul- 商店购买的独立乘区,每件商品 *= 一个倍率
// 最终: player.X = base.X * (1 + bonus.Xpct) * shopMul.X  (或加格属性: base + bonus)
const base = {
  maxHp: 5, maxShield: 3,
  atk: 10, fireRate: 3,
  bulletSpeed: 500, moveSpeed: 380,
};
// 升级累加: maxHp/maxShield 是整数格, 其它 4 个是直接累加到 base 的固定值
const bonus = {
  maxHp: 0, maxShield: 0,
  atk: 0, fireRate: 0,
  bulletSpeed: 0, moveSpeed: 0,
};
// 普通商店道具: 同维度累加 (加性百分比), 整体作为一个乘区
const shopAdd = {
  atkPct: 0, fireRatePct: 0,
  bulletSpeedPct: 0, moveSpeedPct: 0,
};
// 独特道具: 每件独立 ×倍率累乘
const shopMul = {
  atk: 1, fireRate: 1, bulletSpeed: 1, moveSpeed: 1,
};

const player = {
  x: W/2, y: H-100, r: 13,
  hp: 5, shield: 3,
  maxHp: 5, maxShield: 3,
  shieldDelay: 0, shieldRegenDelayBase: 3.0,
  shieldRegenInterval: 2.5, shieldRegenT: 0,
  atk: 10, fireRate: 3, bulletSpeed: 500, moveSpeed: 380,
  shotCD: 0,
  projectiles: 1, spread: 0.209, // 基础相邻弹道夹角 ≈ 12°, 每多一弹道相邻夹角再 +5°
  critRate: 0, critDmg: 1.5,
  homing: 0, pierce: 0,
  bulletSize: 1, evade: 0, evadeStacks: 0,
  // baseMagnetRange 由商店"磁铁核心"修改; magnetRange 为派生字段, recompute 中按 activeCurse 计算
  baseMagnetRange: 90, magnetRange: 90,
  coin: 0, invuln: 0,
  knockVx: 0, knockVy: 0, knockT: 0,
  // 独特道具开关 / 状态
  shockwaveOnHit: false,
  bulletParry: false,
  killHealEnabled: false, killHealCounter: 0,
  guardian: null,
  uniqueOwned: {},
  uniqueSlots: [], // FIFO: 商店中等待购买的独特道具 (最多 3 个, 满则顶替最早)
  bigForm: false,
  cyclops: false, cyclopsAtkMul: 1,
  voidForm: false, voidT: 0,
  deepCrit: false, devilPower: false,
};

function recompute() {
  player.maxHp = Math.max(0, base.maxHp + bonus.maxHp);
  player.maxShield = Math.max(0, base.maxShield + bonus.maxShield);
  // final = (base + 升级累加) * (1 + 普通商店加性) * 独特乘区 * (独眼乘区)
  player.atk = (base.atk + bonus.atk) * Math.max(0, 1 + shopAdd.atkPct) * shopMul.atk * (player.cyclopsAtkMul || 1);
  player.fireRate = (base.fireRate + bonus.fireRate) * Math.max(0.1, 1 + shopAdd.fireRatePct) * shopMul.fireRate;
  player.bulletSpeed = (base.bulletSpeed + bonus.bulletSpeed) * Math.max(0.2, 1 + shopAdd.bulletSpeedPct) * shopMul.bulletSpeed;
  player.moveSpeed = (base.moveSpeed + bonus.moveSpeed) * Math.max(0.2, 1 + shopAdd.moveSpeedPct) * shopMul.moveSpeed;
  // 以攻为守: 永久禁用护盾
  if (player.bulletParry) { player.maxShield = 0; player.shield = 0; }
  // 当前激活诅咒的实时效果 (单/多张, 每波刷新)
  if (game.activeCurses.has('sloth')) {
    player.bulletSpeed *= 0.5;
    player.moveSpeed *= 0.5;
  }
  // 体型派生: 巨人形态 ×1.5, 暴食诅咒 ×1.5 (可叠加)
  let r = 13;
  if (player.bigForm) r *= 1.5;
  if (game.activeCurses.has('gluttony')) r *= 1.5;
  player.r = Math.round(r);
  player.magnetRange = (player.baseMagnetRange || 90) * (game.activeCurses.has('greed') ? 2 : 1);
  if (player.hp > player.maxHp) player.hp = player.maxHp;
  if (player.shield > player.maxShield) player.shield = player.maxShield;
}

const bullets = [];
const enemies = [];
const particles = [];
const coins = [];
const floats = [];
const shockwaves = [];

// 玩家位置发射的冲击波: 范围内消除敌弹和小怪 (Boss 不消除, 不计经验/金币以防连锁升级)
// 同时打断所有敌人当前的攻击, 强制下一次射击/引爆延迟到至少 1 秒后 (含 Boss)
function spawnShockwave(x, y, maxR = 280) {
  shockwaves.push({ x, y, t: 0, life: 0.55, maxR, hit: new Set() });
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.fireT !== undefined) e.fireT = Math.max(e.fireT, 1.0);
    if (e.parallelFireT !== undefined) e.parallelFireT = Math.max(e.parallelFireT, 1.0);
    if (e.armed && e.fuseT !== undefined) e.fuseT = Math.max(e.fuseT, 1.0);
  }
}

function updateShockwaves(dt) {
  for (const sw of shockwaves) {
    sw.t += dt;
    const r = sw.maxR * Math.min(1, sw.t / sw.life);
    for (const b of bullets) {
      if (b.from !== 'enemy' || b.dead || sw.hit.has(b)) continue;
      if (dist(b, sw) < r) {
        sw.hit.add(b);
        b.dead = true;
        addHitParticles(b.x, b.y);
      }
    }
    for (const e of enemies) {
      if (e.dead || e.boss || e.invuln === true || e.invuln > 0 || sw.hit.has(e)) continue;
      if (dist(e, sw) < r) {
        sw.hit.add(e);
        // 推开 (不击杀): 给敌人远离冲击波中心的速度
        const dx = e.x - sw.x, dy = e.y - sw.y;
        const d2 = Math.hypot(dx, dy) || 1;
        const force = 700;
        e.knockVx = (dx / d2) * force;
        e.knockVy = (dy / d2) * force;
        e.knockT = 0.45;
        addHitParticles(e.x, e.y);
      }
    }
  }
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    if (shockwaves[i].t >= shockwaves[i].life) shockwaves.splice(i, 1);
  }
}

// 神圣守护: 一颗光球绕玩家转圈, 消接触的敌弹, 撞敌造成攻击力伤害 (有冷却避免每帧重复)
function updateGuardian(dt) {
  if (!player.guardian) return;
  const g = player.guardian;
  g.angle += 5.5 * dt;
  const gx = player.x + Math.cos(g.angle) * 60;
  const gy = player.y + Math.sin(g.angle) * 60;
  const gr = 14;
  g.gx = gx; g.gy = gy;
  // 消敌弹
  for (const b of bullets) {
    if (b.from !== 'enemy' || b.dead) continue;
    if (Math.hypot(b.x - gx, b.y - gy) < gr + b.r) {
      b.dead = true;
      addHitParticles(b.x, b.y);
    }
  }
  // 撞敌人
  for (const e of enemies) {
    if (e.dead || e.invuln === true || e.invuln > 0) continue;
    if (Math.hypot(e.x - gx, e.y - gy) < gr + e.r) {
      // 镜像: 光球碰到直接清盾或杀死, 不走攻击力伤害
      if (e.type === 'mirror') {
        if (e.shield > 0) {
          e.shield = 0;
          e.invuln = e.invulnT;
          e.shieldDelay = e.shieldRegenDelayBase;
          e.shieldRegenT = 0;
          addHitParticles(gx, gy);
        } else {
          e.dead = true; e.killed = true;
          addExplosion(e.x, e.y, e.color, 28);
          game.shake = Math.max(game.shake, 0.15);
        }
        continue;
      }
      const last = g.hitMap.get(e) || -999;
      if (game.time - last > 0.25) {
        g.hitMap.set(e, game.time);
        // 伤害 = 玩家 1 秒理论 DPS (atk × 射速 × 弹道数)
        const dmg = player.atk * player.fireRate * Math.max(1, player.projectiles);
        e.hp -= dmg;
        floats.push({ x: gx, y: gy - 6, t: 0.4, life: 0.4, txt: Math.ceil(dmg), color:'#fff', size:11 });
        addHitParticles(gx, gy);
        if (e.hp <= 0) {
          e.dead = true; e.killed = true;
          addExplosion(e.x, e.y, e.color, e.boss ? 40 : 12);
          game.shake = e.boss ? 0.6 : Math.max(game.shake, 0.05);
        }
      }
    }
  }
  // 偶尔清掉死亡敌人引用避免 Map 增长
  if (Math.random() < 0.05) {
    for (const e of g.hitMap.keys()) if (e.dead) g.hitMap.delete(e);
  }
}

function drawGuardian() {
  if (!player.guardian) return;
  const g = player.guardian;
  if (g.gx === undefined) return;
  const gx = g.gx, gy = g.gy;
  ctx.save();
  const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, 24);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.35, '#fc8');
  grad.addColorStop(1, 'rgba(255, 200, 100, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(gx, gy, 24, 0, TAU); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(gx, gy, 8, 0, TAU); ctx.fill();
  ctx.restore();
}

function drawShockwaves() {
  for (const sw of shockwaves) {
    const k = sw.t / sw.life;
    const r = sw.maxR * Math.min(1, k);
    const a = 1 - k;
    ctx.save();
    // 外环
    ctx.strokeStyle = `rgba(180, 220, 255, ${a})`;
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, r, 0, TAU); ctx.stroke();
    // 内环
    ctx.strokeStyle = `rgba(255, 255, 255, ${a * 0.7})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, r * 0.85, 0, TAU); ctx.stroke();
    // 内填充淡蓝
    ctx.fillStyle = `rgba(102, 200, 255, ${a * 0.10})`;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, r, 0, TAU); ctx.fill();
    ctx.restore();
  }
}

const pointer = { x: 0, y: 0, down: false, dx: 0, dy: 0 };

function getXY(e) {
  const r = cvs.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX-r.left)*W/r.width, y: (t.clientY-r.top)*H/r.height };
}
cvs.addEventListener('pointerdown', e => {
  if (game.state !== 'playing') return;
  pointer.down = true;
  const p = getXY(e);
  pointer.dx = player.x - p.x;
  pointer.dy = player.y - p.y;
  pointer.x = p.x + pointer.dx;
  pointer.y = p.y + pointer.dy;
  try { cvs.setPointerCapture(e.pointerId); } catch(_) {}
});
cvs.addEventListener('pointermove', e => {
  if (!pointer.down) return;
  const p = getXY(e);
  pointer.x = p.x + pointer.dx;
  pointer.y = p.y + pointer.dy;
});
const release = () => { pointer.down = false; };
cvs.addEventListener('pointerup', release);
cvs.addEventListener('pointercancel', release);
cvs.addEventListener('pointerleave', release);

// ============== 初始属性 ==============
// 固定初始属性 (不再随机)

  base.maxHp = 3;
  base.maxShield = 3;
  base.atk = 10;
  base.fireRate = 3;
  base.bulletSpeed = 500;
  base.moveSpeed = 350;
  for (const k in bonus) bonus[k] = 0;
  for (const k in shopAdd) shopAdd[k] = 0;
  for (const k in shopMul) shopMul[k] = 1;
  player.projectiles = 1; player.spread = 0.209;
  player.critRate = 0; player.critDmg = 1.5;
  player.homing = 0; player.pierce = 0;
  player.bulletSize = 1; player.evade = 0; player.evadeStacks = 0;
  player.baseMagnetRange = 90; player.magnetRange = 90;
  player.shieldRegenInterval = 2.5;
  player.coin = 0; player.invuln = 0;
  player.shieldDelay = 0; player.shieldRegenT = 0;
  player.shotCD = 0;
  player.knockVx = 0; player.knockVy = 0; player.knockT = 0;
  player.shockwaveOnHit = false;
  player.bulletParry = false;
  player.killHealEnabled = false; player.killHealCounter = 0;
  player.guardian = null;
  player.uniqueOwned = {};
  player.uniqueSlots = [];
  player.bigForm = false;
  player.cyclops = false; player.cyclopsAtkMul = 1;
  player.voidForm = false; player.voidT = 0;
  player.deepCrit = false; player.devilPower = false;
  player.r = 13;
  game.curseDeck = [];
  game.activeCurses.clear();
  game.mirrorsSpawned = false;
  game.bossEncounter = 0;
  recompute();

}

// ============== 开始界面 ==============
function showStartScreen() {
  rollInitialStats();
  game.state = 'start';
  overlay.className = 'overlay show';
  overlay.innerHTML = `
    <div id="startScreen" style="text-align:center;">
      <div class="title" style="letter-spacing:6px; margin-bottom: clamp(8px, 2vmin, 14px)">飞 机 大 战</div>
      <div class="subtitle" style="margin-bottom: clamp(24px, 6vmin, 38px)">拖 动 移 动 · 自 动 开 火</div>
      <button id="startBtn" style="padding: clamp(10px, 2.5vmin, 14px) clamp(30px, 7vmin, 46px); font-size: clamp(14px, 3vmin, 16px); letter-spacing:3px;">出 击</button>
    </div>`;
  document.getElementById('startBtn').onclick = startGame;
}

function startGame() {
  overlay.className = 'overlay';
  overlay.innerHTML = '';
  game.state = 'playing';
  game.round = 1; game.wave = 1;
  game.level = 1; game.killCount = 0;
  game.killForLevel = expNeeded(game.level);
  game.introduced.clear();
  player.x = W/2; player.y = H-100;
  enemies.length = 0; bullets.length = 0;
  particles.length = 0; coins.length = 0; floats.length = 0;
  shockwaves.length = 0;
  startWave();
}

function startWave() {
  game.killCount = 0;
  // 上波诅咒失效, 重置派生属性 (r / magnetRange 等)
  game.activeCurses.clear();
  game.mirrorsSpawned = false;
  recompute();
  game.spawnQueue = generateWave(game.round, game.wave);
  game.spawnTimer = game.spawnQueue.length ? game.spawnQueue[0].gap : 0.5;
  if (player.guardian) player.guardian.hitMap = new Map();
  game.snapshotted = false;
  // 这波包含的所有种类
  const types = [...new Set(game.spawnQueue.map(s => s.type))];
  const newTypes = types.filter(t => !game.introduced.has(t));
  // boss 波: 1=首次, 2-4=新技能, 5=二阶段, 6+=完全体+诅咒
  if (game.wave === game.wavesPerRound) {
    game.bossEncounter = (game.bossEncounter || 0) + 1;
    if (!game.introduced.has('boss')) {
      game.introduced.add('boss');
      openBossEncounterIntro('first');
    } else if (game.bossEncounter <= 4) {
      openBossEncounterIntro('skill');
    } else if (game.bossEncounter === 5) {
      openBossEncounterIntro('phase2');
    } else {
      openBossEncounterIntro('cursed');
    }
    return;
  }
  // 非 boss 波
  if (newTypes.length > 0) {
    openEnemyIntro(newTypes);
  } else if (types.length > 1 || game.round >= 6) {
    // 组合波 或 round 6+ 单种 → 都走组合介绍 (内部会附带诅咒卡)
    openWaveComboIntro(types);
  }
  // 否则: round < 6 + 单种已介绍敌人 → state 保持 playing 直接战斗
}

// 抽一张诅咒: 牌堆空则重新洗 7 张. 可传 exclude 避免与当波已抽的同 id 重复
function drawCurse(exclude) {
  if (game.curseDeck.length === 0) {
    game.curseDeck = CURSES.map(c => c.id);
    for (let i = game.curseDeck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [game.curseDeck[i], game.curseDeck[j]] = [game.curseDeck[j], game.curseDeck[i]];
    }
  }
  if (exclude) {
    const idx = game.curseDeck.findIndex(id => id !== exclude);
    if (idx >= 0) return game.curseDeck.splice(idx, 1)[0];
  }
  return game.curseDeck.shift();
}

// round >= 6 或玩家拥有恶魔之力时抽诅咒, 恶魔之力时抽 2 张不同 id
function getMaybeCurseCard() {
  if (game.round < 6 && !player.devilPower) return null;
  const ids = [drawCurse()];
  if (player.devilPower) ids.push(drawCurse(ids[0]));
  const curseHtmls = ids.map(id => {
    const curse = CURSES.find(c => c.id === id);
    return `
      <div class="card curse-card">
        <div class="ico" style="color:#ff7777; font-size:clamp(20px,5vmin,28px); margin-bottom:6px">☠</div>
        <div class="nm" style="color:#ff7777">${curse.n}</div>
        <div class="ds"><div class="b">${curse.desc}</div></div>
      </div>`;
  }).join('');
  let particles = '';
  for (let i = 0; i < 14; i++) {
    const left = (5 + Math.random() * 90).toFixed(1);
    const delay = (Math.random() * 2).toFixed(2);
    const drift = (Math.random() * 40 - 20).toFixed(1);
    const dur = (1.6 + Math.random() * 1.2).toFixed(2);
    particles += `<span class="curse-particle" style="left:${left}%; animation-delay:${delay}s; animation-duration:${dur}s; --drift:${drift}px"></span>`;
  }
  const cardsMax = ids.length > 1 ? 480 : 240;
  return {
    ids,
    html: `
      <div class="curse-section">
        <div class="curse-label">☠ 诅 咒 降 临${ids.length > 1 ? ' (恶魔之力 ×2)' : ''} ☠</div>
        <div class="cards" style="max-width:${cardsMax}px; margin:0 auto">${curseHtmls}</div>
        <div class="curse-particles">${particles}</div>
      </div>`,
  };
}

// 激活诅咒 (一张或多张, 覆盖上波). 所有效果在 recompute / 事件点实时读取 game.activeCurses
function setActiveCurses(ids) {
  game.activeCurses = new Set(ids);
  game.mirrorsSpawned = false;
  recompute();
}

// Boss 出场介绍卡: 'first' / 'skill' / 'phase2' / 'cursed' (round 6+ 完全体)
function openBossEncounterIntro(kind) {
  game.state = 'enemyIntro';
  let cardsHtml = '';
  let title = '';
  let subtitle = '';
  let needBossCanvas = false;
  if (kind === 'first') {
    title = '⚠ Boss 出 现';
    subtitle = '技能池 1 / 4';
    needBossCanvas = true;
    const info = ENEMY_INFO.boss;
    cardsHtml += `
      <div class="card enemy-card">
        <canvas class="enemy-prev" width="72" height="72" data-type="boss"></canvas>
        <div class="nm">${info.name}</div>
        <div class="ds">${info.desc}</div>
      </div>`;
    const skill = BOSS_SKILLS[0];
    cardsHtml += `
      <div class="card enemy-card">
        <div class="ico" style="color:#ff7777; font-size:clamp(20px,5vmin,28px); margin-bottom:6px">✷</div>
        <div class="nm" style="color:#ff7777">${skill.name}</div>
        <div class="ds">${skill.desc}</div>
      </div>`;
  } else if (kind === 'skill') {
    title = '⚠ Boss 解 锁 新 技 能';
    subtitle = `技能池 ${game.bossEncounter} / 4`;
    const skill = BOSS_SKILLS[game.bossEncounter - 1];
    if (skill) {
      cardsHtml += `
        <div class="card enemy-card">
          <div class="ico" style="color:#ff7777; font-size:clamp(20px,5vmin,28px); margin-bottom:6px">✷</div>
          <div class="nm" style="color:#ff7777">${skill.name}</div>
          <div class="ds">${skill.desc}</div>
        </div>`;
    }
  } else if (kind === 'phase2') {
    title = '⚠ Boss 觉 醒';
    subtitle = '更危险的形态等着你';
    cardsHtml += `
      <div class="card enemy-card">
        <div class="ico" style="color:#ff7777; font-size:clamp(20px,5vmin,28px); margin-bottom:6px">⚛</div>
        <div class="nm" style="color:#ff7777">二阶段</div>
        <div class="ds">Boss 现在具备二阶段</div>
      </div>`;
  } else if (kind === 'cursed') {
    title = '⚠ Boss 再 临';
    subtitle = '完全体 BOSS 与本波诅咒';
    needBossCanvas = true;
    cardsHtml += `
      <div class="card enemy-card">
        <canvas class="enemy-prev" width="72" height="72" data-type="boss"></canvas>
        <div class="nm">${ENEMY_INFO.boss.name}</div>
        <div class="ds">完全体, 二阶段已觉醒</div>
      </div>`;
  }
  const curse = getMaybeCurseCard();
  overlay.className = 'overlay show';
  overlay.innerHTML = `
    <div class="title">${title}</div>
    <div class="subtitle">${subtitle}</div>
    <div class="cards">${cardsHtml}</div>
    ${curse ? curse.html : ''}
    <button id="introOk">准 备 就 绪</button>`;
  if (needBossCanvas) {
    const c = overlay.querySelector('.enemy-prev');
    if (c) {
      const g = c.getContext('2d');
      g.translate(c.width / 2, c.height / 2);
      drawEnemyShape(g, 'boss', 26, ENEMY_INFO.boss.color, null);
    }
  }
  document.getElementById('introOk').onclick = () => {
    if (curse) setActiveCurses(curse.ids);
    overlay.className = 'overlay';
    overlay.innerHTML = '';
    game.state = 'playing';
  };
}

// ============== 波次生成 ==============
// 计算本波的 "新敌人" 类型: 累计的非 boss 波编号映射到 ENEMY_ORDER
function computeNewEnemyType(round, wave) {
  if (wave === game.wavesPerRound) return null;
  const idx = (round - 1) * (game.wavesPerRound - 1) + (wave - 1);
  return ENEMY_ORDER[idx] || null;
}

function generateWave(round, wave) {
  const q = [];
  // 普通敌人随轮次 ×1.8 / 轮; boss 单独 ×2.5 / 轮
  const scale = Math.pow(1.8, round - 1);
  if (wave === game.wavesPerRound) {
    const bossScale = Math.pow(2.5, round - 1);
    q.push({ type:'boss', scale: bossScale, gap: 1.0 });
    return q;
  }
  // 威胁容量: 初始 12, 每波 / 每轮线性 +4 (按累计非 boss 波编号增长)
  const idx = (round - 1) * (game.wavesPerRound - 1) + (wave - 1);
  const cap = 12 + idx * 4;
  const mainType = computeNewEnemyType(round, wave);
  if (mainType) {
    // 单一类型 (引入新敌人时, 整波都是这一种)
    // 刷到 spent 超过 cap 后才停, 因此最后一只会让总威胁略超
    const threat = ENEMY_THREAT[mainType] || 1;
    let spent = 0;
    while (spent <= cap) {
      q.push({ type: mainType, scale, gap: gapForThreat(threat) });
      spent += threat;
    }
  } else {
    // 多种敌人组合 (所有类型已解锁后)
    const introducedNonBoss = [...game.introduced].filter(t => t !== 'boss' && ENEMY_THREAT[t] !== undefined);
    if (!introducedNonBoss.length) introducedNonBoss.push('rusher');
    // 随机抽固定数量的种类作为本波池, 介绍卡也只显示这几种
    const wantCount = Math.min(comboTypeCount(round), introducedNonBoss.length);
    const pool = [];
    const remaining = introducedNonBoss.slice();
    for (let i = 0; i < wantCount && remaining.length; i++) {
      const idx = Math.floor(Math.random() * remaining.length);
      pool.push(remaining.splice(idx, 1)[0]);
    }
    // 每批刷 wantCount 只 (pool 中每种各 1); 批内 gap=0 同帧出场, 批间 gap = 平均威胁的 gap
    const batchThreat = pool.reduce((s, t) => s + ENEMY_THREAT[t], 0);
    const avgThreat = batchThreat / pool.length;
    const batchGap = gapForThreat(avgThreat);
    let spent = 0;
    let safety = 100;
    while (spent <= cap && safety-- > 0) {
      pool.forEach((t, i) => {
        q.push({ type: t, scale, gap: i === 0 ? batchGap : 0 });
      });
      spent += batchThreat;
    }
  }
  if (q.length > 0) q[0].gap = 0.8;
  return q;
}

function spawnEnemy(s) {
  if (s.type === 'boss') return spawnBoss(s.scale);
  const sc = s.scale;
  const e = { x: rand(40, W-40), y: -30, t: 0, type: s.type, scale: sc, dead: false, killed: false };
  if (s.type === 'rusher') {
    e.r = 14; e.maxHp = 18*sc; e.vy = rand(140, 200);
    e.coin = 1; e.color = '#e34a4a';
  } else if (s.type === 'zigzag') {
    e.r = 13; e.maxHp = 24*sc; e.vy = rand(100, 140);
    e.amp = rand(60, 120); e.freq = rand(1.5, 2.5);
    // 防止贴边: bx 必须给摆动留出 amp + r 的安全距离
    e.bx = clamp(e.x, e.r + e.amp, W - e.r - e.amp);
    e.x = e.bx;
    e.coin = 2; e.color = '#e3a44a';
  } else if (s.type === 'shooter') {
    e.r = 16; e.maxHp = 38*sc; e.vy = rand(70, 100);
    e.targetY = rand(80, 200); e.fireT = rand(1, 2);
    e.coin = 3; e.color = '#a44ae3';
  } else if (s.type === 'elite') {
    e.r = 22; e.maxHp = 90*sc; e.vy = rand(60, 90);
    e.targetY = rand(100, 180); e.fireT = rand(1.5, 2.5);
    e.coin = 6; e.color = '#4ae3a4';
  } else if (s.type === 'bomber') {
    // 自爆体: 飞至玩家上方停顿后引爆
    e.r = 18; e.maxHp = 40*sc; e.vy = rand(80, 110);
    e.targetY = clamp(player.y - 220, 80, H - 200);
    e.fuseT = 1.2; e.armed = false;
    e.coin = 4; e.color = '#7e4ad6';
  } else if (s.type === 'splitter') {
    // 分裂体: 死亡时碎成两个小冲撞
    e.r = 18; e.maxHp = 50*sc; e.vy = rand(80, 120);
    e.amp = rand(40, 80); e.freq = rand(1.0, 1.8);
    e.bx = clamp(e.x, e.r + e.amp, W - e.r - e.amp);
    e.x = e.bx;
    e.split = true; e.coin = 4; e.color = '#5fc4ff';
  } else if (s.type === 'gunship') {
    // 重炮舰: 慢速大血量, 持续散弹
    e.r = 26; e.maxHp = 140*sc; e.vy = rand(40, 70);
    e.targetY = rand(80, 150); e.fireT = rand(0.8, 1.2);
    e.coin = 10; e.color = '#ff8844';
  } else if (s.type === 'interceptor') {
    // 拦截机: 从左右屏幕中段出现, 警示后锁定玩家位置直线高速冲撞
    e.r = 14; e.maxHp = 18 * sc;
    const fromLeft = Math.random() < 0.5;
    e.x = fromLeft ? 8 : W - 8;
    e.y = rand(H / 3, 2 * H / 3);
    e.warningT = 0.8;
    e.aimX = player.x; e.aimY = player.y;
    e.vx = 0; e.vy = 0;
    e.coin = 3; e.color = '#ffaa00';
  } else if (s.type === 'spiker') {
    // 钉刺机: 从屏幕底部出现, 慢速向上
    e.r = 16; e.maxHp = 60 * sc;
    e.x = rand(80, W - 80);
    e.y = H - 10;
    e.vy = -rand(60, 90);
    e.warningT = 0.8;
    e.coin = 3; e.color = '#aaff66';
  }
  e.hp = e.maxHp;
  if (s.summoned) {
    e.summoned = true;
    e.coin = 0; // 召唤的敌人不掉金币
  }
  enemies.push(e);
}

// Boss 第三技能: 召唤一波小怪. 一阶段容量 = 波 cap / 6, 二阶段强化为 / 4
// 二阶段池子收敛为随机 2 种, 同时刷出两种敌人混合
function bossSummonWave(boss) {
  const idx = (game.round - 1) * (game.wavesPerRound - 1) + (game.wave - 1);
  const waveCap = 12 + idx * 4;
  const summonCap = boss.phase2
    ? Math.max(2, Math.floor(waveCap / 4))
    : Math.max(2, Math.floor(waveCap / 6));
  const allTypes = ['splitter', 'spiker', 'interceptor'];
  let types;
  if (boss.phase2) {
    // 二阶段: 随机选 2 种, 每次刷 1 种 (混合两类)
    const shuffled = allTypes.slice().sort(() => Math.random() - 0.5);
    types = shuffled.slice(0, 2);
  } else {
    // 一阶段: 单次召唤只用 1 种, 整批同型
    types = [allTypes[Math.floor(Math.random() * allTypes.length)]];
  }
  const enemyScale = Math.pow(2, game.round - 1);
  let spent = 0;
  let safety = 50;
  while (spent <= summonCap && safety-- > 0) {
    const t = types[Math.floor(Math.random() * types.length)];
    spawnEnemy({ type: t, scale: enemyScale, summoned: true });
    spent += ENEMY_THREAT[t] || 1;
  }
}

// 嫉妒诅咒召唤的镜像分身: 继承玩家 maxHp/maxShield/fireRate/projectiles
// 受击与玩家一致 (优先扣盾, 大幅无敌时间). 撞玩家/光球: 双向清盾/即死.
function spawnMirrorEnemy() {
  const m = {
    x: rand(80, W - 80), y: -50,
    r: player.r,
    type: 'mirror',
    // 镜像出场时血盾全满, 只继承玩家上限不继承当前剩余
    maxHp: Math.max(1, player.maxHp), hp: Math.max(1, player.maxHp),
    maxShield: player.maxShield, shield: player.maxShield,
    fireRate: Math.max(0.5, player.fireRate),
    projectiles: Math.max(1, player.projectiles),
    moveSpeed: Math.max(150, player.moveSpeed),
    bulletSpeed: Math.max(200, player.bulletSpeed),
    color: '#e060c8',
    coin: 0,
    invuln: 2.0,            // 出场无敌 2 秒 (类似 boss 入场)
    spawnInvulnT: 2.0,      // 入场无敌计时, 期间画金色光环
    invulnT: 0.6,           // 受击后无敌时间, 与玩家一致
    shieldDelay: 0,
    shieldRegenDelayBase: 6,
    shieldRegenInterval: 2.5,
    shieldRegenT: 0,
    shotCD: 0.6,            // 出场延迟射击
    cycleT: 0,              // 攻击周期: 1.5s 射击 + 0.5s 暂停
    t: 0, sinPhase: rand(0, TAU),
    dead: false, killed: false,
  };
  enemies.push(m);
}

function mirrorFire(e) {
  const aim = Math.atan2(player.y - e.y, player.x - e.x);
  const n = e.projectiles;
  const spread = 0.16;
  const total = spread * (n - 1);
  for (let i = 0; i < n; i++) {
    const t = n === 1 ? 0 : (i / (n - 1) - 0.5);
    const a = aim + t * total;
    spawnEnemyBullet(e.x, e.y, a, e.bulletSpeed || 360, 1);
  }
}

function updateMirror(e, dt) {
  e.t += dt;
  if (e.spawnInvulnT > 0) {
    e.spawnInvulnT -= dt;
    if (e.spawnInvulnT < 0) e.spawnInvulnT = 0;
    e.invuln = Math.max(e.invuln, 0.2);
  }
  if (e.invuln > 0) e.invuln = Math.max(0, e.invuln - dt);
  // 护盾恢复: 受击后 shieldRegenDelayBase 秒后开始, 每 shieldRegenInterval 秒补 1 格
  if (e.shieldDelay > 0) {
    e.shieldDelay -= dt;
    e.shieldRegenT = 0;
  } else if (e.shield < e.maxShield) {
    e.shieldRegenT += dt;
    if (e.shieldRegenT >= e.shieldRegenInterval) {
      e.shieldRegenT -= e.shieldRegenInterval;
      e.shield = Math.min(e.maxShield, e.shield + 1);
    }
  }
  // 维持 200px 距离的简单 AI
  const dx = player.x - e.x, dy = player.y - e.y;
  const d = Math.hypot(dx, dy) || 1;
  const ideal = 200;
  let vx, vy;
  if (d > ideal + 50) {
    vx = (dx / d) * e.moveSpeed;
    vy = (dy / d) * e.moveSpeed;
  } else if (d < ideal - 50) {
    vx = -(dx / d) * e.moveSpeed * 0.7;
    vy = -(dy / d) * e.moveSpeed * 0.7;
  } else {
    // 切线绕飞 + 微抖
    vx = (-dy / d) * e.moveSpeed * 0.6 * Math.sin(e.t * 1.5 + e.sinPhase);
    vy = (dx / d) * e.moveSpeed * 0.6 * Math.sin(e.t * 1.5 + e.sinPhase);
  }
  e.x += vx * dt;
  e.y += vy * dt;
  e.x = clamp(e.x, e.r, W - e.r);
  e.y = clamp(e.y, e.r, H * 0.7); // 不让它太靠近底部, 给玩家空间
  // 攻击周期: 连续射击 1.5s 后暂停 0.5s
  e.cycleT = (e.cycleT + dt) % 2.0;
  if (e.cycleT < 1.5) {
    e.shotCD -= dt;
    if (e.shotCD <= 0) {
      mirrorFire(e);
      e.shotCD = 1 / e.fireRate;
    }
  } else {
    // 暂停期: 重置 shotCD 让下个射击周期立即开火
    e.shotCD = 0;
  }
}

function spawnBoss(scale) {
  const enc = Math.max(1, game.bossEncounter || 1);
  const skillCount = Math.min(4, enc);
  // 第 4 次出场起每次缩短间隔, 第 10 次达到 ×0.5 后不再变
  const intervalMul = Math.max(0.5, 1 - Math.max(0, enc - 4) * (0.5 / 6));
  // 同步: 并行概率从 0 线性增至 0.5
  const parallelChance = Math.min(0.5, Math.max(0, (enc - 4) * (0.5 / 6)));
  // 一阶段血量 (二阶段触发时回满, 总伤害 ≈ ×2)
  const totalHp = 700 * scale;
  // 出场起手随机选一个已解锁的技能
  const initialPhase = Math.floor(Math.random() * skillCount);
  const boss = {
    x: W/2, y: -80, r: 50, type:'boss', boss:true,
    maxHp: totalHp, hp: totalHp,
    coin: 50, color: '#ff4488',
    targetY: 110, vy: 50, vx: 80,
    phase: initialPhase, phaseT: 0, fireT: 0, t: 0,
    invuln: true,
    laserState: 'idle', laserWidth: 0,
    skillCount, intervalMul, parallelChance,
    parallelFireT: 1.0,
    phase2: false, phase2Triggered: false, phase2Triggering: false, phase2Timer: 0,
    altLaserType: null,
    cornerLaserInit: false, corners: null, cornerTargets: null, cornerFired: null, cornerActive: null,
    sweepInit: false, sweepState: 'idle', sweepWidth: 0, sweepCurrentA: 0,
    dead: false, killed: false, scale,
  };
  enemies.push(boss);
  // 起手就是召唤的话, 立即触发一次召唤 (因为正常召唤在 phase 切换时触发)
  if (initialPhase === 2) bossSummonWave(boss);
}

// ============== 敌人逻辑 ==============
function updateEnemy(e, dt) {
  e.t += dt;
  if (e.boss) return updateBoss(e, dt);
  if (e.type === 'mirror') return updateMirror(e, dt);
  // 警示期: 不动作不受击不撞击, 倒计时结束后初始化方向
  if (e.warningT > 0) {
    e.warningT -= dt;
    if (e.warningT <= 0) {
      e.warningT = 0;
      if (e.type === 'interceptor') {
        const dx = e.aimX - e.x, dy = e.aimY - e.y;
        const d = Math.hypot(dx, dy) || 1;
        const speed = 380;
        e.vx = (dx / d) * speed;
        e.vy = (dy / d) * speed;
      }
    }
    return;
  }
  if (e.type === 'rusher') {
    e.y += e.vy * dt;
    e.x += clamp((player.x - e.x) * 0.6, -70, 70) * dt;
  } else if (e.type === 'zigzag') {
    e.y += e.vy * dt;
    e.x = e.bx + Math.sin(e.t * e.freq) * e.amp;
  } else if (e.type === 'shooter') {
    if (e.y < e.targetY) e.y += e.vy * dt;
    else {
      e.fireT -= dt;
      if (e.fireT <= 0) {
        e.fireT = rand(1.4, 2.2);
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        spawnEnemyBullet(e.x, e.y, a, 240, 8);
      }
      e.x += Math.sin(e.t * 1.2) * 90 * dt;
    }
  } else if (e.type === 'elite') {
    if (e.y < e.targetY) e.y += e.vy * dt;
    else {
      e.fireT -= dt;
      if (e.fireT <= 0) {
        e.fireT = rand(1.8, 2.6);
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        for (let i = -1; i <= 1; i++) spawnEnemyBullet(e.x, e.y, a + i*0.22, 220, 1);
      }
      e.x += Math.cos(e.t * 0.8) * 110 * dt;
    }
  } else if (e.type === 'bomber') {
    if (!e.armed) {
      if (e.y < e.targetY) e.y += e.vy * dt;
      else { e.armed = true; }
      // 跟踪玩家小幅修正
      e.x += clamp((player.x - e.x) * 0.6, -50, 50) * dt;
    } else {
      e.fuseT -= dt;
      if (e.fuseT <= 0) {
        // 引爆: 12 方向放射, 自身消失但不算被击杀(无金币/经验)
        const n = 12;
        for (let i = 0; i < n; i++) spawnEnemyBullet(e.x, e.y, (i/n)*TAU, 200, 1);
        addExplosion(e.x, e.y, e.color, 28);
        game.shake = Math.max(game.shake, 0.18);
        e.dead = true;
      }
    }
  } else if (e.type === 'splitter') {
    e.y += e.vy * dt;
    e.x = e.bx + Math.sin(e.t * e.freq) * e.amp;
  } else if (e.type === 'gunship') {
    if (e.y < e.targetY) e.y += e.vy * dt;
    else {
      e.fireT -= dt;
      if (e.fireT <= 0) {
        e.fireT = rand(2.0, 2.8);
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        for (let i = -2; i <= 2; i++) spawnEnemyBullet(e.x, e.y, a + i*0.15, 200, 1);
      }
      e.x += Math.cos(e.t * 0.6) * 70 * dt;
    }
  } else if (e.type === 'interceptor') {
    e.x += e.vx * dt;
    e.y += e.vy * dt;
  } else if (e.type === 'spiker') {
    e.y += e.vy * dt;
  } else if (e.type === 'shard') {
    // 加速度方向始终指向玩家, 速度有上限, 有惯性
    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.hypot(dx, dy) || 1;
    e.vx += (dx / d) * e.accel * dt;
    e.vy += (dy / d) * e.accel * dt;
    const sp = Math.hypot(e.vx, e.vy);
    if (sp > e.maxSpeed) {
      e.vx = e.vx / sp * e.maxSpeed;
      e.vy = e.vy / sp * e.maxSpeed;
    }
    e.x += e.vx * dt;
    e.y += e.vy * dt;
  }
  // 冲击波击退 (Boss 不受影响, 在 updateBoss 路径不会走到这)
  if (e.knockT > 0) {
    if (e.bx !== undefined) e.bx += e.knockVx * dt;
    else e.x += e.knockVx * dt;
    e.y += e.knockVy * dt;
    e.knockVx *= 0.88; e.knockVy *= 0.88;
    e.knockT -= dt;
  }
  // 拦截机/碎片不限 x (穿屏 / 加速度自由飞), 其他敌人 clamp 在屏幕内
  if (e.type !== 'interceptor' && e.type !== 'shard') {
    e.x = clamp(e.x, e.r, W - e.r);
  }
  // 碎片: 任何方向飞出屏幕直接消失 (不重生, 因为是分裂出来的临时威胁)
  if (e.type === 'shard') {
    if (e.x < -60 || e.x > W + 60 || e.y < -60 || e.y > H + 60) e.dead = true;
  } else
  // 飞出屏幕重生: 保留当前血量, 防止永远打不死
  if (e.type === 'interceptor') {
    if (e.x < -60 || e.x > W + 60 || e.y < -60 || e.y > H + 60) {
      const fromLeft = Math.random() < 0.5;
      e.x = fromLeft ? 8 : W - 8;
      e.y = rand(H / 3, 2 * H / 3);
      e.warningT = 0.8;
      e.aimX = player.x; e.aimY = player.y;
      e.vx = 0; e.vy = 0;
      e.t = 0;
    }
  } else if (e.type === 'spiker') {
    if (e.y < -e.r - 30) {
      e.x = rand(80, W - 80);
      e.y = H - 10;
      e.warningT = 0.8;
      e.vy = -rand(60, 90);
      e.t = 0;
    }
  } else if (e.y > H + 60) {
    e.y = -e.r - 10;
    e.x = rand(40, W - 40);
    if (e.bx !== undefined) e.bx = e.x;
    e.t = 0;
  }
}

function updateBoss(e, dt) {
  e.t += dt;
  if (e.y < e.targetY) {
    e.y += e.vy * dt;
    e.invuln = true;
    return;
  }
  e.invuln = e.phase2Triggering ? true : false;

  if (e.phase2Triggering) {
    e.phase2Timer += dt;
    const T_TOTAL = 3.0;
    const T_MOVE = 1.0;     // 0~1s 移动到中心
    const T_FILL = 2.5;     // 1~2.5s 血条 0 → 满
    // 移动到屏幕中心
    if (e.phase2Timer < T_MOVE) {
      const dx = (W / 2) - e.x;
      const step = 200 * dt;
      e.x += Math.sign(dx) * Math.min(Math.abs(dx), step);
    } else {
      e.x = W / 2;
    }
    // 血条恢复 (插值)
    if (e.phase2Timer >= T_MOVE && e.phase2Timer <= T_FILL) {
      const t = clamp((e.phase2Timer - T_MOVE) / (T_FILL - T_MOVE), 0, 1);
      e.hp = e.maxHp * t;
    }
    // 卸甲粒子持续到血条恢复完成
    if (e.phase2Timer < T_FILL && Math.random() < 0.5) {
      const a = Math.random() * TAU;
      particles.push({
        x: e.x + Math.cos(a) * e.r * 0.85,
        y: e.y + Math.sin(a) * e.r * 0.85,
        vx: Math.cos(a) * 80, vy: Math.sin(a) * 80 + 40,
        t: 0.7, life: 0.7, r: rand(2, 3.5), color: '#ffaa66',
      });
    }
    if (e.phase2Timer >= T_TOTAL) {
      e.phase2Triggering = false;
      e.phase2 = true;
      e.hp = e.maxHp; // 二阶段开始时满血
      e.invuln = false;
      e.vx = 0;
      e.x = W / 2;
      e.r = Math.round(e.r * 0.85); // 体型缩小 15%
      addExplosion(e.x, e.y, '#ff8866', 35);
      game.shake = Math.max(game.shake, 0.5);
      // 二阶段技能池扩展为 5 (corner 激光 + sweep 激光独立两个 phase)
      e.skillCount = 5;
      e.phase = Math.floor(Math.random() * 5);
      e.phaseT = 0;
      e.fireT = 0.5;
      e.laserState = 'idle';
      e.laserWidth = 0;
      if (e.phase === 2) bossSummonWave(e);
    }
    return;
  }

  // 二阶段不再左右移动
  if (!e.phase2) {
    const vxMul = (e.phase === 3) ? 1.7 : 1;
    e.x += e.vx * dt * vxMul;
    if (e.x < e.r + 10) { e.x = e.r + 10; e.vx = Math.abs(e.vx); }
    if (e.x > W - e.r - 10) { e.x = W - e.r - 10; e.vx = -Math.abs(e.vx); }
  }

  e.phaseT += dt;
  e.fireT -= dt;
  // 召唤 phase 用时短一些, 便于衔接其他技能
  const phaseDur = e.phase === 2 ? 2 : 4;
  if (e.phaseT > phaseDur) {
    e.phaseT = 0;
    // 随机选一个非当前的 phase, 避免连续重复同一种攻击
    if (e.skillCount > 1) {
      const others = [];
      for (let i = 0; i < e.skillCount; i++) if (i !== e.phase) others.push(i);
      e.phase = others[Math.floor(Math.random() * others.length)];
    }
    e.fireT = 0.4;
    e.laserState = 'idle';
    e.laserWidth = 0;
    e.cornerLaserInit = false;
    e.corners = null; e.cornerTargets = null; e.cornerFired = null;
    e.sweepInit = false;
    e.sweepWidth = 0;
    e.sweepState = 'idle';
    // 进入 phase 2 (召唤): 立即召唤一波小怪
    if (e.phase === 2) bossSummonWave(e);
  }

  // 单技能内的 fireT 间隔仅按轮次轻度缩短, 不再受 boss 出场强化
  const fireFactor = Math.max(0.45, 1 - (game.round - 1) * 0.14);
  fireBossPhase(e, e.phase, fireFactor);
}

// 主循环用: 处理 fireT 计时并按阶段发射
function fireBossPhase(e, phase, fireFactor) {
  if (phase === 0) {
    if (e.fireT <= 0) {
      e.fireT = 0.9 * fireFactor;
      firePhaseAttack(e, 0);
    }
  } else if (phase === 1) {
    if (e.fireT <= 0) {
      e.fireT = 0.4 * fireFactor;
      firePhaseAttack(e, 1);
    }
  } else if (phase === 2) {
    // phase 2 是召唤波 (在 phase 切换时已触发), 期间 boss 不再发射弹幕
  } else if (phase === 3) {
    // 二阶段: 三角锁定激光; 一阶段: 原竖直激光柱
    if (e.phase2) {
      executeCornerLaser(e);
    } else {
      const t = e.phaseT;
      if (t < 0.6) {
        e.laserState = 'charge';
        e.laserWidth = 4 + Math.sin(t * 30) * 2 + t * 4;
      } else if (t < 3.5) {
        e.laserState = 'fire';
        e.laserWidth = 34 + Math.sin(t * 20) * 4;
      } else {
        e.laserState = 'idle';
        e.laserWidth = 0;
      }
    }
  } else if (phase === 4 && e.phase2) {
    // 二阶段独有: 90° 扫屏激光
    executeSweepLaser(e);
  }
}

// 二阶段激光 A: 三个顶点逐个锁定玩家位置, 1 秒后发射. 三道激光各亮 0.4 秒
function executeCornerLaser(e) {
  if (!e.cornerLaserInit) {
    e.cornerLaserInit = true;
    e.corners = [
      { key:'leftTop',  lockT: 0, fireT: 1 },
      { key:'rightTop', lockT: 1, fireT: 2 },
      { key:'bottom',   lockT: 2, fireT: 3 },
    ];
    e.cornerTargets = [null, null, null];
    e.cornerFired = [false, false, false];
    e.cornerActive = [];
  }
  const t = e.phaseT;
  const verts = getBossVertices(e);
  for (let i = 0; i < 3; i++) {
    const c = e.corners[i];
    if (t >= c.lockT && t < c.fireT && e.cornerTargets[i] === null) {
      e.cornerTargets[i] = { x: player.x, y: player.y };
    }
    if (t >= c.fireT && !e.cornerFired[i] && e.cornerTargets[i]) {
      e.cornerFired[i] = true;
      const start = verts[c.key];
      const tgt = e.cornerTargets[i];
      const dx = tgt.x - start.x, dy = tgt.y - start.y;
      const len = Math.hypot(dx, dy) || 1;
      e.cornerActive.push({
        x1: start.x, y1: start.y,
        x2: start.x + (dx / len) * 1500,
        y2: start.y + (dy / len) * 1500,
        t: 0.4, life: 0.4,
      });
    }
  }
}

// 二阶段激光 B: 从 boss 倒三角下顶点向下方扫一道 90° 弧形激光, 5 秒匀速扫
function executeSweepLaser(e) {
  if (!e.sweepInit) {
    e.sweepInit = true;
    const startA = Math.PI / 4;        // 右下 45°
    const endA = 3 * Math.PI / 4;      // 左下 45°
    const dir = Math.random() < 0.5 ? 1 : -1;
    e.sweepStartA = dir === 1 ? startA : endA;
    e.sweepEndA   = dir === 1 ? endA   : startA;
  }
  const t = e.phaseT;
  if (t < 0.4) {
    e.sweepState = 'charge';
    e.sweepCurrentA = e.sweepStartA;
    e.sweepWidth = 4 + t * 8;
  } else if (t < 3.5) {
    e.sweepState = 'fire';
    const ratio = (t - 0.4) / 3.1;
    e.sweepCurrentA = e.sweepStartA + (e.sweepEndA - e.sweepStartA) * ratio;
    e.sweepWidth = 30 + Math.sin(t * 18) * 4;
  } else {
    e.sweepState = 'idle';
    e.sweepWidth = 0;
  }
}

// 即时触发某阶段的攻击 (供主循环和并行复用; phase 2 = 召唤; 激光阶段不在此触发)
// 二阶段强化: 环形 16→20 弹, 扇形 5→7 弹, 召唤同时两种敌人
function firePhaseAttack(e, phase) {
  if (phase === 0) {
    const n = e.phase2 ? 20 : 16;
    const off = e.t;
    for (let i = 0; i < n; i++) spawnEnemyBullet(e.x, e.y, (i/n)*TAU + off, 170, 1);
  } else if (phase === 1) {
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    const half = e.phase2 ? 3 : 2; // 7 vs 5 弹
    for (let i = -half; i <= half; i++) spawnEnemyBullet(e.x, e.y, a + i*0.13, 250, 1);
  } else if (phase === 2) {
    bossSummonWave(e);
  }
}

// ============== 子弹 ==============
function fire() {
  const n = player.projectiles;
  // player.spread = 基础相邻弹道夹角. 每多一弹道总扩散 +spread (受集中射击影响)
  const totalSpread = Math.max(0, n - 1) * player.spread;
  for (let i = 0; i < n; i++) {
    const t = n === 1 ? 0 : (i / (n - 1) - 0.5);
    const a = -Math.PI/2 + t * totalSpread;
    // 深度暴击 (恶魔之力): 暴击率 ≥ 100% 时整数层必定暴击, 小数部分判额外一次
    let critCount;
    if (player.deepCrit) {
      const full = Math.floor(player.critRate);
      const frac = player.critRate - full;
      critCount = full + (Math.random() < frac ? 1 : 0);
    } else {
      critCount = Math.random() < player.critRate ? 1 : 0;
    }
    const isCrit = critCount > 0;
    const dmg = player.atk * Math.pow(player.critDmg, critCount);
    bullets.push({
      x: player.x, y: player.y - 12,
      vx: Math.cos(a) * player.bulletSpeed,
      vy: Math.sin(a) * player.bulletSpeed,
      r: 6.4 * player.bulletSize,
      dmg, crit: isCrit, critCount,
      from: 'player',
      pierce: player.pierce, hit: null,
      homing: player.homing,
    });
  }
}

function spawnEnemyBullet(x, y, a, sp, dmg) {
  bullets.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, r: 5, dmg, from:'enemy' });
}

function updateBullet(b, dt) {
  if (b.from === 'player' && b.homing > 0) {
    let best = null, bd = 280;
    for (const e of enemies) {
      if (e.dead) continue;
      if (b.hit && b.hit.has(e)) continue;
      const d = dist(b, e);
      if (d < bd) { bd = d; best = e; }
    }
    if (best) {
      const ta = Math.atan2(best.y - b.y, best.x - b.x);
      const ca = Math.atan2(b.vy, b.vx);
      let diff = ta - ca;
      while (diff > Math.PI) diff -= TAU;
      while (diff < -Math.PI) diff += TAU;
      const turn = b.homing * 1.75 * dt;
      const na = ca + clamp(diff, -turn, turn);
      const sp = Math.hypot(b.vx, b.vy);
      b.vx = Math.cos(na) * sp;
      b.vy = Math.sin(na) * sp;
    }
  }
  // 色欲: 玩家一定半径内的敌弹受到指向玩家的加速度, 大小随距离平方衰减
  if (b.from === 'enemy' && game.activeCurses.has('lust')) {
    const dx = player.x - b.x, dy = player.y - b.y;
    const d = Math.hypot(dx, dy);
    const R = 100;
    if (d > 0 && d < R) {
      const K = 15000;
      const minD = 25;
      const dEff = Math.max(d, minD);
      const acc = K / (dEff * dEff);
      b.vx += (dx / d) * acc * dt;
      b.vy += (dy / d) * acc * dt;
    }
  }
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  if (b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) b.dead = true;
}

function hitEnemy(e, b) {
  // boss 入场布尔 true / 镜像受击数字 / interceptor·spiker 警示期间都免疫
  if (e.invuln === true || e.invuln > 0 || e.warningT > 0) {
    addHitParticles(b.x, b.y);
    floats.push({ x: b.x, y: b.y - 5, t: 0.4, life: 0.4, txt: '免疫', color: '#fc4', size: 11 });
    return;
  }
  // 镜像分身: 优先扣盾后扣血; 每次扣血恢复全部护盾
  if (e.type === 'mirror') {
    let lostHp = false;
    if (e.shield > 0) {
      e.shield -= 1;
      floats.push({ x: b.x, y: b.y - 5, t: 0.5, life: 0.5, txt: '-1 盾', color: '#7df', size: 12 });
    } else {
      e.hp -= 1;
      lostHp = true;
      floats.push({ x: b.x, y: b.y - 5, t: 0.5, life: 0.5, txt: '-1', color: '#f44', size: 13 });
    }
    addHitParticles(b.x, b.y);
    e.invuln = e.invulnT;
    if (lostHp && e.hp > 0) {
      e.shield = e.maxShield;
      e.shieldDelay = 0;
      e.shieldRegenT = 0;
      floats.push({ x: e.x, y: e.y - e.r - 12, t: 0.6, life: 0.6, txt: '盾恢复', color: '#7df', size: 12 });
    } else {
      e.shieldDelay = e.shieldRegenDelayBase;
      e.shieldRegenT = 0;
    }
    if (e.hp <= 0 && !e.dead) {
      e.dead = true; e.killed = true;
      addExplosion(e.x, e.y, e.color, 28);
      game.shake = Math.max(game.shake, 0.18);
    }
    return;
  }
  e.hp -= b.dmg;
  addHitParticles(b.x, b.y);
  const cc = b.critCount || 0;
  const dmgTxt = Math.ceil(b.dmg) + (cc >= 2 ? '!!' : cc >= 1 ? '!' : '');
  const dmgColor = cc >= 2 ? '#ff4d5e' : cc >= 1 ? '#ffe34a' : '#fff';
  const dmgSize = cc >= 2 ? 18 : cc >= 1 ? 16 : 12;
  floats.push({ x: b.x, y: b.y - 5, t: 0.55, life: 0.55, txt: dmgTxt, color: dmgColor, size: dmgSize });
  // Boss 金币: 一半随血量逐个掉落 (剩下一半在死亡时掉)
  if (e.boss) {
    if (e.coinDropped === undefined) e.coinDropped = 0;
    const halfCoin = Math.floor(e.coin / 2);
    const ratio = Math.max(0, e.hp) / e.maxHp;
    const shouldDrop = Math.floor((1 - ratio) * halfCoin);
    while (e.coinDropped < shouldDrop) {
      spawnCoins(e.x, e.y, 1);
      e.coinDropped++;
    }
  }
  if (e.hp <= 0 && !e.dead) {
    // boss 二阶段触发: 第 5 次出场起, 第一次打到 0 血不死, 进入过渡 (回中心 + 血条恢复满 + 体型缩小)
    if (e.boss && game.bossEncounter >= 5 && !e.phase2Triggered) {
      e.phase2Triggered = true;
      e.phase2Triggering = true;
      e.phase2Timer = 0;
      e.invuln = true;
      e.hp = 0;
      addExplosion(e.x, e.y, '#ffaa66', 25);
      game.shake = Math.max(game.shake, 0.4);
      return;
    }
    e.dead = true; e.killed = true;
    addExplosion(e.x, e.y, e.color, e.boss ? 50 : 14);
    game.shake = e.boss ? 0.7 : Math.max(game.shake, 0.06);
    if (e.boss) {
      // boss 死亡: 召唤的敌人立即消失, 分裂机不分裂、不掉金、不计经验
      for (const o of enemies) {
        if (o.summoned && !o.dead) {
          o.dead = true;
          o.killed = false; // 防 cleanup 进入分裂/经验/金币逻辑
          addExplosion(o.x, o.y, o.color, 6);
        }
      }
    }
  }
}

// 玩家碰撞敌机: 有盾全部击破; 无盾则扣 1 格生命 (愤怒诅咒下扣 2)。闪避对碰撞无效。
function collideKill() {
  if (player.invuln > 0) return;
  if (player.shield > 0) {
    player.shield = 0;
    player.shieldDelay = player.shieldRegenDelayBase * 1.5;
    player.shieldRegenT = 0;
    player.invuln = game.activeCurses.has('pride') ? 0 : 0.8;
    game.shake = 0.45;
    floats.push({ x: player.x, y: player.y, t: 0.7, life: 0.7, txt: '盾被击破!', color: '#7df', size: 14 });
  } else {
    const dmg = game.activeCurses.has('wrath') ? 2 : 1;
    player.hp -= dmg;
    player.shieldDelay = player.shieldRegenDelayBase;
    player.shieldRegenT = 0;
    player.invuln = game.activeCurses.has('pride') ? 0 : 0.8;
    game.shake = 0.5;
    floats.push({ x: player.x, y: player.y, t: 0.7, life: 0.7, txt: '-' + dmg, color: '#f44', size: 16 });
    if (player.hp <= 0) { player.hp = 0; onGameOver(); }
  }
}

// Boss 碰撞: 同样清盾/无盾即死, 但 boss 不被消除, 玩家被击退离开 boss
function collideKillBoss(b) {
  if (player.invuln > 0) return;
  // 击退方向 = 从 boss 指向玩家
  const dx = player.x - b.x, dy = player.y - b.y;
  const d = Math.hypot(dx, dy) || 1;
  player.knockVx = (dx / d) * 750;
  player.knockVy = (dy / d) * 750;
  player.knockT = 0.4;
  collideKill();
}

// 所有敌人攻击 = 1 格. 优先扣盾, 否则扣血. 闪避概率完全免伤。
function damagePlayer() {
  if (player.invuln > 0) return;
  if (player.evade > 0 && Math.random() < player.evade) {
    player.invuln = 0.3;
    floats.push({ x: player.x, y: player.y - 8, t: 0.6, life: 0.6, txt: '闪避', color: '#7df', size: 13 });
    return;
  }
  // 愤怒: 受伤翻倍 (本波生效)
  const dmg = game.activeCurses.has('wrath') ? 2 : 1;
  if (player.shield > 0) {
    const absorb = Math.min(player.shield, dmg);
    player.shield -= absorb;
    const overflow = dmg - absorb;
    floats.push({ x: player.x, y: player.y, t: 0.55, life: 0.55, txt: '-' + absorb + ' 盾', color: '#7df', size: 13 });
    if (overflow > 0) {
      player.hp -= overflow;
      floats.push({ x: player.x, y: player.y - 12, t: 0.55, life: 0.55, txt: '-' + overflow, color: '#f44', size: 14 });
      if (player.shockwaveOnHit && player.hp > 0) spawnShockwave(player.x, player.y, 220);
    }
  } else {
    player.hp -= dmg;
    floats.push({ x: player.x, y: player.y, t: 0.55, life: 0.55, txt: '-' + dmg, color: '#f44', size: 14 });
    if (player.shockwaveOnHit && player.hp > 0) spawnShockwave(player.x, player.y, 220);
  }
  player.shieldDelay = player.shieldRegenDelayBase;
  player.shieldRegenT = 0;
  // 傲慢: 取消受击无敌时间
  player.invuln = game.activeCurses.has('pride') ? 0 : 0.6;
  game.shake = 0.28;
  if (player.hp <= 0) { player.hp = 0; onGameOver(); }
}

function openLevelup() {
  game.state = 'levelup';
  const pool = LEVEL_OPTIONS.slice();
  const picks = [];
  for (let i = 0; i < 3 && pool.length; i++) {
    picks.push(pool.splice(Math.floor(Math.random()*pool.length), 1)[0]);
  }
  overlay.className = 'overlay show';
  overlay.innerHTML = `
    <div class="title">⚡ 等级 ${game.level} → ${game.level + 1}</div>
    <div class="subtitle">三选一 · 升级基于初始基础值线性叠加</div>
    <div class="cards" id="cards"></div>`;
  const wrap = document.getElementById('cards');
  picks.forEach(p => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<div class="ico">${p.icon}</div><div class="nm">${p.n}</div><div class="ds">${p.desc()}</div>`;
    el.onclick = () => {
      p.apply();
      game.level++;
      game.killCount = 0;
      game.killForLevel = expNeeded(game.level);
      overlay.className = 'overlay';
      overlay.innerHTML = '';
      game.state = 'playing';
      // 升级反应缓冲: 1s 无敌 + 玩家位置冲击波清近距离威胁
      player.invuln = Math.max(player.invuln, 1.0);
      spawnShockwave(player.x, player.y, 280);
      game.shake = Math.max(game.shake, 0.18);
    };
    wrap.appendChild(el);
  });
}
