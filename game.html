// ============== 波次生成 ==============
// 计算本波的 "新敌人" 类型: 累计的非 boss 波编号映射到 ENEMY_ORDER
function computeNewEnemyType(round, wave) {
  if (wave === game.wavesPerRound) return null;
  const idx = (round - 1) * (game.wavesPerRound - 1) + (wave - 1);
  return ENEMY_ORDER[idx] || null;
}

function generateWave(round, wave) {
  const q = [];
  // 普通敌人随轮次 ×1.8 / 轮; boss 单独 ×2.5 / 轮
  const scale = Math.pow(1.8, round - 1);
  if (wave === game.wavesPerRound) {
    const bossScale = Math.pow(2.5, round - 1);
    q.push({ type:'boss', scale: bossScale, gap: 1.0 });
    return q;
  }
  // 威胁容量: 初始 12, 每波 / 每轮线性 +4 (按累计非 boss 波编号增长)
  const idx = (round - 1) * (game.wavesPerRound - 1) + (wave - 1);
  const cap = 12 + idx * 4;
  const mainType = computeNewEnemyType(round, wave);
  if (mainType) {
    // 单一类型 (引入新敌人时, 整波都是这一种)
    // 刷到 spent 超过 cap 后才停, 因此最后一只会让总威胁略超
    const threat = ENEMY_THREAT[mainType] || 1;
    let spent = 0;
    while (spent <= cap) {
      q.push({ type: mainType, scale, gap: gapForThreat(threat) });
      spent += threat;
    }
  } else {
    // 多种敌人组合 (所有类型已解锁后)
    const introducedNonBoss = [...game.introduced].filter(t => t !== 'boss' && ENEMY_THREAT[t] !== undefined);
    if (!introducedNonBoss.length) introducedNonBoss.push('rusher');
    // 随机抽固定数量的种类作为本波池, 介绍卡也只显示这几种
    const wantCount = Math.min(comboTypeCount(round), introducedNonBoss.length);
    const pool = [];
    const remaining = introducedNonBoss.slice();
    for (let i = 0; i < wantCount && remaining.length; i++) {
      const idx = Math.floor(Math.random() * remaining.length);
      pool.push(remaining.splice(idx, 1)[0]);
    }
    // 每批刷 wantCount 只 (pool 中每种各 1); 批内 gap=0 同帧出场, 批间 gap = 平均威胁的 gap
    const batchThreat = pool.reduce((s, t) => s + ENEMY_THREAT[t], 0);
    const avgThreat = batchThreat / pool.length;
    const batchGap = gapForThreat(avgThreat);
    let spent = 0;
    let safety = 100;
    while (spent <= cap && safety-- > 0) {
      pool.forEach((t, i) => {
        q.push({ type: t, scale, gap: i === 0 ? batchGap : 0 });
      });
      spent += batchThreat;
    }
  }
  if (q.length > 0) q[0].gap = 0.8;
  return q;
}

function spawnEnemy(s) {
  if (s.type === 'boss') return spawnBoss(s.scale);
  const sc = s.scale;
  const e = { x: rand(40, W-40), y: -30, t: 0, type: s.type, scale: sc, dead: false, killed: false };
  if (s.type === 'rusher') {
    e.r = 14; e.maxHp = 18*sc; e.vy = rand(140, 200);
    e.coin = 1; e.color = '#e34a4a';
  } else if (s.type === 'zigzag') {
    e.r = 13; e.maxHp = 24*sc; e.vy = rand(100, 140);
    e.amp = rand(60, 120); e.freq = rand(1.5, 2.5);
    // 防止贴边: bx 必须给摆动留出 amp + r 的安全距离
    e.bx = clamp(e.x, e.r + e.amp, W - e.r - e.amp);
    e.x = e.bx;
    e.coin = 2; e.color = '#e3a44a';
  } else if (s.type === 'shooter') {
    e.r = 16; e.maxHp = 38*sc; e.vy = rand(70, 100);
    e.targetY = rand(80, 200); e.fireT = rand(1, 2);
    e.coin = 3; e.color = '#a44ae3';
  } else if (s.type === 'elite') {
    e.r = 22; e.maxHp = 90*sc; e.vy = rand(60, 90);
    e.targetY = rand(100, 180); e.fireT = rand(1.5, 2.5);
    e.coin = 6; e.color = '#4ae3a4';
  } else if (s.type === 'bomber') {
    // 自爆体: 飞至玩家上方停顿后引爆
    e.r = 18; e.maxHp = 40*sc; e.vy = rand(80, 110);
    e.targetY = clamp(player.y - 220, 80, H - 200);
    e.fuseT = 1.2; e.armed = false;
    e.coin = 4; e.color = '#7e4ad6';
  } else if (s.type === 'splitter') {
    // 分裂体: 死亡时碎成两个小冲撞
    e.r = 18; e.maxHp = 50*sc; e.vy = rand(80, 120);
    e.amp = rand(40, 80); e.freq = rand(1.0, 1.8);
    e.bx = clamp(e.x, e.r + e.amp, W - e.r - e.amp);
    e.x = e.bx;
    e.split = true; e.coin = 4; e.color = '#5fc4ff';
  } else if (s.type === 'gunship') {
    // 重炮舰: 慢速大血量, 持续散弹
    e.r = 26; e.maxHp = 140*sc; e.vy = rand(40, 70);
    e.targetY = rand(80, 150); e.fireT = rand(0.8, 1.2);
    e.coin = 10; e.color = '#ff8844';
  } else if (s.type === 'interceptor') {
    // 拦截机: 从左右屏幕中段出现, 警示后锁定玩家位置直线高速冲撞
    e.r = 14; e.maxHp = 18 * sc;
    const fromLeft = Math.random() < 0.5;
    e.x = fromLeft ? 8 : W - 8;
    e.y = rand(H / 3, 2 * H / 3);
    e.warningT = 0.8;
    e.aimX = player.x; e.aimY = player.y;
    e.vx = 0; e.vy = 0;
    e.coin = 3; e.color = '#ffaa00';
  } else if (s.type === 'spiker') {
    // 钉刺机: 从屏幕底部出现, 慢速向上
    e.r = 16; e.maxHp = 60 * sc;
    e.x = rand(80, W - 80);
    e.y = H - 10;
    e.vy = -rand(60, 90);
    e.warningT = 0.8;
    e.coin = 3; e.color = '#aaff66';
  }
  e.hp = e.maxHp;
  if (s.summoned) {
    e.summoned = true;
    e.coin = 0; // 召唤的敌人不掉金币
  }
  enemies.push(e);
}

// Boss 第三技能: 召唤一波小怪. 一阶段容量 = 波 cap / 6, 二阶段强化为 / 4
// 二阶段池子收敛为随机 2 种, 同时刷出两种敌人混合
function bossSummonWave(boss) {
  const idx = (game.round - 1) * (game.wavesPerRound - 1) + (game.wave - 1);
  const waveCap = 12 + idx * 4;
  const summonCap = boss.phase2
    ? Math.max(2, Math.floor(waveCap / 4))
    : Math.max(2, Math.floor(waveCap / 6));
  const allTypes = ['splitter', 'spiker', 'interceptor'];
  let types;
  if (boss.phase2) {
    // 二阶段: 随机选 2 种, 每次刷 1 种 (混合两类)
    const shuffled = allTypes.slice().sort(() => Math.random() - 0.5);
    types = shuffled.slice(0, 2);
  } else {
    // 一阶段: 单次召唤只用 1 种, 整批同型
    types = [allTypes[Math.floor(Math.random() * allTypes.length)]];
  }
  const enemyScale = Math.pow(2, game.round - 1);
  let spent = 0;
  let safety = 50;
  while (spent <= summonCap && safety-- > 0) {
    const t = types[Math.floor(Math.random() * types.length)];
    spawnEnemy({ type: t, scale: enemyScale, summoned: true });
    spent += ENEMY_THREAT[t] || 1;
  }
}

// 嫉妒诅咒召唤的镜像分身: 继承玩家主要战斗属性, 但不掉落金币
// 受击与玩家一致 (优先扣盾, 大幅无敌时间). 撞玩家/光球: 双向清盾/即死.
function spawnMirrorEnemy() {
  const m = {
    x: rand(80, W - 80), y: -50,
    r: player.r,
    type: 'mirror',
    // 镜像出场时血盾全满, 只继承玩家上限不继承当前剩余
    maxHp: player.maxHp, hp: player.maxHp,
    maxShield: player.maxShield, shield: player.maxShield,
    fireRate: player.fireRate,
    projectiles: player.projectiles,
    moveSpeed: player.moveSpeed,
    bulletSpeed: player.bulletSpeed,
    bulletSize: player.bulletSize,
    spread: player.spread,
    color: '#e060c8',
    coin: 0,
    invuln: 2.0,            // 出场无敌 2 秒 (类似 boss 入场)
    spawnInvulnT: 2.0,      // 入场无敌计时, 期间画金色光环
    invulnT: 0.6,           // 受击后无敌时间, 与玩家一致
    shieldDelay: 0,
    shieldRegenDelayBase: player.shieldRegenDelayBase,
    shieldRegenInterval: player.shieldRegenInterval,
    shieldRegenT: 0,
    shotCD: 0.6,            // 出场延迟射击
    cycleT: 0,              // 攻击周期: 1.5s 射击 + 0.5s 暂停
    t: 0, sinPhase: rand(0, TAU),
    dead: false, killed: false,
  };
  enemies.push(m);
}

function mirrorFire(e) {
  const aim = Math.atan2(player.y - e.y, player.x - e.x);
  const n = e.projectiles;
  const spread = e.spread ?? 0.16;
  const total = spread * (n - 1);
  const sp = e.bulletSpeed || 360;
  for (let i = 0; i < n; i++) {
    const t = n === 1 ? 0 : (i / (n - 1) - 0.5);
    const a = aim + t * total;
    // 镜像子弹继承玩家穿透 → 在 parry 抵消时按相同规则消耗 pierce
    bullets.push({
      x: e.x, y: e.y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      r: 6.4 * (e.bulletSize || 1), dmg: 1, from: 'enemy',
      pierce: player.pierce | 0,
    });
  }
}

function updateMirror(e, dt) {
  e.t += dt;
  if (e.spawnInvulnT > 0) {
    e.spawnInvulnT -= dt;
    if (e.spawnInvulnT < 0) e.spawnInvulnT = 0;
    e.invuln = Math.max(e.invuln, 0.2);
  }
  if (e.invuln > 0) e.invuln = Math.max(0, e.invuln - dt);
  // 护盾恢复: 受击后 shieldRegenDelayBase 秒后开始, 每 shieldRegenInterval 秒补 1 格
  if (e.shieldDelay > 0) {
    e.shieldDelay -= dt;
    e.shieldRegenT = 0;
  } else if (e.shield < e.maxShield) {
    e.shieldRegenT += dt;
    if (e.shieldRegenT >= e.shieldRegenInterval) {
      e.shieldRegenT -= e.shieldRegenInterval;
      e.shield = Math.min(e.maxShield, e.shield + 1);
    }
  }
  // 维持 200px 距离的简单 AI
  const dx = player.x - e.x, dy = player.y - e.y;
  const d = Math.hypot(dx, dy) || 1;
  const ideal = 200;
  let vx, vy;
  if (d > ideal + 50) {
    vx = (dx / d) * e.moveSpeed;
    vy = (dy / d) * e.moveSpeed;
  } else if (d < ideal - 50) {
    vx = -(dx / d) * e.moveSpeed * 0.7;
    vy = -(dy / d) * e.moveSpeed * 0.7;
  } else {
    // 切线绕飞 + 微抖
    vx = (-dy / d) * e.moveSpeed * 0.6 * Math.sin(e.t * 1.5 + e.sinPhase);
    vy = (dx / d) * e.moveSpeed * 0.6 * Math.sin(e.t * 1.5 + e.sinPhase);
  }
  e.x += vx * dt;
  e.y += vy * dt;
  e.x = clamp(e.x, e.r, W - e.r);
  e.y = clamp(e.y, e.r, H * 0.7); // 不让它太靠近底部, 给玩家空间
  // 攻击周期: 连续射击 1.5s 后暂停 0.5s
  e.cycleT = (e.cycleT + dt) % 2.0;
  if (e.cycleT < 1.5) {
    e.shotCD -= dt;
    if (e.shotCD <= 0) {
      mirrorFire(e);
      e.shotCD = 1 / e.fireRate;
    }
  } else {
    // 暂停期: 重置 shotCD 让下个射击周期立即开火
    e.shotCD = 0;
  }
}

function spawnBoss(scale) {
  const enc = Math.max(1, game.bossEncounter || 1);
  const skillCount = Math.min(4, enc);
  // 第 4 次出场起每次缩短间隔, 第 10 次达到 ×0.5 后不再变
  const intervalMul = Math.max(0.5, 1 - Math.max(0, enc - 4) * (0.5 / 6));
  // 同步: 并行概率从 0 线性增至 0.5
  const parallelChance = Math.min(0.5, Math.max(0, (enc - 4) * (0.5 / 6)));
  // 一阶段血量 (二阶段触发时回满, 总伤害 ≈ ×2)
  const totalHp = 700 * scale;
  // 出场起手随机选一个已解锁的技能
  const initialPhase = Math.floor(Math.random() * skillCount);
  const boss = {
    x: W/2, y: -80, r: 50, type:'boss', boss:true,
    maxHp: totalHp, hp: totalHp,
    coin: 40 + 10 * game.round, color: '#ff4488',
    targetY: 110, vy: 50, vx: 80,
    phase: initialPhase, phaseT: 0, fireT: 0, t: 0,
    invuln: true,
    laserState: 'idle', laserWidth: 0,
    skillCount, intervalMul, parallelChance,
    parallelFireT: 1.0,
    phase2: false, phase2Triggered: false, phase2Triggering: false, phase2Timer: 0,
    altLaserType: null,
    cornerLaserInit: false, corners: null, cornerTargets: null, cornerFired: null, cornerActive: null,
    sweepInit: false, sweepState: 'idle', sweepWidth: 0, sweepCurrentA: 0,
    dead: false, killed: false, scale,
  };
  enemies.push(boss);
  // 起手就是召唤的话, 立即触发一次召唤 (因为正常召唤在 phase 切换时触发)
  if (initialPhase === 2) bossSummonWave(boss);
}

// ============== 敌人逻辑 ==============
function updateEnemy(e, dt) {
  if (game.freezeT > 0) return;  // 时空断裂: 敌人 / Boss / Mirror 全部停摆
  e.t += dt;
  if (e.boss) return updateBoss(e, dt);
  if (e.type === 'mirror') return updateMirror(e, dt);
  // 警示期: 不动作不受击不撞击, 倒计时结束后初始化方向
  if (e.warningT > 0) {
    e.warningT -= dt;
    if (e.warningT <= 0) {
      e.warningT = 0;
      if (e.type === 'interceptor') {
        const dx = e.aimX - e.x, dy = e.aimY - e.y;
        const d = Math.hypot(dx, dy) || 1;
        const speed = 380;
        e.vx = (dx / d) * speed;
        e.vy = (dy / d) * speed;
      }
    }
    return;
  }
  if (e.type === 'rusher') {
    e.y += e.vy * dt;
    e.x += clamp((player.x - e.x) * 0.6, -70, 70) * dt;
  } else if (e.type === 'zigzag') {
    e.y += e.vy * dt;
    e.x = e.bx + Math.sin(e.t * e.freq) * e.amp;
  } else if (e.type === 'shooter') {
    if (e.y < e.targetY) e.y += e.vy * dt;
    else {
      e.fireT -= dt;
      if (e.fireT <= 0) {
        e.fireT = rand(1.4, 2.2);
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        spawnEnemyBullet(e.x, e.y, a, 240, 8);
      }
      e.x += Math.sin(e.t * 1.2) * 90 * dt;
    }
  } else if (e.type === 'elite') {
    if (e.y < e.targetY) e.y += e.vy * dt;
    else {
      e.fireT -= dt;
      if (e.fireT <= 0) {
        e.fireT = rand(1.8, 2.6);
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        for (let i = -1; i <= 1; i++) spawnEnemyBullet(e.x, e.y, a + i*0.22, 220, 1);
      }
      e.x += Math.cos(e.t * 0.8) * 110 * dt;
    }
  } else if (e.type === 'bomber') {
    if (!e.armed) {
      if (e.y < e.targetY) e.y += e.vy * dt;
      else { e.armed = true; }
      // 跟踪玩家小幅修正
      e.x += clamp((player.x - e.x) * 0.6, -50, 50) * dt;
    } else {
      e.fuseT -= dt;
      if (e.fuseT <= 0) {
        // 引爆: 12 方向放射, 自身消失但不算被击杀(无金币/经验)
        const n = 12;
        for (let i = 0; i < n; i++) spawnEnemyBullet(e.x, e.y, (i/n)*TAU, 200, 1);
        addExplosion(e.x, e.y, e.color, 28);
        game.shake = Math.max(game.shake, 0.18);
        e.dead = true;
      }
    }
  } else if (e.type === 'splitter') {
    e.y += e.vy * dt;
    e.x = e.bx + Math.sin(e.t * e.freq) * e.amp;
  } else if (e.type === 'gunship') {
    if (e.y < e.targetY) e.y += e.vy * dt;
    else {
      e.fireT -= dt;
      if (e.fireT <= 0) {
        e.fireT = rand(2.0, 2.8);
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        for (let i = -2; i <= 2; i++) spawnEnemyBullet(e.x, e.y, a + i*0.15, 200, 1);
      }
      e.x += Math.cos(e.t * 0.6) * 70 * dt;
    }
  } else if (e.type === 'interceptor') {
    e.x += e.vx * dt;
    e.y += e.vy * dt;
  } else if (e.type === 'spiker') {
    e.y += e.vy * dt;
  } else if (e.type === 'shard') {
    // 加速度方向始终指向玩家, 速度有上限, 有惯性
    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.hypot(dx, dy) || 1;
    e.vx += (dx / d) * e.accel * dt;
    e.vy += (dy / d) * e.accel * dt;
    const sp = Math.hypot(e.vx, e.vy);
    if (sp > e.maxSpeed) {
      e.vx = e.vx / sp * e.maxSpeed;
      e.vy = e.vy / sp * e.maxSpeed;
    }
    e.x += e.vx * dt;
    e.y += e.vy * dt;
  }
  // 冲击波击退 (Boss 不受影响, 在 updateBoss 路径不会走到这)
  if (e.knockT > 0) {
    if (e.bx !== undefined) e.bx += e.knockVx * dt;
    else e.x += e.knockVx * dt;
    e.y += e.knockVy * dt;
    e.knockVx *= 0.88; e.knockVy *= 0.88;
    e.knockT -= dt;
  }
  // 拦截机/碎片不限 x (穿屏 / 加速度自由飞), 其他敌人 clamp 在屏幕内
  if (e.type !== 'interceptor' && e.type !== 'shard') {
    e.x = clamp(e.x, e.r, W - e.r);
  }
  // 碎片: 任何方向飞出屏幕直接消失 (不重生, 因为是分裂出来的临时威胁)
  if (e.type === 'shard') {
    if (e.x < -60 || e.x > W + 60 || e.y < -60 || e.y > H + 60) e.dead = true;
  } else
  // 飞出屏幕重生: 保留当前血量, 防止永远打不死
  if (e.type === 'interceptor') {
    if (e.x < -60 || e.x > W + 60 || e.y < -60 || e.y > H + 60) {
      const fromLeft = Math.random() < 0.5;
      e.x = fromLeft ? 8 : W - 8;
      e.y = rand(H / 3, 2 * H / 3);
      e.warningT = 0.8;
      e.aimX = player.x; e.aimY = player.y;
      e.vx = 0; e.vy = 0;
      e.t = 0;
      clearBurn(e);
    }
  } else if (e.type === 'spiker') {
    if (e.y < -e.r - 30) {
      e.x = rand(80, W - 80);
      e.y = H - 10;
      e.warningT = 0.8;
      e.vy = -rand(60, 90);
      e.t = 0;
      clearBurn(e);
    }
  } else if (e.y > H + 60) {
    e.y = -e.r - 10;
    e.x = rand(40, W - 40);
    if (e.bx !== undefined) e.bx = e.x;
    e.t = 0;
    clearBurn(e);
  }
}

function updateBoss(e, dt) {
  e.t += dt;
  if (e.y < e.targetY) {
    e.y += e.vy * dt;
    e.invuln = true;
    return;
  }
  e.invuln = e.phase2Triggering ? true : false;

  if (e.phase2Triggering) {
    e.phase2Timer += dt;
    const T_TOTAL = 3.0;
    const T_MOVE = 1.0;     // 0~1s 移动到中心
    const T_FILL = 2.5;     // 1~2.5s 血条 0 → 满
    // 移动到屏幕中心
    if (e.phase2Timer < T_MOVE) {
      const dx = (W / 2) - e.x;
      const step = 200 * dt;
      e.x += Math.sign(dx) * Math.min(Math.abs(dx), step);
    } else {
      e.x = W / 2;
    }
    // 血条恢复 (插值)
    if (e.phase2Timer >= T_MOVE && e.phase2Timer <= T_FILL) {
      const t = clamp((e.phase2Timer - T_MOVE) / (T_FILL - T_MOVE), 0, 1);
      e.hp = e.maxHp * t;
    }
    // 卸甲粒子持续到血条恢复完成
    if (e.phase2Timer < T_FILL && Math.random() < 0.5) {
      const a = Math.random() * TAU;
      particles.push({
        x: e.x + Math.cos(a) * e.r * 0.85,
        y: e.y + Math.sin(a) * e.r * 0.85,
        vx: Math.cos(a) * 80, vy: Math.sin(a) * 80 + 40,
        t: 0.7, life: 0.7, r: rand(2, 3.5), color: '#ffaa66',
      });
    }
    if (e.phase2Timer >= T_TOTAL) {
      e.phase2Triggering = false;
      e.phase2 = true;
      e.hp = e.maxHp; // 二阶段开始时满血
      e.invuln = false;
      e.vx = 0;
      e.x = W / 2;
      e.r = Math.round(e.r * 0.85); // 体型缩小 15%
      addExplosion(e.x, e.y, '#ff8866', 35);
      game.shake = Math.max(game.shake, 0.5);
      // 二阶段技能池扩展为 5 (corner 激光 + sweep 激光独立两个 phase)
      e.skillCount = 5;
      e.phase = Math.floor(Math.random() * 5);
      e.phaseT = 0;
      e.fireT = 0.5;
      e.laserState = 'idle';
      e.laserWidth = 0;
      if (e.phase === 2) bossSummonWave(e);
    }
    return;
  }

  // 二阶段不再左右移动
  if (!e.phase2) {
    const vxMul = (e.phase === 3) ? 1.7 : 1;
    e.x += e.vx * dt * vxMul;
    if (e.x < e.r + 10) { e.x = e.r + 10; e.vx = Math.abs(e.vx); }
    if (e.x > W - e.r - 10) { e.x = W - e.r - 10; e.vx = -Math.abs(e.vx); }
  }

  e.phaseT += dt;
  e.fireT -= dt;
  // 召唤 phase 用时短一些, 便于衔接其他技能
  const phaseDur = e.phase === 2 ? 2 : 4;
  if (e.phaseT > phaseDur) {
    e.phaseT = 0;
    // 随机选一个非当前的 phase, 避免连续重复同一种攻击
    if (e.skillCount > 1) {
      const others = [];
      for (let i = 0; i < e.skillCount; i++) if (i !== e.phase) others.push(i);
      e.phase = others[Math.floor(Math.random() * others.length)];
    }
    e.fireT = 0.4;
    e.laserState = 'idle';
    e.laserWidth = 0;
    e.cornerLaserInit = false;
    e.corners = null; e.cornerTargets = null; e.cornerFired = null;
    e.sweepInit = false;
    e.sweepWidth = 0;
    e.sweepState = 'idle';
    // 进入 phase 2 (召唤): 立即召唤一波小怪
    if (e.phase === 2) bossSummonWave(e);
  }

  // 单技能内的 fireT 间隔仅按轮次轻度缩短, 不再受 boss 出场强化
  const fireFactor = Math.max(0.45, 1 - (game.round - 1) * 0.14);
  fireBossPhase(e, e.phase, fireFactor);
}

// 主循环用: 处理 fireT 计时并按阶段发射
function fireBossPhase(e, phase, fireFactor) {
  if (phase === 0) {
    if (e.fireT <= 0) {
      e.fireT = 0.9 * fireFactor;
      firePhaseAttack(e, 0);
    }
  } else if (phase === 1) {
    if (e.fireT <= 0) {
      e.fireT = 0.4 * fireFactor;
      firePhaseAttack(e, 1);
    }
  } else if (phase === 2) {
    // phase 2 是召唤波 (在 phase 切换时已触发), 期间 boss 不再发射弹幕
  } else if (phase === 3) {
    // 二阶段: 三角锁定激光; 一阶段: 原竖直激光柱
    if (e.phase2) {
      executeCornerLaser(e);
    } else {
      const t = e.phaseT;
      if (t < 0.6) {
        e.laserState = 'charge';
        e.laserWidth = 4 + Math.sin(t * 30) * 2 + t * 4;
      } else if (t < 3.5) {
        e.laserState = 'fire';
        e.laserWidth = 34 + Math.sin(t * 20) * 4;
      } else {
        e.laserState = 'idle';
        e.laserWidth = 0;
      }
    }
  } else if (phase === 4 && e.phase2) {
    // 二阶段独有: 90° 扫屏激光
    executeSweepLaser(e);
  }
}

// 二阶段激光 A: 三个顶点逐个锁定玩家位置, 1 秒后发射. 三道激光各亮 0.4 秒
function executeCornerLaser(e) {
  if (!e.cornerLaserInit) {
    e.cornerLaserInit = true;
    e.corners = [
      { key:'leftTop',  lockT: 0, fireT: 1 },
      { key:'rightTop', lockT: 1, fireT: 2 },
      { key:'bottom',   lockT: 2, fireT: 3 },
    ];
    e.cornerTargets = [null, null, null];
    e.cornerFired = [false, false, false];
    e.cornerActive = [];
  }
  const t = e.phaseT;
  const verts = getBossVertices(e);
  for (let i = 0; i < 3; i++) {
    const c = e.corners[i];
    if (t >= c.lockT && t < c.fireT && e.cornerTargets[i] === null) {
      e.cornerTargets[i] = { x: player.x, y: player.y };
    }
    if (t >= c.fireT && !e.cornerFired[i] && e.cornerTargets[i]) {
      e.cornerFired[i] = true;
      const start = verts[c.key];
      const tgt = e.cornerTargets[i];
      const dx = tgt.x - start.x, dy = tgt.y - start.y;
      const len = Math.hypot(dx, dy) || 1;
      e.cornerActive.push({
        x1: start.x, y1: start.y,
        x2: start.x + (dx / len) * 1500,
        y2: start.y + (dy / len) * 1500,
        t: 0.4, life: 0.4,
      });
    }
  }
}

// 二阶段激光 B: 从 boss 倒三角下顶点向下方扫一道 90° 弧形激光, 5 秒匀速扫
function executeSweepLaser(e) {
  if (!e.sweepInit) {
    e.sweepInit = true;
    const startA = Math.PI / 4;        // 右下 45°
    const endA = 3 * Math.PI / 4;      // 左下 45°
    const dir = Math.random() < 0.5 ? 1 : -1;
    e.sweepStartA = dir === 1 ? startA : endA;
    e.sweepEndA   = dir === 1 ? endA   : startA;
  }
  const t = e.phaseT;
  if (t < 0.4) {
    e.sweepState = 'charge';
    e.sweepCurrentA = e.sweepStartA;
    e.sweepWidth = 4 + t * 8;
  } else if (t < 3.5) {
    e.sweepState = 'fire';
    const ratio = (t - 0.4) / 3.1;
    e.sweepCurrentA = e.sweepStartA + (e.sweepEndA - e.sweepStartA) * ratio;
    e.sweepWidth = 30 + Math.sin(t * 18) * 4;
  } else {
    e.sweepState = 'idle';
    e.sweepWidth = 0;
  }
}

// 即时触发某阶段的攻击 (供主循环和并行复用; phase 2 = 召唤; 激光阶段不在此触发)
// 二阶段强化: 环形 16→20 弹, 扇形 5→7 弹, 召唤同时两种敌人
function firePhaseAttack(e, phase) {
  if (phase === 0) {
    const n = e.phase2 ? 20 : 16;
    const off = e.t;
    for (let i = 0; i < n; i++) spawnEnemyBullet(e.x, e.y, (i/n)*TAU + off, 170, 1);
  } else if (phase === 1) {
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    const half = e.phase2 ? 3 : 2; // 7 vs 5 弹
    for (let i = -half; i <= half; i++) spawnEnemyBullet(e.x, e.y, a + i*0.13, 250, 1);
  } else if (phase === 2) {
    bossSummonWave(e);
  }
}

// ============== 子弹 ==============
function fire() {
  // 独眼形态: 攻击形态变为蓄力激光, 不再生成子弹 (激光由 updatePlayerLaser 每帧维护)
  if (player.cyclops) return;
  const n = player.projectiles;
  // player.spread = 基础相邻弹道夹角. 每多一弹道总扩散 +spread (受集中射击影响)
  const totalSpread = Math.max(0, n - 1) * player.spread;
  for (let i = 0; i < n; i++) {
    const t = n === 1 ? 0 : (i / (n - 1) - 0.5);
    const a = -Math.PI/2 + t * totalSpread;
    // 深度暴击 (恶魔之力): 暴击率 ≥ 100% 时整数层必定暴击, 小数部分判额外一次
    let critCount;
    if (player.deepCrit) {
      const full = Math.floor(player.critRate);
      const frac = player.critRate - full;
      critCount = full + (Math.random() < frac ? 1 : 0);
    } else {
      critCount = Math.random() < player.critRate ? 1 : 0;
    }
    const isCrit = critCount > 0;
    const dmg = player.atk * Math.pow(player.critDmg, critCount);
    bullets.push({
      x: player.x, y: player.y - 12,
      vx: Math.cos(a) * player.bulletSpeed,
      vy: Math.sin(a) * player.bulletSpeed,
      r: 6.4 * player.bulletSize,
      dmg, crit: isCrit, critCount,
      from: 'player', source: 'bullet',
      pierce: player.pierce, hit: null,
      homing: player.homing, target: null, retargetT: 0,
    });
  }
}

// ============== 独眼激光 ==============
// 周期 LASER_CYCLE 秒 = 蓄力时间 + 发射时间.
// 发射期内伤害节拍恒定 LASER_TICK_RATE Hz; 发射时长 = LASER_CYCLE × min(fireRate / LASER_TICK_RATE, 1)
// 平均命中频率 ≈ fireRate (上限 LASER_TICK_RATE)
const LASER_TICK_RATE = 20;
const LASER_TICK = 1 / LASER_TICK_RATE;
const LASER_CYCLE = 2.0;
const LASER_SEG_LEN = 14;        // 弯曲激光分段长度 (px)
const LASER_TURN_RADIUS = 50;    // 弯曲激光固定转弯半径 (px). 越大跟踪越温和
const LASER_MAX_LEN = 1200;      // 路径最大长度
const LASER_HIT_MUL = 2.1;       // 伤害判定半径相对于核心半宽 (= 外光晕视觉边缘)

function computeLaserPath() {
  const sx = player.x, sy = player.y - 12;
  const path = [{ x: sx, y: sy }];
  if (player.homing > 0) {
    let x = sx, y = sy, dir = -Math.PI / 2;
    let total = 0;
    const turn = LASER_SEG_LEN / LASER_TURN_RADIUS;
    const halfWidth = 6.4 * player.bulletSize;
    const scanR = player.baseMagnetRange;  // 触发追踪的扫描半径 (= 吸金范围, 不随贪婪扩大)
    const scanR2 = scanR * scanR;
    const hit = new Set();
    let target = null;
    while (total < LASER_MAX_LEN && x > -60 && x < W + 60 && y > -60 && y < H + 60) {
      // 仅在当前方向"前方半圆"内 + scanR 内寻找未命中敌人 (取最近), 避免绕回身后敌人
      if (!target || target.dead || hit.has(target) ||
          target.warningT > 0 || target.invuln === true || target.invuln > 0) {
        target = null;
        let bd = scanR2;
        const fx = Math.cos(dir), fy = Math.sin(dir);
        for (const e of enemies) {
          if (e.dead || hit.has(e) || e.warningT > 0) continue;
          if (e.invuln === true || e.invuln > 0) continue;
          const dx = e.x - x, dy = e.y - y;
          if (dx * fx + dy * fy < 0) continue;  // 在身后, 跳过
          const d2 = dx * dx + dy * dy;
          if (d2 < bd) { bd = d2; target = e; }
        }
      }
      // 有目标 → 弯向目标; 无目标 → 沿当前方向直线推进
      if (target) {
        const aim = Math.atan2(target.y - y, target.x - x);
        let diff = aim - dir;
        while (diff > Math.PI) diff -= TAU;
        while (diff < -Math.PI) diff += TAU;
        diff = clamp(diff, -turn, turn);
        dir += diff;
      }
      const px = x, py = y;
      x += Math.cos(dir) * LASER_SEG_LEN;
      y += Math.sin(dir) * LASER_SEG_LEN;
      path.push({ x, y });
      total += LASER_SEG_LEN;
      // 当前段穿过当前目标 → 标记并解锁, 之后保持当前方向直到再有敌人入扫描范围
      if (target && pointToLineDist(target.x, target.y, px, py, x, y) < target.r + halfWidth * LASER_HIT_MUL) {
        hit.add(target);
        target = null;
      }
    }
  } else {
    path.push({ x: sx, y: -50 });
  }
  return path;
}

function laserSegHits(e, path, halfWidth) {
  const reach = e.r + halfWidth * LASER_HIT_MUL;
  for (let i = 0; i < path.length - 1; i++) {
    const p0 = path[i], p1 = path[i + 1];
    if (pointToLineDist(e.x, e.y, p0.x, p0.y, p1.x, p1.y) < reach) return true;
  }
  return false;
}

function laserPulse(path) {
  const halfWidth = 6.4 * player.bulletSize;
  for (const e of enemies) {
    if (e.dead || e.warningT > 0) continue;
    if (e.invuln === true || e.invuln > 0) continue;
    if (!laserSegHits(e, path, halfWidth)) continue;
    let critCount;
    if (player.deepCrit) {
      const full = Math.floor(player.critRate);
      const frac = player.critRate - full;
      critCount = full + (Math.random() < frac ? 1 : 0);
    } else {
      critCount = Math.random() < player.critRate ? 1 : 0;
    }
    const dmg = player.atk * Math.pow(player.critDmg, critCount);
    const fakeB = {
      x: e.x, y: e.y - 6,
      dmg, crit: critCount > 0, critCount,
      from: 'player', source: 'laser',
    };
    hitEnemy(e, fakeB);
    if (player.burnStacks > 0) applyBurn(e, player.burnStacks);
  }
}

function laserParry(path) {
  const halfWidth = 6.4 * player.bulletSize;
  for (const eb of bullets) {
    if (eb.from !== 'enemy' || eb.dead) continue;
    const reach = eb.r + halfWidth * LASER_HIT_MUL;
    for (let i = 0; i < path.length - 1; i++) {
      const p0 = path[i], p1 = path[i + 1];
      if (pointToLineDist(eb.x, eb.y, p0.x, p0.y, p1.x, p1.y) < reach) {
        eb.dead = true;
        addHitParticles(eb.x, eb.y);
        break;
      }
    }
  }
}

function laserPhaseTimings() {
  const ratio = clamp(player.fireRate / LASER_TICK_RATE, 0, 1);
  const fireDur = LASER_CYCLE * ratio;
  const chargeDur = LASER_CYCLE - fireDur;
  return { chargeDur, fireDur };
}

function updatePlayerLaser(dt) {
  player.laserPath = computeLaserPath();
  const { chargeDur, fireDur } = laserPhaseTimings();
  player.laserPhaseT += dt;
  if (player.laserPhase === 'charge') {
    if (player.laserPhaseT >= chargeDur) {
      player.laserPhase = 'fire';
      player.laserPhaseT -= chargeDur;
      player.laserTickT = LASER_TICK; // 进入发射期立刻第一发
    }
  }
  if (player.laserPhase === 'fire') {
    player.laserTickT += dt;
    while (player.laserTickT >= LASER_TICK) {
      player.laserTickT -= LASER_TICK;
      player.laserFlashT = 0.05;
      laserPulse(player.laserPath);
    }
    // 发射期才能 parry 路径上的敌方子弹
    if (player.bulletParry) laserParry(player.laserPath);
    if (player.laserPhaseT >= fireDur) {
      player.laserPhase = 'charge';
      player.laserPhaseT -= fireDur;
    }
  }
  if (player.laserFlashT > 0) player.laserFlashT = Math.max(0, player.laserFlashT - dt);
}

function drawPlayerLaser() {
  if (!player.cyclops) return;
  if (game.state !== 'playing' && game.state !== 'collecting' && game.state !== 'paused' && game.state !== 'resuming') return;
  const path = player.laserPath || computeLaserPath();
  if (path.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (player.laserPhase === 'fire') {
    // 发射期: 三层激光
    const halfWidth = 6.4 * player.bulletSize;
    const flash = player.laserFlashT > 0 ? clamp(player.laserFlashT / 0.05, 0, 1) : 0;
    ctx.strokeStyle = `rgba(140, 200, 255, ${0.18 + 0.25 * flash})`;
    ctx.lineWidth = halfWidth * 4.2;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.strokeStyle = `rgba(120, 220, 255, ${0.55 + 0.3 * flash})`;
    ctx.lineWidth = halfWidth * 2.0;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255, 255, 255, ${0.9 + 0.1 * flash})`;
    ctx.lineWidth = Math.max(1, halfWidth * 0.7);
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
  } else {
    // 蓄力期: 多层蓝色光晕 + 流动虚线 + 起点蓄力球
    const { chargeDur } = laserPhaseTimings();
    const progress = chargeDur > 0 ? clamp(player.laserPhaseT / chargeDur, 0, 1) : 0;
    const eased = progress * progress;
    // 外层柔光
    ctx.strokeStyle = `rgba(140, 210, 255, ${0.06 + 0.16 * eased})`;
    ctx.lineWidth = 6 + 6 * eased;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    // 中层光晕
    ctx.strokeStyle = `rgba(180, 230, 255, ${0.12 + 0.22 * eased})`;
    ctx.lineWidth = 3 + 2.5 * eased;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    // 起点蓄力球 (随进度变大变亮, 接近满时轻微脉动)
    const pulse = progress > 0.85 ? 1 + 0.15 * Math.sin(game.time * 28) : 1;
    const orbR = (4 + 8 * eased) * pulse;
    ctx.fillStyle = `rgba(140, 210, 255, ${0.3 * progress + 0.1})`;
    ctx.beginPath(); ctx.arc(path[0].x, path[0].y, orbR, 0, TAU); ctx.fill();
    ctx.fillStyle = `rgba(200, 240, 255, ${0.55 * progress + 0.25})`;
    ctx.beginPath(); ctx.arc(path[0].x, path[0].y, orbR * 0.55, 0, TAU); ctx.fill();
    ctx.fillStyle = `rgba(255, 255, 255, ${0.6 * progress + 0.3})`;
    ctx.beginPath(); ctx.arc(path[0].x, path[0].y, Math.max(0.6, orbR * 0.22), 0, TAU); ctx.fill();
  }
  ctx.restore();
}

// ============== 绝对领域 ==============
const FIELD_TICK_INTERVAL = 0.5;
function updateAbsoluteField(dt) {
  player.fieldTickT += dt;
  if (player.fieldTickT < FIELD_TICK_INTERVAL) return;
  player.fieldTickT -= FIELD_TICK_INTERVAL;
  const R = player.baseMagnetRange;
  const R2 = R * R;
  for (const e of enemies) {
    if (e.dead || e.warningT > 0) continue;
    if (e.invuln === true || e.invuln > 0) continue;
    const dx = e.x - player.x, dy = e.y - player.y;
    if (dx * dx + dy * dy >= R2) continue;
    // 领域伤害不暴击 (固定 = atk, critCount=0)
    hitEnemy(e, {
      x: e.x, y: e.y - 6,
      dmg: player.atk, crit: false, critCount: 0,
      from: 'player', source: 'field',
    });
    if (player.burnStacks > 0) applyBurn(e, player.burnStacks);
  }
}

function drawAbsoluteField() {
  if (!player.absoluteField) return;
  const R = player.baseMagnetRange;
  // 充能进度 (用作脉动透明度), 接近脉冲触发时高亮
  const phase = clamp(player.fieldTickT / FIELD_TICK_INTERVAL, 0, 1);
  ctx.save();
  ctx.fillStyle = `rgba(160, 120, 255, ${0.06 + phase * 0.05})`;
  ctx.beginPath(); ctx.arc(player.x, player.y, R, 0, TAU); ctx.fill();
  ctx.strokeStyle = `rgba(180, 140, 255, ${0.35 + phase * 0.4})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(player.x, player.y, R, 0, TAU); ctx.stroke();
  // 内圈细线 (随充能扩张)
  ctx.strokeStyle = `rgba(220, 200, 255, ${0.25 * phase})`;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(player.x, player.y, R * (0.55 + 0.45 * phase), 0, TAU); ctx.stroke();
  ctx.restore();
}

// ============== 寻的导弹 ==============
// 发射间隔 = 9 / fireRate, 即默认攻速 3 时为 3 秒, 攻速越高发射越频繁
const MISSILE_INTERVAL_BASE = 9.0;
function missileInterval() { return MISSILE_INTERVAL_BASE / Math.max(0.5, player.fireRate); }
const MISSILE_INIT_SPEED = 220;
const MISSILE_ACCEL = 900;       // 沿当前朝向加速 (推进)
const MISSILE_MAX_SPEED = 520;   // 速度上限, 越低越易跟上目标
const MISSILE_TURN_RATE = 8.0;   // 角速度上限 (rad/s, ≈ 458°/s) — 即时转向, 不绕圈
const MISSILE_DIRECT_MUL = 5.0;
const MISSILE_AOE_MUL = 3.0;
const MISSILE_AOE_R = 90;     // 固定爆炸半径 (= 玩家初始拾取金币范围)

// 爆炸范围闪光: 一瞬间显示完整爆炸半径再淡出, 给玩家清晰的范围反馈
const missileFlashes = [];
function spawnMissileFlash(x, y, r) {
  missileFlashes.push({ x, y, r, t: 0, life: 0.4 });
}
function updateMissileFlashes(dt) {
  for (let i = missileFlashes.length - 1; i >= 0; i--) {
    missileFlashes[i].t += dt;
    if (missileFlashes[i].t >= missileFlashes[i].life) missileFlashes.splice(i, 1);
  }
}
function drawMissileFlashes() {
  for (const f of missileFlashes) {
    const k = f.t / f.life;       // 0 → 1
    const a = 1 - k;              // 透明度淡出
    ctx.save();
    ctx.fillStyle = `rgba(255, 255, 255, ${0.32 * a})`;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, TAU); ctx.fill();
    ctx.restore();
  }
}

function findMissileTarget(exclude = null, exactHp = null) {
  let best = null;
  let bestHp = -1;
  let bestDist = Infinity;
  for (const e of enemies) {
    if (e === exclude) continue;
    if (e.dead || e.warningT > 0) continue;
    if (e.invuln === true || e.invuln > 0) continue;
    const dx = e.x - player.x, dy = e.y - player.y;
    const d2 = dx * dx + dy * dy;
    const hp = e.maxHp ?? e.hp ?? 0;
    if (exactHp !== null && hp !== exactHp) continue;
    if (hp > bestHp || (hp === bestHp && d2 < bestDist)) {
      best = e;
      bestHp = hp;
      bestDist = d2;
    }
  }
  return best;
}

function spawnMissile() {
  const targetL = findMissileTarget();
  const targetR = targetL ? (findMissileTarget(targetL, targetL.maxHp ?? targetL.hp ?? 0) || targetL) : null;
  const offset = 14;
  // 左侧弹
  const al = -Math.PI / 2 - rand(0.05, 0.25);
  bullets.push({
    x: player.x - offset, y: player.y - 6,
    vx: Math.cos(al) * MISSILE_INIT_SPEED,
    vy: Math.sin(al) * MISSILE_INIT_SPEED,
    r: 5, from: 'player', type: 'missile',
    target: targetL, age: 0, pierce: 0, hit: null, dmg: 0,
  });
  // 右侧弹
  const ar = -Math.PI / 2 + rand(0.05, 0.25);
  bullets.push({
    x: player.x + offset, y: player.y - 6,
    vx: Math.cos(ar) * MISSILE_INIT_SPEED,
    vy: Math.sin(ar) * MISSILE_INIT_SPEED,
    r: 5, from: 'player', type: 'missile',
    target: targetR, age: 0, pierce: 0, hit: null, dmg: 0,
  });
}

function missileImpact(b, direct) {
  // 直接命中: 不暴击. 小怪按最大生命 20%, Boss 按最大生命 1%.
  if (direct && !direct.dead && direct.invuln !== true && !(direct.invuln > 0) && !(direct.warningT > 0)) {
    const dmg = direct.maxHp * (direct.boss ? 0.01 : 0.20);
    hitEnemy(direct, {
      x: direct.x, y: direct.y - 6,
      dmg, crit: false, critCount: 0,
      from: 'player', source: 'missile',
    });
  }
  // 范围伤害: 不暴击, 直接命中目标不重复结算
  const R2 = MISSILE_AOE_R * MISSILE_AOE_R;
  const aoeDmg = player.atk * MISSILE_AOE_MUL;
  spawnMissileFlash(b.x, b.y, MISSILE_AOE_R);
  for (const e of enemies) {
    if (e.dead || e.warningT > 0) continue;
    if (e.invuln === true || e.invuln > 0) continue;
    const dx = e.x - b.x, dy = e.y - b.y;
    if (dx * dx + dy * dy >= R2) continue;
    hitEnemy(e, {
      x: e.x, y: e.y - 6,
      dmg: aoeDmg, crit: false, critCount: 0,
      from: 'player', source: 'missile',
    });
    if (player.burnStacks > 0) applyBurn(e, player.burnStacks);
  }
  // 爆炸清弹: 仅在拥有 parry 时触发 (与飞弹可被 parry 联动构成统一规则)
  if (player.bulletParry) {
    for (const eb of bullets) {
      if (eb.from !== 'enemy' || eb.dead) continue;
      const dx = eb.x - b.x, dy = eb.y - b.y;
      if (dx * dx + dy * dy < R2) {
        eb.dead = true;
        addHitParticles(eb.x, eb.y);
      }
    }
  }
  addExplosion(b.x, b.y, '#ff8050', 22);
  game.shake = Math.max(game.shake, 0.18);
}

function spawnEnemyBullet(x, y, a, sp, dmg) {
  bullets.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, r: 5, dmg, from:'enemy' });
}

function updateBullet(b, dt) {
  // 时空断裂: 敌方子弹完全停摆, 玩家子弹 / 导弹照常
  if (game.freezeT > 0 && b.from === 'enemy') return;
  // 绝对领域: 子弹位于领域内时 dt 减半 (位移 / 转向 / 加速度同步降速)
  if (player.absoluteField) {
    const dx = b.x - player.x, dy = b.y - player.y;
    if (dx * dx + dy * dy < player.baseMagnetRange * player.baseMagnetRange) dt *= 0.5;
  }
  // 寻的导弹: 强追踪 (加速度 + 速度上限), 不走通用 homing 分支
  if (b.type === 'missile') {
    b.age = (b.age || 0) + dt;
    if (!b.target || b.target.dead || b.target.warningT > 0 ||
        b.target.invuln === true || b.target.invuln > 0) {
      b.target = findMissileTarget();
    }
    if (b.target) {
      // 转向: 当前飞行方向以最大角速度逼近目标方位 (避免径向加速度造成的绕圈 / 过冲)
      const ta = Math.atan2(b.target.y - b.y, b.target.x - b.x);
      const ca = Math.atan2(b.vy, b.vx);
      let diff = ta - ca;
      while (diff > Math.PI) diff -= TAU;
      while (diff < -Math.PI) diff += TAU;
      const maxTurn = MISSILE_TURN_RATE * dt;
      const na = ca + clamp(diff, -maxTurn, maxTurn);
      // 推进: 沿新朝向加速到上限
      const curSp = Math.hypot(b.vx, b.vy);
      const newSp = Math.min(MISSILE_MAX_SPEED, curSp + MISSILE_ACCEL * dt);
      b.vx = Math.cos(na) * newSp;
      b.vy = Math.sin(na) * newSp;
    } else {
      // 无目标 → 仅沿当前朝向加速 (惯性飞行)
      const curSp = Math.hypot(b.vx, b.vy);
      if (curSp > 0 && curSp < MISSILE_MAX_SPEED) {
        const newSp = Math.min(MISSILE_MAX_SPEED, curSp + MISSILE_ACCEL * dt);
        const k = newSp / curSp;
        b.vx *= k; b.vy *= k;
      }
    }
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -50 || b.x > W + 50 || b.y < -50 || b.y > H + 50) b.dead = true;
    return;
  }
  if (b.from === 'player' && b.homing > 0) {
    b.retargetT = (b.retargetT || 0) - dt;
    const targetInvalid = !b.target || b.target.dead || b.target.warningT > 0 ||
      b.target.invuln === true || b.target.invuln > 0 || (b.hit && b.hit.has(b.target));
    if (targetInvalid || b.retargetT <= 0) {
      b.retargetT = 0.12;
      let best = null, bd = 260 + Math.min(180, Math.max(0, player.bulletSpeed - 500) * 0.35);
      for (const e of enemies) {
        if (e.dead || e.warningT > 0) continue;
        if (e.invuln === true || e.invuln > 0) continue;
        if (b.hit && b.hit.has(e)) continue;
        const d = dist(b, e);
        if (d < bd) { bd = d; best = e; }
      }
      b.target = best;
    }
    if (b.target) {
      const ta = Math.atan2(b.target.y - b.y, b.target.x - b.x);
      const ca = Math.atan2(b.vy, b.vx);
      let diff = ta - ca;
      while (diff > Math.PI) diff -= TAU;
      while (diff < -Math.PI) diff += TAU;
      const speedAimMul = clamp(Math.hypot(b.vx, b.vy) / 500, 0.8, 1.6);
      const turn = b.homing * 2.05 * speedAimMul * dt;
      const na = ca + clamp(diff, -turn, turn);
      const sp = Math.hypot(b.vx, b.vy);
      b.vx = Math.cos(na) * sp;
      b.vy = Math.sin(na) * sp;
    }
  }
  // 色欲: 玩家半径 R 内的敌弹受到指向玩家的恒定加速度
  // 用恒定值而非 1/d² 避免远处无效 / 近处发散的两极分化
  if (b.from === 'enemy' && game.activeCurses.has('lust')) {
    const dx = player.x - b.x, dy = player.y - b.y;
    const d = Math.hypot(dx, dy);
    const R = 90;
    if (d > 0 && d < R) {
      const acc = 280;
      b.vx += (dx / d) * acc * dt;
      b.vy += (dy / d) * acc * dt;
    }
  }
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  if (b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) b.dead = true;
}

function hitEnemy(e, b) {
  // boss 入场布尔 true / 镜像受击数字 / interceptor·spiker 警示期间都免疫
  if (e.invuln === true || e.invuln > 0 || e.warningT > 0) {
    addHitParticles(b.x, b.y);
    floats.push({ x: b.x, y: b.y - 5, t: 0.4, life: 0.4, txt: '免疫', color: '#fc4', size: 11 });
    return;
  }
  // 镜像分身: 优先扣盾后扣血; 不再因受伤立刻恢复护盾
  if (e.type === 'mirror') {
    if (e.shield > 0) {
      e.shield -= 1;
      floats.push({ x: b.x, y: b.y - 5, t: 0.5, life: 0.5, txt: '-1 盾', color: '#7df', size: 12 });
    } else {
      e.hp -= 1;
      floats.push({ x: b.x, y: b.y - 5, t: 0.5, life: 0.5, txt: '-1', color: '#f44', size: 13 });
    }
    addHitParticles(b.x, b.y);
    e.invuln = e.invulnT;
    e.shieldDelay = e.shieldRegenDelayBase;
    e.shieldRegenT = 0;
    if (e.hp <= 0 && !e.dead) {
      e.dead = true; e.killed = true;
      addExplosion(e.x, e.y, e.color, 28);
      game.shake = Math.max(game.shake, 0.18);
    }
    return;
  }
  const before = e.hp;
  e.hp -= b.dmg;
  // 实际造成的伤害 (受 maxHp / 当前 hp 钳制), 按来源累计到统计页
  const actual = Math.max(0, before - Math.max(0, e.hp));
  if (actual > 0) {
    const src = b.source || 'bullet';
    if (game.stats.damage[src] !== undefined) game.stats.damage[src] += actual;
  }
  addHitParticles(b.x, b.y);
  const cc = b.critCount || 0;
  const dmgTxt = Math.ceil(b.dmg) + (cc >= 2 ? '!!' : cc >= 1 ? '!' : '');
  // 燃烧 (b.fire) 用橙色, 与深度暴击 (cc>=2 红色) 区分
  const dmgColor = b.fire ? '#ff7030' : (cc >= 2 ? '#ff4d5e' : cc >= 1 ? '#ffe34a' : '#fff');
  const dmgSize = cc >= 2 ? 18 : cc >= 1 ? 16 : 12;
  floats.push({ x: b.x, y: b.y - 5, t: 0.55, life: 0.55, txt: dmgTxt, color: dmgColor, size: dmgSize });
  // Boss 金币: 一半随血量逐个掉落 (剩下一半在死亡时掉)
  if (e.boss) {
    if (e.coinDropped === undefined) e.coinDropped = 0;
    const halfCoin = Math.floor(e.coin / 2);
    const ratio = Math.max(0, e.hp) / e.maxHp;
    const shouldDrop = Math.floor((1 - ratio) * halfCoin);
    while (e.coinDropped < shouldDrop) {
      spawnCoins(e.x, e.y, 1);
      e.coinDropped++;
    }
  }
  if (e.hp <= 0 && !e.dead) {
    // boss 二阶段触发: 第 5 次出场起, 第一次打到 0 血不死, 进入过渡 (回中心 + 血条恢复满 + 体型缩小)
    if (e.boss && game.bossEncounter >= 5 && !e.phase2Triggered) {
      e.phase2Triggered = true;
      e.phase2Triggering = true;
      e.phase2Timer = 0;
      e.invuln = true;
      e.hp = 0;
      e.burn = 0; e.burnTickT = 0;  // 二阶段清空燃烧层数
      addExplosion(e.x, e.y, '#ffaa66', 25);
      game.shake = Math.max(game.shake, 0.4);
      return;
    }
    if ((b.critCount || 0) > 0) e.killedByCrit = true;
    e.dead = true; e.killed = true;
    addExplosion(e.x, e.y, e.color, e.boss ? 50 : 14);
    game.shake = e.boss ? 0.7 : Math.max(game.shake, 0.06);
    if (e.boss) {
      // boss 死亡: 场上所有其他敌人立即消失 (不分裂, 不掉金, 不计经验)
      for (const o of enemies) {
        if (o !== e && !o.dead) {
          o.dead = true;
          o.killed = false;
          addExplosion(o.x, o.y, o.color, 6);
        }
      }
    }
  }
}

// 玩家碰撞敌机: 有盾全部击破; 无盾则扣 1 格生命 (愤怒诅咒下扣 2)。闪避对碰撞无效。
function collideKill() {
  if (player.invuln > 0) return;
  if (player.shield > 0) {
    player.shield = 0;
    player.shieldDelay = player.shieldRegenDelayBase * 1.5;
    player.shieldRegenT = 0;
    let inv = game.activeCurses.has('pride') ? 0 : 0.8;
    game.shake = 0.45;
    floats.push({ x: player.x, y: player.y, t: 0.75, life: 0.75, txt: '撞击破盾！', color: '#7df', size: 14 });
    // 排斥力场: 盾被击破也算受到伤害, 触发后无敌延长到 1.0
    if (player.shockwaveOnHit) {
      spawnShockwave(player.x, player.y, 220);
      if (!game.activeCurses.has('pride')) inv = Math.max(inv, 1.0);
    }
    player.invuln = inv;
  } else {
    // 虚无形态救援: 优先于殉爆 (无盾撞机本应死, 这里硬保下来)
    if (tryVoidSave()) {
      player.shieldDelay = player.shieldRegenDelayBase;
      player.shieldRegenT = 0;
      if (player.shockwaveOnHit) spawnShockwave(player.x, player.y, 220);
      return;
    }
    // 死神飞弹殉爆: 无盾被撞 → 飞弹在玩家身上引爆, 直接死亡
    if (!game.easyMode && player.missileLauncher) {
      spawnMissileFlash(player.x, player.y, MISSILE_AOE_R);
      addExplosion(player.x, player.y, '#ff8050', 40);
      addExplosion(player.x, player.y, '#fff0c0', 18);
      game.shake = 0.85;
      floats.push({ x: player.x, y: player.y - 14, t: 1.0, life: 1.0, txt: '殉爆!', color:'#ff5040', size: 18 });
      // 链式殉爆: 玩家周围 3 个随机点错时引爆 (纯视觉)
      const px = player.x, py = player.y;
      for (let i = 0; i < 3; i++) {
        const ang = Math.random() * TAU;
        const off = 35 + Math.random() * 55;
        const fx = px + Math.cos(ang) * off;
        const fy = py + Math.sin(ang) * off;
        const delay = 0.08 + Math.random() * 0.32;
        scheduleFx(delay, () => {
          spawnMissileFlash(fx, fy, MISSILE_AOE_R);
          addExplosion(fx, fy, '#ff8050', 26);
          addExplosion(fx, fy, '#fff0c0', 12);
          game.shake = Math.max(game.shake, 0.5);
        });
      }
      player.hp = 0;
      onGameOver();
      return;
    }
    const dmg = game.activeCurses.has('wrath') ? 2 : 1;
    player.hp -= dmg;
    if (player.devilContract) refreshDevilContract();
    player.shieldDelay = player.shieldRegenDelayBase;
    player.shieldRegenT = 0;
    let inv = game.activeCurses.has('pride') ? 0 : 0.8;
    game.shake = 0.5;
    floats.push({ x: player.x, y: player.y, t: 0.7, life: 0.7, txt: '-' + dmg, color: '#f44', size: 16 });
    // 排斥力场: 受击触发, 触发后无敌延长到 1.0
    if (player.shockwaveOnHit && player.hp > 0) {
      spawnShockwave(player.x, player.y, 220);
      if (!game.activeCurses.has('pride')) inv = Math.max(inv, 1.0);
    }
    player.invuln = inv;
    if (player.hp <= 0) { player.hp = 0; onGameOver(); }
  }
}

// Boss 碰撞: 同样清盾/无盾即死, 但 boss 不被消除, 玩家被击退离开 boss
function collideKillBoss(b) {
  if (player.invuln > 0) return;
  // 击退方向 = 从 boss 指向玩家
  const dx = player.x - b.x, dy = player.y - b.y;
  const d = Math.hypot(dx, dy) || 1;
  player.knockVx = (dx / d) * 750;
  player.knockVy = (dy / d) * 750;
  player.knockT = 0.4;
  collideKill();
}

// 火焰附加: 给敌人叠加 n 层燃烧 (默认无衰减, 每 0.5 秒每层 1 dmg)
// 镜像分身免疫. 原初火焰: 燃烧 tick 额外造成最大生命百分比伤害, 但触发频率减半
// 燃烧基础节拍, 实际节拍 = BURN_TICK / sqrt(stacks) — 层数越多触发越快
const BURN_TICK = 0.5;
function applyBurn(e, n) {
  if (!e || e.dead || e.type === 'mirror') return;
  // 免疫状态 (boss 入场 / 二阶段过场 / 拦截机警示) 不能被附加燃烧
  if (e.invuln === true || e.invuln > 0 || e.warningT > 0) return;
  // 恶魔契约: 1 HP 且无盾时燃烧附加最终修正 +5
  if (player.devilContract && player.hp === 1 && player.shield === 0) n += 5;
  e.burn = (e.burn || 0) + n;
  if (e.burnTickT === undefined) e.burnTickT = 0;
}
// 每帧给所有有燃烧层数的敌人累加计时, 满 interval 秒结算一次伤害 = 层数.
// interval = BURN_TICK / sqrt(stacks). 层数越多触发越频繁.
function tickBurns(dt) {
  for (const e of enemies) {
    if (!e.burn || e.dead) continue;
    e.burnTickT += dt;
    const interval = (BURN_TICK / Math.sqrt(Math.max(1, e.burn))) * (player.primalFire ? 2 : 1);
    while (e.burnTickT >= interval) {
      e.burnTickT -= interval;
      if (e.invuln === true || e.invuln > 0 || e.warningT > 0) continue;
      const primalBonus = player.primalFire
        ? e.maxHp * (e.boss ? 0.001 : 0.05)
        : 0;
      hitEnemy(e, {
        x: e.x, y: e.y - 6,
        dmg: e.burn + primalBonus, crit: false, critCount: 0,
        from: 'player', fire: true, source: 'burn',
      });
    }
  }
}

// 统一回血入口: 受 maxHp 上限钳制. 返回实际治疗量.
// 触发恶魔契约状态变化时主动刷新 (1 HP 进出 → atk / fireRate / 弹道修正变动)
function onHealthRegen(amount) {
  if (amount <= 0) return 0;
  const before = player.hp;
  player.hp = Math.min(player.maxHp, player.hp + amount);
  const healed = player.hp - before;
  if (player.devilContract && healed > 0) refreshDevilContract();
  return healed;
}

// 恶魔契约: 当 hp=1 且 shield=0 时进入"觉醒态" → +2 弹道 (cyclops 时转 1.4² 攻击倍率).
// 状态切换时显式 +/- 弹道, 退出时还原, 避免漂移. recompute() 内的 atk / fireRate / burn 修正按状态实时读取.
function refreshDevilContract() {
  if (!player.devilContract) return;
  const should = player.hp === 1 && player.shield === 0;
  if (should && !player.devilContractActive) {
    player.devilContractActive = true;
    if (player.cyclops) player.cyclopsAtkMul *= 1.4 * 1.4;
    else player.projectiles += 2;
    floats.push({ x: player.x, y: player.y - 30, t: 1.2, life: 1.2, txt: '契约成立!', color: '#ff3050', size: 18 });
    player.invuln = Math.max(player.invuln, 1.0);
    game.shake = Math.max(game.shake, 0.3);
    recompute();
  } else if (!should && player.devilContractActive) {
    player.devilContractActive = false;
    if (player.cyclops) player.cyclopsAtkMul /= 1.4 * 1.4;
    else player.projectiles -= 2;
    recompute();
  }
}

// 时空断裂: 闪避触发时取消盾恢复延迟, 并冻结所有敌人 / 敌方子弹 0.5 秒
function triggerTimeRift() {
  player.shieldDelay = 0;
  game.freezeT = Math.max(game.freezeT, 0.5);
  floats.push({ x: player.x, y: player.y - 28, t: 0.7, life: 0.7, txt: '时空断裂', color: '#b8e0ff', size: 13 });
}

// 虚无形态救援: 即将失去生命值时触发, 5 秒无敌 + 30 秒冷却. 返回是否触发成功
function tryVoidSave() {
  if (!player.voidForm) return false;
  if (player.voidActiveT > 0 || player.voidCooldownT > 0) return false;
  player.voidActiveT = 5;
  player.invuln = Math.max(player.invuln, 5);
  floats.push({ x: player.x, y: player.y - 16, t: 1.0, life: 1.0, txt: '虚无！', color: '#c8a8ff', size: 18 });
  game.shake = Math.max(game.shake, 0.32);
  return true;
}

// 所有敌人攻击 = 1 格. 优先扣盾, 否则扣血. 闪避概率完全免伤。
function damagePlayer() {
  if (player.invuln > 0) return;
  if (player.evade > 0 && Math.random() < player.evade) {
    // 闪避: 给 0.5 秒无敌 (不受傲慢影响)
    player.invuln = Math.max(player.invuln, 0.5);
    floats.push({ x: player.x, y: player.y - 10, t: 0.7, life: 0.7, txt: '闪避!', color: '#7df', size: 15 });
    // 时空断裂: 触发闪避 → 取消盾恢复延迟 + 暂停敌人 / 敌弹 0.5 秒
    if (player.timeRift) triggerTimeRift();
    return;
  }
  // 愤怒: 受伤翻倍 (本波生效)
  const dmg = game.activeCurses.has('wrath') ? 2 : 1;
  let remaining = dmg;
  if (player.shield > 0) {
    const absorb = Math.min(player.shield, remaining);
    player.shield -= absorb;
    remaining -= absorb;
    floats.push({ x: player.x, y: player.y, t: 0.55, life: 0.55, txt: '-' + absorb + ' 盾', color: '#7df', size: 13 });
  }
  // 仍有溢出 → 即将扣生命: 先尝试虚无形态救援
  if (remaining > 0 && !tryVoidSave()) {
    player.hp -= remaining;
    if (player.devilContract) refreshDevilContract();
    floats.push({ x: player.x, y: player.y - 12, t: 0.55, life: 0.55, txt: '-' + remaining, color: '#f44', size: 14 });
  }
  player.shieldDelay = player.shieldRegenDelayBase;
  player.shieldRegenT = 0;
  // 排斥力场: 受到伤害即触发冲击波, 并把受击无敌延长到 1.0 秒
  let baseInv = game.activeCurses.has('pride') ? 0 : 0.8;
  if (player.shockwaveOnHit && player.hp > 0) {
    spawnShockwave(player.x, player.y, 220);
    if (!game.activeCurses.has('pride')) baseInv = Math.max(baseInv, 1.0);
  }
  // 若虚无已设 5s 不会被覆盖
  player.invuln = Math.max(player.invuln, baseInv);
  game.shake = 0.28;
  if (player.hp <= 0) { player.hp = 0; onGameOver(); }
}

function openLevelup() {
  game.state = 'levelup';
  const pool = LEVEL_OPTIONS.slice();
  const picks = [];
  const n = pickCount();
  for (let i = 0; i < n && pool.length; i++) {
    picks.push(pool.splice(Math.floor(Math.random()*pool.length), 1)[0]);
  }
  overlay.className = 'overlay show';
  overlay.innerHTML = `
    <div class="title">⚡ 等级 ${game.level} → ${game.level + 1}</div>
    <div class="subtitle">${pickWord()} · 升级提升基础属性</div>
    <div class="cards one-row" id="cards" style="--cols:${picks.length}"></div>`;
  const wrap = document.getElementById('cards');
  picks.forEach(p => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<div class="ico">${p.icon}</div><div class="nm">${p.n}</div><div class="ds">${p.desc()}</div>`;
    el.onclick = () => {
      p.apply();
      game.level++;
      game.killCount = 0;
      game.killForLevel = expNeeded(game.level);
      overlay.className = 'overlay';
      overlay.innerHTML = '';
      game.state = 'playing';
      // 升级反应缓冲: 1s 无敌 + 玩家位置冲击波清近距离威胁
      player.invuln = Math.max(player.invuln, 1.0);
      spawnShockwave(player.x, player.y, 280);
      game.shake = Math.max(game.shake, 0.18);
    };
    wrap.appendChild(el);
  });
}

    <div class="cards" id="curseChoices"></div>`;
  const wrap = document.getElementById('curseChoices');
  remaining.forEach(c => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<div class="ico" style="color:#ff7777; font-size:clamp(20px,5vmin,28px); margin-bottom:6px">☠</div><div class="nm" style="color:#ff9090">${c.n}</div><div class="ds"><div class="b">${c.desc}</div></div>`;
    el.onclick = () => {
      player.bannedCurses.add(c.id);
      // 牌堆中已存在的同 id 一并清除
      game.curseDeck = game.curseDeck.filter(id => id !== c.id);
      // 当前波次已激活的同 id 立即失效
      if (game.activeCurses.has(c.id)) {
        game.activeCurses.delete(c.id);
        recompute();
      }
      renderShop();
    };
    wrap.appendChild(el);
  });
}

function pickNormalShopItems(excludeItems) {
  const excludeSet = new Set(excludeItems || []);
  const avail = SHOP_ITEMS.filter(it => !excludeSet.has(it) && (!it.can || it.can(player)));
  const pool = avail.slice();
  const picks = [];
  const target = pickCount();
  while (picks.length < target && pool.length) {
    picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  // 池子不够时, 用未排除的备选填补
  if (picks.length < target) {
    const fallback = SHOP_ITEMS.filter(it => (!it.can || it.can(player)));
    while (picks.length < target && fallback.length) {
      picks.push(fallback.splice(Math.floor(Math.random() * fallback.length), 1)[0]);
    }
  }
  return picks;
}

function fillNormalShopPicks() {
  const target = pickCount();
  if (game.shopNormalPicks.length >= target) return;
  const currentItems = game.shopNormalPicks.filter(p => p);
  const extra = pickNormalShopItems(currentItems);
  for (const it of extra) {
    if (game.shopNormalPicks.length >= target) break;
    if (it && !currentItems.includes(it)) {
      game.shopNormalPicks.push(it);
      currentItems.push(it);
    }
  }
}

function openShop(isBossClear) {
  game.state = 'shop';
  game.shopIsBoss = isBossClear;
  game.shopRefreshCost = 10;
  game.shopNormalPicks = pickNormalShopItems();
  // 进入商店时充满护盾, 让玩家以满状态开始下一波
  player.shield = Math.max(0, player.maxShield);
  player.shieldDelay = 0;
  player.shieldRegenT = 0;
  renderShop();
}

function renderShop() {
  const isBossClear = game.shopIsBoss;
  const priceMul = getShopPriceMul();
  fillNormalShopPicks();
  overlay.className = 'overlay show';
  // 独特槽位: 玩家 uniqueSlots 长度 0-3, 不足补空槽
  const slots = player.uniqueSlots.slice();
  while (slots.length < pickCount()) slots.push(null);
  // 普通商店时, 若下一波是 boss (game.wave 已自增到 wavesPerRound) → 黄字预警
  const bossNext = !isBossClear && game.wave === game.wavesPerRound;

  overlay.innerHTML = `
    <div class="title">${isBossClear ? '★ BOSS 已被击败' : '🛒 商店'}</div>
    <div class="subtitle">${isBossClear ? '准备进入第 ' + game.round + ' 轮' : '购买道具或直接开始下一波'}${game.endless && priceMul > 1 ? ' · 无尽价格 ×' + priceMul.toFixed(2) : ''}</div>
    ${bossNext ? '<div style="color:#ffd06a; font-weight:bold; text-align:center; margin: 4px 0 8px; font-size: clamp(11px, 2.4vmin, 13px); text-shadow: 0 0 8px rgba(255,200,80,0.6);">⚠ BOSS 即将来袭 ⚠</div>' : ''}
    <div id="ovCoin">金币：${player.coin}</div>
    <div class="section-label">神 器</div>
    <div class="cards one-row" id="uniqueSlotsRow" style="--cols:${pickCount()}"></div>
    <div class="section-label" style="color:#a4dfff">商 品</div>
    <div class="cards one-row" id="normalCards" style="--cols:${pickCount()}"></div>
    <div class="shop-actions">
      <button id="repairBtn">战斗维修（20 金，+1 生命）</button>
      <button id="refreshBtn">刷新（${game.shopRefreshCost} 金）</button>
    </div>
    <button id="ovClose">${isBossClear ? '开始下一轮' : '开始下一波'}</button>`;

  const uw = document.getElementById('uniqueSlotsRow');
  slots.forEach((it, i) => uw.appendChild(makeUniqueSlotCard(it, i)));

  const nw = document.getElementById('normalCards');
  game.shopNormalPicks.slice(0, pickCount()).forEach((p, i) => nw.appendChild(makeNormalCard(p, i)));

  // 战斗维修
  const repairBtn = document.getElementById('repairBtn');
  const canRepair = player.coin >= 20 && player.hp < player.maxHp;
  if (!canRepair) repairBtn.disabled = true;
  repairBtn.onclick = () => {
    if (player.coin < 20 || player.hp >= player.maxHp) return;
    player.coin -= 20;
    onHealthRegen(1);
    renderShop();
  };

  // 刷新
  const refreshBtn = document.getElementById('refreshBtn');
  if (player.coin < game.shopRefreshCost) refreshBtn.disabled = true;
  refreshBtn.onclick = () => {
    if (player.coin < game.shopRefreshCost) return;
    player.coin -= game.shopRefreshCost;
    game.shopRefreshCost += 10;
    // 排除当前还在槽位的商品, 避免刷新出相同道具
    const currentItems = game.shopNormalPicks.filter(p => p);
    game.shopNormalPicks = pickNormalShopItems(currentItems);
    renderShop();
  };

  document.getElementById('ovClose').onclick = () => {
    overlay.className = 'overlay';
    overlay.innerHTML = '';
    game.state = 'playing';
    startWave();
  };
}

function getShopPriceMul() {
  if (!game.endless) return 1;
  return Math.pow(1.3, Math.max(0, game.round - 10));
}

function shopCost(baseCost) {
  return Math.ceil(baseCost * getShopPriceMul());
}

function makeNormalCard(p, idx) {
  const el = document.createElement('div');
  if (!p) {
    el.className = 'card sold';
    el.innerHTML = `<div class="ico">·</div><div class="nm">已售出</div><div class="ds"></div><div class="pr"></div>`;
    return el;
  }
  const cost = shopCost(p.cost);
  const canBuy = player.coin >= cost
    && (!p.can || p.can(player))
    && (!p.buyCheck || p.buyCheck(player));
  el.className = 'card' + (canBuy ? '' : ' disabled');
  const goodHtml = (p.good || []).map(g => `<div class="g">${g}</div>`).join('');
  const badHtml = (p.bad || []).map(b => `<div class="b">${b}</div>`).join('');
  el.innerHTML = `<div class="ico">${p.ico}</div><div class="nm">${p.n}</div><div class="ds">${goodHtml}${badHtml}</div><div class="pr">${cost} 金</div>`;
  el.onclick = () => {
    if (!canBuy) return;
    const prev = { hp: player.hp, shield: player.shield };
    player.coin -= cost;
    p.apply(player);
    normalizeEasyModeAfterPurchase(prev);
    game.stats.shopBought[p.n] = (game.stats.shopBought[p.n] || 0) + 1;
    game.shopNormalPicks[idx] = null;
    renderShop();
  };
  return el;
}

function makeUniqueSlotCard(it, slotIdx) {
  const el = document.createElement('div');
  if (!it) {
    el.className = 'card unique sold';
    el.innerHTML = `<div class="ico">·</div><div class="nm">[ 空 槽 ]</div><div class="ds"></div><div class="pr"></div>`;
    return el;
  }
  const cost = shopCost(it.cost);
  const canBuy = player.coin >= cost
    && (!it.can || it.can(player))
    && (!it.buyCheck || it.buyCheck(player));
  el.className = 'card unique' + (canBuy ? '' : ' disabled');
  const goodHtml = (it.good || []).map(g => `<div class="g">${g}</div>`).join('');
  const badHtml = (it.bad || []).map(b => `<div class="b">${b}</div>`).join('');
  el.innerHTML = `<div class="ico">${it.ico}</div><div class="nm">${it.n}</div><div class="ds">${goodHtml}${badHtml}</div><div class="pr">${cost} 金</div>`;
  el.onclick = () => {
    if (!canBuy) return;
    const prev = { hp: player.hp, shield: player.shield };
    player.coin -= cost;
    it.apply(player);
    normalizeEasyModeAfterPurchase(prev);
    if (it.id) player.uniqueOwned[it.id] = true;
    game.stats.uniquesBought.push({ n: it.n, ico: it.ico });
    // 从 uniqueSlots 移除
    const i = player.uniqueSlots.indexOf(it);
    if (i >= 0) player.uniqueSlots.splice(i, 1);
    renderShop();
  };
  return el;
}

// 拍快照: 保存本波正式开始时的玩家状态 + 关键 game 字段, 用于失败时重试
function snapshotWave() {
  game.waveSnapshot = {
    round: game.round, wave: game.wave,
    hp: player.hp, shield: player.shield, coin: player.coin,
    critRate: player.critRate, critDmg: player.critDmg,
    killHealCounter: player.killHealCounter,
    bonus: { ...bonus },
    killCount: game.killCount,
    killForLevel: game.killForLevel,
    level: game.level,
    activeCurses: [...game.activeCurses],
    mirrorsSpawned: false,
    bossEncounter: game.bossEncounter,
    endless: game.endless,
    spawnQueue: game.spawnQueue.map(s => ({ ...s })),
    spawnTimer: game.spawnTimer,
    curseDeck: game.curseDeck.slice(),
  };
}

function retryWave() {
  if (!game.waveSnapshot) return;
  const s = game.waveSnapshot;
  // 恢复玩家状态
  player.hp = s.hp;
  player.shield = s.shield;
  player.coin = s.coin;
  player.critRate = s.critRate;
  player.critDmg = s.critDmg;
  player.killHealCounter = s.killHealCounter;
  Object.assign(bonus, s.bonus);
  // 恢复 game 字段
  game.round = s.round;
  game.wave = s.wave;
  game.killCount = s.killCount;
  game.killForLevel = s.killForLevel;
  game.level = s.level;
  game.activeCurses = new Set(s.activeCurses || []);
  game.mirrorsSpawned = s.mirrorsSpawned;
  game.bossEncounter = s.bossEncounter;
  game.endless = !!s.endless;
  game.spawnQueue = s.spawnQueue.map(x => ({ ...x }));
  game.spawnTimer = s.spawnTimer;
  game.curseDeck = s.curseDeck.slice();
  // 清场
  enemies.length = 0;
  bullets.length = 0;
  coins.length = 0;
  particles.length = 0;
  floats.length = 0;
  shockwaves.length = 0;
  // 玩家位置 / 临时状态重置
  player.x = W / 2; player.y = H - 100;
  player.invuln = 1.0;
  player.shieldDelay = 0;
  player.shieldRegenT = 0;
  player.knockVx = 0; player.knockVy = 0; player.knockT = 0;
  player.voidActiveT = 0; player.voidCooldownT = 0;
  player.shotCD = 0;
  player.laserPhase = 'charge'; player.laserPhaseT = 0; player.laserTickT = 0; player.laserFlashT = 0;
  player.fieldTickT = 0;
  player.missileT = 0;
  if (player.guardian) player.guardian.hitMap = new Map();
  recompute();
  if (player.hp > player.maxHp) player.hp = player.maxHp;
  if (player.shield > player.maxShield) player.shield = Math.max(0, player.maxShield);
  // 关闭 overlay, 进入战斗
  overlay.className = 'overlay';
  overlay.innerHTML = '';
  game.state = 'playing';
  game.snapshotted = true; // 重试不重新拍快照, 用同一个
}

// Boss 战胜利后: 三选一独特道具, 选中后加入商店槽位 (满则顶替最早)
function openUniqueChoice() {
  const inSlots = new Set(player.uniqueSlots.map(it => it.id));
  const avail = SHOP_UNIQUE.filter(u =>
    !player.uniqueOwned[u.id]
    && !inSlots.has(u.id)
    && (!u.minRound || game.round >= u.minRound)
    && (!u.maxRound || game.round <= u.maxRound)
    && (!u.can || u.can(player))
  );
  if (avail.length === 0) {
    openShop(true);
    return;
  }
  game.state = 'uniqueChoice';
  const picks = [];
  const pool = avail.slice();
  const n = pickCount();
  for (let i = 0; i < n && pool.length; i++) {
    picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  overlay.className = 'overlay show';
  overlay.innerHTML = `
    <div class="title">★ BOSS 已被击败</div>
    <div class="subtitle">${pickWord()}解锁神器</div>
    <div class="cards one-row" id="uniqueChoices" style="--cols:${picks.length}"></div>`;
  const wrap = document.getElementById('uniqueChoices');
  picks.forEach(p => {
    const el = document.createElement('div');
    el.className = 'card unique';
    const goodHtml = (p.good || []).map(g => `<div class="g">${g}</div>`).join('');
    const badHtml = (p.bad || []).map(b => `<div class="b">${b}</div>`).join('');
    el.innerHTML = `<div class="ico">${p.ico}</div><div class="nm">${p.n}</div><div class="ds">${goodHtml}${badHtml}</div><div class="pr">${p.cost} 金</div>`;
    el.onclick = () => {
      if (game.uniqueAnimating) return;
      game.uniqueAnimating = true;
      // 动画前快照: 选中卡的屏幕位置 + 即将被顶替的最早神器
      const sourceRect = el.getBoundingClientRect();
      const cap = pickCount();
      const wasFull = player.uniqueSlots.length >= cap;
      const displacedItem = wasFull ? player.uniqueSlots[0] : null;
      // 状态更新: 推入新神器, 满则 FIFO 顶掉最早
      player.uniqueSlots.push(p);
      while (player.uniqueSlots.length > cap) player.uniqueSlots.shift();
      // 切到商店页面
      openShop(true);
      // 找到新神器对应的槽位卡 → FLIP: 先回到 sourceRect, 再 transition 到目标位置
      const slotRow = document.getElementById('uniqueSlotsRow');
      const newIdx = player.uniqueSlots.indexOf(p);
      const targetCard = slotRow.children[newIdx];
      const targetRect = targetCard.getBoundingClientRect();
      const dx = sourceRect.left - targetRect.left;
      const dy = sourceRect.top - targetRect.top;
      const sx = sourceRect.width / targetRect.width;
      const sy = sourceRect.height / targetRect.height;
      targetCard.style.transformOrigin = 'top left';
      targetCard.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;
      targetCard.style.transition = 'none';
      targetCard.style.zIndex = '5';
      void targetCard.offsetWidth; // reflow
      requestAnimationFrame(() => {
        targetCard.style.transition = 'transform 0.55s cubic-bezier(0.2, 0.8, 0.4, 1)';
        targetCard.style.transform = '';
        setTimeout(() => {
          targetCard.style.transition = '';
          targetCard.style.transformOrigin = '';
          targetCard.style.zIndex = '';
          game.uniqueAnimating = false;
        }, 600);
      });
      // 顶替时: 在槽位 0 处放一张被顶替神器的拷贝, 0.5s 内淡出 + 缩小
      if (displacedItem && slotRow.children[0]) {
        const slot0Rect = slotRow.children[0].getBoundingClientRect();
        const fadeCard = document.createElement('div');
        fadeCard.className = 'card unique';
        const goodHtml = (displacedItem.good || []).map(g => `<div class="g">${g}</div>`).join('');
        const badHtml = (displacedItem.bad || []).map(b => `<div class="b">${b}</div>`).join('');
        fadeCard.innerHTML = `<div class="ico">${displacedItem.ico}</div><div class="nm">${displacedItem.n}</div><div class="ds">${goodHtml}${badHtml}</div><div class="pr">${displacedItem.cost} 金</div>`;
        Object.assign(fadeCard.style, {
          position: 'fixed',
          left: slot0Rect.left + 'px',
          top: slot0Rect.top + 'px',
          width: slot0Rect.width + 'px',
          height: slot0Rect.height + 'px',
          zIndex: '4',
          pointerEvents: 'none',
          margin: '0',
        });
        document.body.appendChild(fadeCard);
        requestAnimationFrame(() => {
          fadeCard.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
          fadeCard.style.opacity = '0';
          fadeCard.style.transform = 'scale(0.85)';
          setTimeout(() => fadeCard.remove(), 600);
        });
      }
    };
    wrap.appendChild(el);
  });
}

function onWaveClear() {
  // 清场: 残留敌弹直接消除
  for (const b of bullets) if (b.from === 'enemy') b.dead = true;
  // 切换到金币收集阶段, 让屏幕上的金币高速回笼
  if (coins.length > 0) {
    game.state = 'collecting';
  } else {
    proceedToNextStage();
  }
}

function proceedToNextStage() {
  for (const b of bullets) if (b.from === 'player') b.dead = true;
  if (game.wave === game.wavesPerRound) {
    // 通关: 击败第 10 轮 boss
    if (game.round >= 10 && !game.endless) {
      onGameVictory();
      return;
    }
    game.round++; game.wave = 1;
    if (game.endless) openShop(true);
    else openUniqueChoice(); // 先三选一独特, 再进商店
  } else {
    game.wave++;
    openShop(false);
  }
}

// 通关 / 失败结算面板: 伤害分类 + 神器 + 普通道具购买
function buildStatsHtml() {
  const dmgLabels = {
    bullet: '普通子弹', laser: '超能光束', burn: '燃烧伤害',
    sentinel: '镭射哨兵', guardian: '神圣守护', missile: '死神飞弹',
    field: '绝对领域',
  };
  const dmgItems = Object.entries(game.stats.damage)
    .filter(([_, v]) => v > 0)
    .sort((a, b) => b[1] - a[1]);
  const dmgMax = dmgItems.length ? dmgItems[0][1] : 0;
  const dmgEntries = dmgItems
    .map(([k, v]) => {
      const label = dmgLabels[k] || k;
      const value = Math.round(v).toLocaleString();
      const ratio = dmgMax > 0 ? Math.max(0.02, v / dmgMax) : 0;
      return `<div style="display:flex;flex-direction:column;gap:3px">
        <div style="display:flex;justify-content:space-between;align-items:center"><span>${label}</span><span style="opacity:0.9">${value}</span></div>
        <div style="height:7px;background:#1b2230;border:1px solid #2c3a50;border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${(ratio*100).toFixed(1)}%;background:linear-gradient(90deg,#57a8ff,#9fd7ff)"></div>
        </div>
      </div>`;
    })
    .join('');
  const uniqueEntries = game.stats.uniquesBought
    .map(u => {
      const it = SHOP_UNIQUE.find(s => s.n === u.n || s.ico === u.ico);
      const goodHtml = (it?.good || []).map(g => `<div class="g">${g}</div>`).join('');
      const badHtml = (it?.bad || []).map(b => `<div class="b">${b}</div>`).join('');
      return `<div class="card unique" style="cursor:default;pointer-events:none;padding:6px 5px;border-width:1px;border-radius:4px;box-shadow:none;transform:none;min-width:0">
        <div class="ico" style="font-size:clamp(14px,3.2vmin,20px);margin-bottom:2px">${u.ico}</div>
        <div class="nm" style="font-size:clamp(9px,2vmin,12px);margin:2px 0">${u.n}</div>
        <div class="ds" style="font-size:clamp(8px,1.8vmin,10px);min-height:0;gap:1px;line-height:1.35">${goodHtml}${badHtml}</div>
      </div>`;
    })
    .join('');
  const shopEntries = Object.entries(game.stats.shopBought)
    .map(([n, c]) => `<span style="margin-right:10px">${n}${c > 1 ? ` ×${c}` : ''}</span>`)
    .join('');
  // 用时格式化: 小时 ≥ 1 显示 H:MM:SS, 否则 M:SS
  const totalSec = Math.floor(game.elapsed);
  const hh = Math.floor(totalSec / 3600);
  const mm = Math.floor((totalSec % 3600) / 60);
  const ss = totalSec % 60;
  const pad = n => String(n).padStart(2, '0');
  const elapsedStr = hh > 0 ? `${hh}:${pad(mm)}:${pad(ss)}` : `${mm}:${pad(ss)}`;
  const blocks = [];
  blocks.push(`<div style="background:#10101e;border:1px solid #2a2a44;border-radius:4px;padding:8px 12px"><div style="color:#cfe;font-weight:bold;margin-bottom:4px">⏱ 用时</div><div>${elapsedStr}</div></div>`);
  if (dmgEntries) blocks.push(`<div style="background:#10101e;border:1px solid #2a2a44;border-radius:4px;padding:8px 12px"><div style="color:#ffaa66;font-weight:bold;margin-bottom:6px">💥 伤害统计</div><div style="display:flex;flex-direction:column;gap:7px">${dmgEntries}</div></div>`);
  if (uniqueEntries) blocks.push(`<div style="background:#10101e;border:1px solid #2a2a44;border-radius:4px;padding:8px 12px"><div style="color:#ffd06a;font-weight:bold;margin-bottom:6px">⚜ 神器</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px">${uniqueEntries}</div></div>`);
  if (shopEntries) blocks.push(`<div style="background:#10101e;border:1px solid #2a2a44;border-radius:4px;padding:8px 12px"><div style="color:#a4dfff;font-weight:bold;margin-bottom:4px">🛍 普通道具</div><div style="line-height:1.7">${shopEntries}</div></div>`);
  return `<div style="display:flex;flex-direction:column;gap:8px;max-width:380px;width:90%;margin:8px auto;font-size:clamp(10px,2vmin,12px);text-align:left">${blocks.join('')}</div>`;
}

function onGameVictory() {
  game.state = 'victory';
  overlay.className = 'overlay show';
  overlay.innerHTML = `
    <div class="title" style="color:#ffd06a; letter-spacing:8px">★ 通 关 ★</div>
    <div class="subtitle" style="color:#ffd06a; opacity:0.85">击败第 10 轮 BOSS, 完成游戏</div>
    <div style="text-align:center; padding: clamp(12px,3vmin,20px) clamp(20px,5vmin,40px); margin: clamp(8px,2vmin,12px) 0; background:#10101e; border:2px solid #ffd06a; border-radius:8px; box-shadow:0 0 26px rgba(255,200,80,0.5);">
      <div style="font-size:clamp(28px,7vmin,42px); margin-bottom:8px">🏆</div>
      <div style="color:#ffd06a; font-size:clamp(13px,2.8vmin,15px); margin-bottom:6px">恭 喜 通 关</div>
      <div style="font-size: clamp(10px,2.2vmin,12px); opacity:0.75">坚持到第 ${game.round} 轮 · 等级 ${game.level} · 金币 ${player.coin}</div>
